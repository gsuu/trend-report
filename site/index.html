ist", "html": "업데이트: 무신사 뷰티가 직매입 확대와 MFS 풀필먼트 고도화를 바탕으로 무료배송·당일발송·주 7일 배송·바로교환/환불을 강화한다고 발표했습니다."}, {"kind": "list", "html": "서비스 맥락: 오프라인 체험 접점도 함께 열지만, 온라인 서비스 관점에서는 직매입 상품 확대와 풀필먼트가 구매 전후 불안을 줄이는 핵심 변화입니다."}, {"kind": "list", "html": "변경 전: 무신사 뷰티에서 신진·인디 브랜드를 구매할 때 사용자는 배송 속도, 교환/환불 조건, 재고 신뢰도를 별도로 확인해야 했습니다."}, {"kind": "list", "html": "변경 후: 직매입, MFS 풀필먼트, 무료배송·당일발송, 주 7일 배송, 바로교환·바로환불을 묶어 온라인 구매 전후 경험을 강화합니다."}, {"kind": "list", "html": "운영 변화: 올해 1분기 전담 뷰티 바잉 조직을 신설했고, 신진·인디 브랜드를 포함한 400여 개 브랜드와 파트너십을 구축했습니다."}, {"kind": "list", "html": "배송·교환: 서울 및 수도권 지역에서는 토요일 주문 상품을 일요일에 받을 수 있는 <code>주 7일 배송<\/code>을 운영하고, <code>바로교환<\/code>·<code>바로환불<\/code>도 제공합니다."}], "itemsHtml": ["업데이트: 무신사 뷰티가 직매입 확대와 MFS 풀필먼트 고도화를 바탕으로 무료배송·당일발송·주 7일 배송·바로교환/환불을 강화한다고 발표했습니다.", "서비스 맥락: 오프라인 체험 접점도 함께 열지만, 온라인 서비스 관점에서는 직매입 상품 확대와 풀필먼트가 구매 전후 불안을 줄이는 핵심 변화입니다.", "변경 전: 무신사 뷰티에서 신진·인디 브랜드를 구매할 때 사용자는 배송 속도, 교환/환불 조건, 재고 신뢰도를 별도로 확인해야 했습니다.", "변경 후: 직매입, MFS 풀필먼트, 무료배송·당일발송, 주 7일 배송, 바로교환·바로환불을 묶어 온라인 구매 전후 경험을 강화합니다.", "운영 변화: 올해 1분기 전담 뷰티 바잉 조직을 신설했고, 신진·인디 브랜드를 포함한 400여 개 브랜드와 파트너십을 구축했습니다.", "배송·교환: 서울 및 수도권 지역에서는 토요일 주문 상품을 일요일에 받을 수 있는 <code>주 7일 배송<\/code>을 운영하고, <code>바로교환<\/code>·<code>바로환불<\/code>도 제공합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "뷰티 커머스의 신뢰는 추천 알고리즘만으로 만들어지지 않습니다. 재고, 배송, 교환 경험이 함께 빨라져야 사용자는 처음 보는 브랜드도 장바구니에 담습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "무신사 뷰티의 이번 변화는 상품 구색 확장보다 운영 경험 확장에 가깝습니다. 신진·인디 뷰티 브랜드는 발견 가치가 높지만, 사용자는 낯선 브랜드를 구매할 때 배송 속도, 반품·교환, 실물 확인 가능성을 더 민감하게 봅니다."}, {"kind": "paragraph", "html": "직매입과 MFS 풀필먼트는 구매 이후의 불안을 줄입니다. 특히 뷰티는 색상, 제형, 향, 피부 반응처럼 화면만으로 판단하기 어려운 요소가 많기 때문에 온라인 상품 상세에서 배송·교환·반품 조건을 명확히 보여주는 전략이 설득력을 가집니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "앱 화면에서는 단순히 “빠른 배송” 배지를 붙이는 것으로 충분하지 않습니다. 상품 상세에서 오늘 발송 가능 여부, 주말 수령 가능 지역, 바로교환 조건, 반품/환불 기준이 같은 판단 흐름 안에 보여야 합니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 브랜드가 낯설다는 이유만으로 배송과 교환 조건을 따로 확인하지 않아도 됩니다. 서비스가 물류와 교환 정책을 전면에 보여주면, 비교 기준은 브랜드 인지도에서 제품 적합성과 구매 편의성으로 이동합니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "뷰티·패션 서비스에서는 “개인화 추천을 어떻게 할까?”와 함께 “추천된 상품을 안심하고 살 근거가 화면에 있는가?”를 물어야 합니다. 추천 UX와 운영 UX가 분리되어 있으면 사용자는 발견은 하되 구매는 미루게 됩니다."}], "itemsHtml": ["@@quote@@뷰티 커머스의 신뢰는 추천 알고리즘만으로 만들어지지 않습니다. 재고, 배송, 교환 경험이 함께 빨라져야 사용자는 처음 보는 브랜드도 장바구니에 담습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@무신사 뷰티의 이번 변화는 상품 구색 확장보다 운영 경험 확장에 가깝습니다. 신진·인디 뷰티 브랜드는 발견 가치가 높지만, 사용자는 낯선 브랜드를 구매할 때 배송 속도, 반품·교환, 실물 확인 가능성을 더 민감하게 봅니다.", "@@paragraph@@직매입과 MFS 풀필먼트는 구매 이후의 불안을 줄입니다. 특히 뷰티는 색상, 제형, 향, 피부 반응처럼 화면만으로 판단하기 어려운 요소가 많기 때문에 온라인 상품 상세에서 배송·교환·반품 조건을 명확히 보여주는 전략이 설득력을 가집니다.", "@@subhead@@설계 관점", "@@paragraph@@앱 화면에서는 단순히 “빠른 배송” 배지를 붙이는 것으로 충분하지 않습니다. 상품 상세에서 오늘 발송 가능 여부, 주말 수령 가능 지역, 바로교환 조건, 반품/환불 기준이 같은 판단 흐름 안에 보여야 합니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 브랜드가 낯설다는 이유만으로 배송과 교환 조건을 따로 확인하지 않아도 됩니다. 서비스가 물류와 교환 정책을 전면에 보여주면, 비교 기준은 브랜드 인지도에서 제품 적합성과 구매 편의성으로 이동합니다.", "@@subhead@@점검 질문", "@@paragraph@@뷰티·패션 서비스에서는 “개인화 추천을 어떻게 할까?”와 함께 “추천된 상품을 안심하고 살 근거가 화면에 있는가?”를 물어야 합니다. 추천 UX와 운영 UX가 분리되어 있으면 사용자는 발견은 하되 구매는 미루게 됩니다."]}]}, {"number": "12", "platform": "지그재그", "areaKey": "service", "area": "Service", "categoryKey": "ecommerce", "category": "ecommerce", "date": "2026-04-27", "route": "/articles/12", "href": "/articles/12", "articleUrl": "https://email.cttd.co.kr/magazine/articles/12", "image": "https://partnerlounge.kakaostyle.com/images/articles/34c3dd4d-d5b1-8032-9257-d2fc3823fa67?a10a7d7fc4588b646d0149fa0e8c8b568cef2542", "imageCaption": "지그재그 임부복 카테고리 신설 공식 원문 이미지", "tags": ["임부복카테고리", "생애주기탐색", "온라인서비스UX", "웹서비스기획", "웹디자인"], "takeawayHtml": "좋은 온라인 카테고리 개편은 상품군을 하나 더 늘리는 일이 아니라, 사용자의 상황 언어를 탐색 구조로 바꾸는 일입니다.", "deckHtml": "카카오스타일이 운영하는 지그재그가 <code>임부복<\/code>을 기존 플러스 사이즈 카테고리에서 분리해 별도 독립 카테고리로 신설했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-27"}, {"label": "국가", "valueHtml": "KR"}, {"label": "직무 태그", "valueHtml": "웹서비스기획 / 웹디자인"}, {"label": "카테고리", "valueHtml": "ecommerce"}, {"label": "출처", "valueHtml": "카카오스타일 파트너라운지"}], "sourceUrl": "https://partnerlounge.kakaostyle.com/press/1436", "sourceTitle": "지그재그, ‘임부복’ 카테고리 신설…20대 넘어 30대 중후반 여성 고객 확대 본격화", "referenceLinks": [], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: 카카오스타일이 운영하는 지그재그가 <code>임부복<\/code>을 기존 플러스 사이즈 카테고리에서 분리해 별도 독립 카테고리로 신설했습니다."}, {"kind": "list", "html": "서비스 맥락: 지그재그는 2030 여성의 생애주기 변화에 맞춰 임부복, 수유복, 수영복/래시가드, 이너웨어/케어용품 등 세부 탐색 범위를 확장했습니다."}, {"kind": "list", "html": "변경 전: 임부복은 플러스 사이즈 안에 묶여 있어 사용자가 상황별 상품을 직접 검색하고 비교해야 했습니다."}, {"kind": "list", "html": "변경 후: 임신·출산 전후 상황에 맞는 의류와 케어 상품을 독립 카테고리 안에서 탐색할 수 있고, 월 1회 임부복 연합전과 직진배송 연계까지 온라인 구매 흐름으로 연결됩니다."}, {"kind": "list", "html": "수치·팩트: 2025년 임부복 상품 거래액은 2024년 대비 62% 증가했고, 2026년 1월 1일부터 4월 13일까지 임산부 블라우스 275%, 임산부 브래지어 291%, 임산부 수영복 2549% 등 세부 품목 거래액이 전년 동기 대비 급증했습니다. 임부복 연합전 참여 스토어 평균 거래액도 전년 동기 대비 167% 증가했습니다."}], "itemsHtml": ["업데이트: 카카오스타일이 운영하는 지그재그가 <code>임부복<\/code>을 기존 플러스 사이즈 카테고리에서 분리해 별도 독립 카테고리로 신설했습니다.", "서비스 맥락: 지그재그는 2030 여성의 생애주기 변화에 맞춰 임부복, 수유복, 수영복/래시가드, 이너웨어/케어용품 등 세부 탐색 범위를 확장했습니다.", "변경 전: 임부복은 플러스 사이즈 안에 묶여 있어 사용자가 상황별 상품을 직접 검색하고 비교해야 했습니다.", "변경 후: 임신·출산 전후 상황에 맞는 의류와 케어 상품을 독립 카테고리 안에서 탐색할 수 있고, 월 1회 임부복 연합전과 직진배송 연계까지 온라인 구매 흐름으로 연결됩니다.", "수치·팩트: 2025년 임부복 상품 거래액은 2024년 대비 62% 증가했고, 2026년 1월 1일부터 4월 13일까지 임산부 블라우스 275%, 임산부 브래지어 291%, 임산부 수영복 2549% 등 세부 품목 거래액이 전년 동기 대비 급증했습니다. 임부복 연합전 참여 스토어 평균 거래액도 전년 동기 대비 167% 증가했습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "좋은 온라인 카테고리 개편은 상품군을 하나 더 늘리는 일이 아니라, 사용자의 상황 언어를 탐색 구조로 바꾸는 일입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "지그재그의 임부복 카테고리 신설은 온라인 패션 플랫폼이 고객의 나이보다 생활 단계와 구매 상황을 더 세밀하게 보기 시작했다는 신호입니다. 임부복은 단순히 사이즈가 다른 옷이 아니라 출근, 휴가, 하객룩, 수유, 이너웨어처럼 상황별 판단 기준이 다른 상품군입니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "온라인 서비스에서는 <code>임부복<\/code>이라는 상위 카테고리만 만드는 것으로 충분하지 않습니다. 사용자는 몸의 변화, 계절, 외출 상황, 배송 속도, 리뷰 신뢰도를 함께 봅니다. 따라서 카테고리 홈에서는 상황별 큐레이션, 빠른 배송 가능 여부, 리뷰가 많은 스토어, 세부 품목 진입점을 함께 보여주는 구조가 중요합니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 플러스 사이즈, 원피스, 이너웨어, 수영복을 따로 검색하며 임신 중 착용 가능 여부를 추측하지 않아도 됩니다. 서비스가 생애주기와 상황을 먼저 묶어주면 사용자는 자신의 필요에 맞는 상품군으로 바로 진입할 수 있습니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "온라인 카테고리 개편에서는 “상품군을 추가할 것인가?”보다 “사용자가 어떤 상황 문장으로 상품을 찾고 있는가?”를 먼저 물어야 합니다. 검색어와 거래액이 반복해서 커지는 상품군은 별도 카테고리, 기획전, 배송/리뷰 필터를 함께 설계할 후보입니다."}], "itemsHtml": ["@@quote@@좋은 온라인 카테고리 개편은 상품군을 하나 더 늘리는 일이 아니라, 사용자의 상황 언어를 탐색 구조로 바꾸는 일입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@지그재그의 임부복 카테고리 신설은 온라인 패션 플랫폼이 고객의 나이보다 생활 단계와 구매 상황을 더 세밀하게 보기 시작했다는 신호입니다. 임부복은 단순히 사이즈가 다른 옷이 아니라 출근, 휴가, 하객룩, 수유, 이너웨어처럼 상황별 판단 기준이 다른 상품군입니다.", "@@subhead@@설계 관점", "@@paragraph@@온라인 서비스에서는 <code>임부복<\/code>이라는 상위 카테고리만 만드는 것으로 충분하지 않습니다. 사용자는 몸의 변화, 계절, 외출 상황, 배송 속도, 리뷰 신뢰도를 함께 봅니다. 따라서 카테고리 홈에서는 상황별 큐레이션, 빠른 배송 가능 여부, 리뷰가 많은 스토어, 세부 품목 진입점을 함께 보여주는 구조가 중요합니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 플러스 사이즈, 원피스, 이너웨어, 수영복을 따로 검색하며 임신 중 착용 가능 여부를 추측하지 않아도 됩니다. 서비스가 생애주기와 상황을 먼저 묶어주면 사용자는 자신의 필요에 맞는 상품군으로 바로 진입할 수 있습니다.", "@@subhead@@점검 질문", "@@paragraph@@온라인 카테고리 개편에서는 “상품군을 추가할 것인가?”보다 “사용자가 어떤 상황 문장으로 상품을 찾고 있는가?”를 먼저 물어야 합니다. 검색어와 거래액이 반복해서 커지는 상품군은 별도 카테고리, 기획전, 배송/리뷰 필터를 함께 설계할 후보입니다."]}]}, {"number": "04", "platform": "G마켓", "areaKey": "service", "area": "Service", "categoryKey": "ecommerce", "category": "ecommerce", "date": "2026-04-27", "route": "/articles/04", "href": "/articles/04", "articleUrl": "https://email.cttd.co.kr/magazine/articles/04", "image": "https://shinsegae-prd-data.s3.ap-northeast-2.amazonaws.com/wp-content/uploads/2026/04/NR_Press_List 면 차액을 스마일캐시로 보전해 가입 허들을 낮춥니다.", "수치·혜택: 월 20만 원까지 5%, 20만 원 초과부터 320만 원까지 2%, 월 최대 7만 원 적립을 제공합니다.", "론칭 이벤트: 90개 상품 대상 기본 적립 최대 5%에 추가 5%를 더하고, 추가 적립은 1인당 최대 5천 원까지 제공합니다.", "연계 혜택: G마켓 <code>꼭 멤버십<\/code>과 SSG닷컴 <code>쓱7클럽<\/code> 유료회원 공동 가입 시 양사에서 각각 1천 원씩 월 최대 2천 원 캐시백을 지급합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "좋은 멤버십 UX는 혜택을 많이 나열하는 화면이 아니라, 사용자가 손해 볼지 모른다는 계산을 대신 끝내주는 화면입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "이커머스 멤버십은 더 이상 무료배송 한 줄로 설득되지 않습니다. 사용자는 이미 여러 구독과 멤버십을 동시에 관리하고 있고, 새 멤버십에 가입할 때 “이번 달에 정말 이득인가?”를 먼저 계산합니다."}, {"kind": "paragraph", "html": "G마켓의 <code>차액보상<\/code>은 이 계산 부담을 서비스가 떠안는 장치입니다. 월회비 2,900원보다 적게 적립되면 차액을 보전한다는 구조는, 최대 혜택보다 더 직접적으로 가입 불안을 줄입니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "멤버십 가입 화면에서는 최대 적립액보다 예상 회수 금액이 먼저 읽혀야 합니다. 최근 구매 패턴 기준 예상 적립, 회비 대비 손익, 공동 가입 시 추가 캐시백을 한 화면에서 보여주면 사용자는 혜택표를 해석하지 않고도 결정할 수 있습니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 본인이 얼마나 사야 월회비를 회수하는지 직접 계산하지 않아도 됩니다. 차액보상은 멤버십 가입 전의 심리적 마찰을 줄이고, 더블 적립 이벤트는 가입 직후 첫 구매 행동을 만드는 장치로 작동합니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "멤버십 화면에서는 “혜택을 더 넣을까?”보다 “사용자가 이득을 이해하는 데 몇 초가 걸리는가?”를 점검해야 합니다. 손익 계산이 화면 안에서 끝나지 않으면, 혜택이 많아도 가입은 미뤄집니다."}], "itemsHtml": ["@@quote@@좋은 멤버십 UX는 혜택을 많이 나열하는 화면이 아니라, 사용자가 손해 볼지 모른다는 계산을 대신 끝내주는 화면입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@이커머스 멤버십은 더 이상 무료배송 한 줄로 설득되지 않습니다. 사용자는 이미 여러 구독과 멤버십을 동시에 관리하고 있고, 새 멤버십에 가입할 때 “이번 달에 정말 이득인가?”를 먼저 계산합니다.", "@@paragraph@@G마켓의 <code>차액보상<\/code>은 이 계산 부담을 서비스가 떠안는 장치입니다. 월회비 2,900원보다 적게 적립되면 차액을 보전한다는 구조는, 최대 혜택보다 더 직접적으로 가입 불안을 줄입니다.", "@@subhead@@설계 관점", "@@paragraph@@멤버십 가입 화면에서는 최대 적립액보다 예상 회수 금액이 먼저 읽혀야 합니다. 최근 구매 패턴 기준 예상 적립, 회비 대비 손익, 공동 가입 시 추가 캐시백을 한 화면에서 보여주면 사용자는 혜택표를 해석하지 않고도 결정할 수 있습니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 본인이 얼마나 사야 월 역은 영상, 편성, 혜택, 구매 CTA가 한 화면에 섞여 보조기기 사용자에게 복잡한 여정이 되기 쉽습니다."}, {"kind": "list", "html": "변경 후: 릴리즈 노트 기준 접근성 개선이 반영되어 시각장애 사용자의 탐색·선택·구매 보조 흐름을 개선한 것으로 확인됩니다."}, {"kind": "list", "html": "확인 버전: iOS v10.9.3"}, {"kind": "list", "html": "확인 시각: App Store currentVersionReleaseDate 기준 2026-04-23T17:02:06Z"}], "itemsHtml": ["업데이트: G마켓 iOS 앱 v10.9.3에서 <code>시각장애인을 위한 접근성 업데이트<\/code>와 <code>홈쇼핑 접근성 개선<\/code>이 공개됐습니다.", "서비스 맥락: 같은 주 정식 론칭한 꼭 멤버십과 함께, 구매 전환 화면뿐 아니라 상품 탐색·홈쇼핑 소비 경험의 사용 가능성을 넓히는 업데이트입니다.", "변경 전: 홈쇼핑 영역은 영상, 편성, 혜택, 구매 CTA가 한 화면에 섞여 보조기기 사용자에게 복잡한 여정이 되기 쉽습니다.", "변경 후: 릴리즈 노트 기준 접근성 개선이 반영되어 시각장애 사용자의 탐색·선택·구매 보조 흐름을 개선한 것으로 확인됩니다.", "확인 버전: iOS v10.9.3", "확인 시각: App Store currentVersionReleaseDate 기준 2026-04-23T17:02:06Z"]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "접근성 업데이트는 별도 배려 항목이 아니라, 구매 여정에서 이탈하는 사용자를 줄이는 기본 품질 개선입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "커머스 앱의 홈쇼핑 영역은 접근성 난도가 높은 화면입니다. 방송 영상, 상품 정보, 가격, 남은 시간, 쿠폰, 구매 버튼, 편성표가 동시에 움직이기 때문입니다. 이런 화면에서 보조기기 사용자가 현재 어떤 상품을 보고 있는지, 어떤 혜택이 적용되는지, 다음 행동이 무엇인지 파악하기 어렵다면 구매 여정은 곧바로 끊깁니다."}, {"kind": "paragraph", "html": "G마켓이 릴리즈 노트에 <code>시각장애인을 위한 접근성<\/code>과 <code>홈쇼핑 접근성<\/code>을 명시한 점은 중요합니다. 접근성은 법적 준수만의 문제가 아니라, 복잡한 커머스 화면을 더 예측 가능하게 만드는 설계 품질이기 때문입니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "홈쇼핑 화면 접근성은 대체 텍스트만으로 해결되지 않습니다. 포커스 순서, 실시간 정보 갱신 안내, 버튼 레이블, 품절·혜택 상태 전달, 영상 제어 버튼의 명확성이 함께 맞아야 합니다. QA에서는 VoiceOver로 방송 상품 진입부터 구매 CTA까지 한 번에 이동 가능한지 확인해야 합니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "시각장애 사용자는 화면의 구조를 추측하거나 같은 정보를 반복해서 탐색하지 않아도 됩니다. 접근성 레이블과 포커스 순서가 정리되면 상품 정보, 혜택, 구매 행동을 더 짧은 경로로 파악할 수 있습니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "커머스 화면에서는 “접근성 점수가 몇 점인가?”보다 “실제 구매 플로우를 보조기기로 완료할 수 있는가?”를 물어야 합니다. 특히 라이브커머스, 홈쇼핑, 타임딜처럼 정보가 빠르게 바뀌는 화면은 별도 접근성 시나리오가 필요합니다."}], "itemsHtml": ceLinks": [{"label": "관련 뉴스", "title": "Spotify Claude 공식 도움말", "url": "https://support.spotify.com/us/article/spotify-on-claude/"}, {"label": "관련 뉴스", "title": "Engadget Spotify Claude 연동 보도", "url": "https://www.engadget.com/ai/spotify-comes-to-claude-for-personalized-playlist-and-podcast-recommendations-090000787.html"}], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Spotify가 Claude 안에서 음악과 팟캐스트 추천을 받을 수 있는 연동을 공개했습니다."}, {"kind": "list", "html": "서비스 맥락: 사용자는 Claude에서 Spotify 계정을 연결하고 취향·청취 이력 기반 추천을 받을 수 있으며, 마음에 드는 콘텐츠를 미리 듣거나 저장하거나 Spotify 앱으로 열 수 있습니다."}, {"kind": "list", "html": "변경 전: 음악·팟캐스트 발견은 Spotify 앱 내부의 검색, 추천, 플레이리스트, 홈 피드 중심으로 이뤄졌습니다."}, {"kind": "list", "html": "변경 후: 사용자는 “출근길에 들을 팟캐스트”, “아침 운동용 에너지 높은 음악”처럼 자연어 맥락으로 요청하고, Claude 대화 안에서 추천과 재생 이동을 이어갈 수 있습니다."}, {"kind": "list", "html": "제어 장치: 사용자는 연결 여부를 직접 제어하고 언제든 해제할 수 있으며, Spotify는 음악·팟캐스트 등 오디오/비디오 콘텐츠를 Anthropic 학습용으로 공유하지 않는다고 밝혔습니다."}], "itemsHtml": ["업데이트: Spotify가 Claude 안에서 음악과 팟캐스트 추천을 받을 수 있는 연동을 공개했습니다.", "서비스 맥락: 사용자는 Claude에서 Spotify 계정을 연결하고 취향·청취 이력 기반 추천을 받을 수 있으며, 마음에 드는 콘텐츠를 미리 듣거나 저장하거나 Spotify 앱으로 열 수 있습니다.", "변경 전: 음악·팟캐스트 발견은 Spotify 앱 내부의 검색, 추천, 플레이리스트, 홈 피드 중심으로 이뤄졌습니다.", "변경 후: 사용자는 “출근길에 들을 팟캐스트”, “아침 운동용 에너지 높은 음악”처럼 자연어 맥락으로 요청하고, Claude 대화 안에서 추천과 재생 이동을 이어갈 수 있습니다.", "제어 장치: 사용자는 연결 여부를 직접 제어하고 언제든 해제할 수 있으며, Spotify는 음악·팟캐스트 등 오디오/비디오 콘텐츠를 Anthropic 학습용으로 공유하지 않는다고 밝혔습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "추천 UX의 다음 입구는 앱 홈 화면만이 아니라, 사용자가 이미 목적을 말하고 있는 대화창이 될 수 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Spotify의 Claude 연동은 “AI 챗봇 안에 서비스가 들어간다”는 점보다 발견의 출발점이 바뀐다는 점이 중요합니다. 사용자는 더 이상 장르, 아티스트, 카테고리를 먼저 고르지 않고 자신의 상황을 말합니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "핵심 질문은 외부 AI 채널을 새 유입 경로로 볼 것인지, 아니면 서비스 경험의 확장 화면으로 볼 것인지입니다. 추천 결과를 보여주는 방식, 미리 듣기, 저장, 앱 이동, 계정 연결 해제까지 한 흐름으로 설계해야 사용자가 “대화에서 발견하고 앱에서 이어 듣는” 경험을 자연스럽게 받아들입니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 원하는 음악을 찾기 위해 검색어를 정교하게 만들거나 플레이리스트 이름을 기억하지 않아도 됩니다. 목적과 상황을 말하면 서비스가 취향 데이터와 카탈로그를 연결해 다음 행동을 제안합니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "AI 검색·챗봇 연동을 검토하는 서비스라면 “우리 서비스를 챗봇에 붙일 수 있는가?”보다 “사용자가 어떤 상황 문장으로 우리 서비스를 호출할 것인가?”를 먼저 정의해야 합니다."}], "itemsHtml": ["@@quote@@추천 UX의 다음 입구는 앱 홈 화면만이 아니라, 사용자가 이미 목적을 말하고 있는 대화창이 될 수 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Spotify의 Claude 연동은 “AI 챗봇 안에 서비스가 들어간다”는 점보다 발견의 출발점이 바뀐다는 점이 중요합니다. 사용자는 더 이상 장르, 아티스트, 카테고리를 먼저 고르지 않고 자신의 상황을 말합니다.", "@@subhead@@설계 관점", "@@paragraph@@핵심 질문은 외부 AI 채널을 새 유입 경로로 볼 것인지, 아니면 서비스 경험의 확장 화면으로 볼 것인지입니다. 추천 결과를 보여주는 방식, 미리 듣기, 저장, 앱 이동, 계정 연결 해제까지 한 흐름으로 설계해야 사용자가 “대화에서 발견하고 앱에서 이어 듣는” 경험을 자연스럽게 받아들입니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 원하는 음악을 찾기 위해 검색어를 정교하게 만들거나 플레이리스트 이름을 기억하지 않아도 됩니다. 목적과 상황을 말하면 서비스가 취향 데이터와 카탈로그를 연결해 다음 행동을 제안합니다.", "@@subhead@@점검 질문", "@@paragraph@@AI 검색·챗봇 연동을 검토하는 서비스라면 “우리 서비스를 챗봇에 붙일 수 있는가?”보다 “사용자가 어떤 상황 문장으로 우리 서비스를 호출할 것인가?”를 먼저 정의해야 합니다."]}]}, {"number": "07", "platform": "Spotify", "areaKey": "design", "area": "Design", "categoryKey": "global_service_ux", "category": "global", "date": "2026-04-27", "route": "/articles/07", "href": "/articles/07", "articleUrl": "https://email.cttd.co.kr/magazine/articles/07", "image": "https://storage.googleapis.com/pr-newsroom-wp/1/2026/04/S20-Design-23839-1024x583.png", "imageCaption": "Spotify 모바일 디자인 히스토리 공식 뉴스룸 이미지", "tags": ["브랜드시스템", "제품디자인", "콘텐츠UX", "웹디자인", "웹서비스기획"], "takeawayHtml": "오래가는 브랜드 UX는 색상이나 로고를 고정하는 것이 아니라, 사용자의 행동이 바뀌어도 한 서비스처럼 느껴지는 규칙을 유지하는 일입니다.", "deckHtml": "Spotify가 20주년 맥락에서 제품 디자인과 브랜드 아이덴티티가 어떻게 진화했는지 공개했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-27"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "직무 태그", "valueHtml": "웹디자인 / 웹서비스기획"}, {"label": "카테고리", "valueHtml": "global_service_ux"}, {"label": "출처", "valueHtml": "Spotify Newsroom"}], "sourceUrl": "https://newsroom.spotify.com/2026-04-23/spotify-design-history/", "sourceTitle": "The Look Behind the Sound — Spotify", "referenceLinks": [{"label": "관련 뉴스", "title": "Spotify 태블릿 최적화 업데이트", "url": "https://newsroom.spotify.com/2026-04-16/spotify-now-optimized-for-tablets/"}, {"label": "관련 뉴스", "title": "Spotify Design 매거진", "url": "https://spotify.design/"}], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Spotify가 20주년 맥락에서 제품 디자인과 브랜드 아이덴티티가 어떻게 진화했는지 공개했습니다."}, {"kind": "list", "html": "서비스 맥락: Spotify는 초록색, 다크 모드, 전용 서체 Spotify Mix, Wrapped, 플레이리스트 중심 경험, 콘텐츠 유형별 유연한 UI를 핵심 디자인 자산으로 설명했습니다."}, {"kind": "list", "html": "변경 전: 초기 Spotify는 플레이리스트를 중심으로 음악을 발견하고 관리하는 앱 경험에 집중했습니다."}, {"kind": "list", "html": "변경 후: 음악, 팟캐스트, 오디오북, 영상, 소셜 리스닝, 데이터 스토리텔링이 섞이면서 하나의 경험 안에서 콘텐츠 맥락별 UI가 달라지는 방향으로 확장됐습니다."}, {"kind": "list", "html": "디자인 포인트: Spotify는 트렌드를 그대로 따르기보다 사용자의 청취 행동, 문화, 창작자 커뮤니티를 반영해 브랜드 요소를 유연하게 바꾸는 방식을 강조했습니다."}], "itemsHtml": ["업데이트: Spotify가 20주년 맥락에서 제품 디자인과 브랜드 아이덴티티가 어떻게 진화했는지 공개했습니다.", "서비스 맥락: Spotify는 초록색, 다크 모드, 전용 서체 Spotify Mix, Wrapped, 플레이리스트 중심 경험, 콘텐츠 유형별 유연한 UI를 핵심 디자인 자산으로 설명했습니다.", "변경 전: 초기 Spotify는 플레이리스트를 중심으로 음악을 발견하고 관리하는 앱 경험에 집중했습니다.", "변경 후: 음악, 팟캐스트, 오디오북, 영상, 소셜 리스닝, 데이터 스토리텔링이 섞이면서 하나의 경험 안에서 콘텐츠 맥락별 UI가 달라지는 방향으로 확장됐습니다.", "디자인 포인트: Spotify는 트렌드를 그대로 따르기보다 사용자의 청취 행동, 문화, 창작자 커뮤니티를 반영해 브랜드 요소를 유연하게 바꾸는 방식을 강조했습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "오래가는 브랜드 UX는 색상이나 로고를 고정하는 것이 아니라, 사용자의 행동이 바뀌어도 한 서비스처럼 느껴지는 규칙을 유지하는 일입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Spotify의 디자인 회고는 새 기능 발표는 아니지만 제품과 브랜드 경험을 다루는 팀이 참고할 만한 레퍼런스입니다. 서비스가 커질수록 화면은 복잡해지고 콘텐츠 유형은 늘어납니다. 이때 중요한 것은 모든 화면을 똑같이 만드는 것이 아니라, 사용자가 “여전히 같은 서비스 안에 있다”고 느끼게 하는 일입니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "브랜드 시스템은 컬러, 서체, 컴포넌트만의 문제가 아닙니다. Spotify 사례처럼 데이터 스토리텔링, 추천 문구 톤, 플레이리스트 커버, 이벤트성 로고, 콘텐츠별 플레이어 상태가 함께 쌓여 서비스의 인상을 만듭니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 음악, 팟캐스트, 오디오북, 영상 사이를 오갈 때 새 서비스 사용법을 다시 배우지 않아도 됩니다. 핵심 내비게이션과 브랜드 언어가 유지되면 콘텐츠가 확장되어도 경험의 방향을 잃지 않습니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "브랜드 리뉴얼이나 서비스 확장에서는 “새로워 보이는가?”보다 “콘텐츠가 늘어나도 같은 서비스처럼 느껴지는가?”를 먼저 점검해야 합니다."}], "itemsHtml": ["@@quote@@오래가는 브랜드 UX는 색상이나 로고를 고정하는 것이 아니라, 사용자의 행동이 바뀌어도 한 서비스처럼 느껴지는 규칙을 유지하는 일입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Spotify의 디자인 회고는 새 기능 발표는 아니지만 제품과 브랜드 경험을 다루는 팀이 참고할 만한 레퍼런스입니다. 서비스가 커질수록 화면은 복잡해지고 콘텐츠 유형은 늘어납니다. 이때 중요한 것은 모든 화면을 똑같이 만드는 것이 아니라, 사용자가 “여전히 같은 서비스 안에 있다”고 느끼게 하는 일입니다.", "@@subhead@@설계 관점", "@@paragraph@@브랜드 시스템은 컬러, 서체, 컴포넌트만의 문제가 아닙니다. Spotify 사례처럼 데이터 스토리텔링, 추천 문구 톤, 플레이리스트 커버, 이벤트성 로고, 콘텐츠별 플레이어 상태가 함께 쌓여 서비스의 인상을 만듭니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 음악, 팟캐스트, 오디오북, 영상 사이를 오갈 때 새 서비스 사용법을 다시 배우지 않아도 됩니다. 핵심 내비게이션과 브랜드 언어가 유지되면 콘텐츠가 확장되어도 경험의 방향을 잃지 않습니다.", "@@subhead@@점검 질문", "@@paragraph@@브랜드 리뉴얼이나 서비스 확장에서는 “새로워 보이는가?”보다 “콘텐츠가 늘어나도 같은 서비스처럼 느껴지는가?”를 먼저 점검해야 합니다."]}]}, {"number": "08", "platform": "OpenAI", "areaKey": "design", "area": "Design", "categoryKey": "ai", "category": "AI", "date": "2026-04-27", "route": "/articles/08", "href": "/articles/08", "articleUrl": "https://email.cttd.co.kr/magazine/articles/08", "image": "https://images.ctfassets.net/kftzwdyauwt9/3IdBQyOlVNdmSCdUjK0zYT/e05480b1b44cc06d6ff2b357c3f80855/introducingchatfinal.jpg?fm=webp&q=90&w=3840", "imageCaption": "ChatGPT Images 2.0 공식 소개 이미지", "tags": ["ChatGPTImages2", "AI이미지", "웹디자인워크플로우", "웹디자인", "웹서비스기획"], "takeawayHtml": "ChatGPT Images 2.0은 “이미지 생성”보다 “초기 시각 커뮤니케이션을 어디까지 AI에게 맡길 수 있는가”를 묻는 업데이트입니다.", "deckHtml": "OpenAI가 4월 21일 ChatGPT Images 2.0을 공개했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-27"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "직무 태그", "valueHtml": "웹디자인 / 웹서비스기획"}, {"label": "카테고리", "valueHtml": "ai"}, {"label": "출처", "valueHtml": "OpenAI"}], "sourceUrl": "https://openai.com/index/introducing-chatgpt-images-2-0/", "sourceTitle": "OpenAI", "referenceLinks": [{"label": "관련 뉴스", "title": "OpenAI ChatGPT Images 2.0 System Card", "url": "https://deploymentsafety.openai.com/chatgpt-images-2-0/"}], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: OpenAI가 4월 21일 ChatGPT Images 2.0을 공개했습니다."}, {"kind": "list", "html": "서비스 맥락: Images 2.0은 텍스트 렌더링, 구성, 다국어 표현, 인포그래픽, 포스터, UI 요소 같은 시각 커뮤니케이션 작업에 더 적합한 생성 모델입니다."}, {"kind": "list", "html": "변경 전: 웹디자인 시안, 배너, 상세페이지, 인포그래픽을 AI로 만들 때는 텍스트 깨짐, 레이아웃 불안정, 맥락 누락을 후처리해야 했습니다."}, {"kind": "list", "html": "변경 후: 사용자는 ChatGPT 안에서 기획 문장, 정보 구조, 카피, 시각 스타일을 함께 넣어 더 정교한 시각 초안을 만들 수 있습니다."}, {"kind": "list", "html": "검증 포인트: 공식 System Card는 이미지 생성 결과의 안전성, 워터마크, 생성물 표시, 정책 적용 범위를 별도로 설명합니다."}], "itemsHtml": ["업데이트: OpenAI가 4월 21일 ChatGPT Images 2.0을 공개했습니다.", "서비스 맥락: Images 2.0은 텍스트 렌더링, 구성, 다국어 표현, 인포그래픽, 포스터, UI 요소 같은 시각 커뮤니케이션 작업에 더 적합한 생성 모델입니다.", "변경 전: 웹디자인 시안, 배너, 상세페이지, 인포그래픽을 AI로 만들 때는 텍스트 깨짐, 레이아웃 불안정, 맥락 누락을 후처리해야 했습니다.", "변경 후: 사용자는 ChatGPT 안에서 기획 문장, 정보 구조, 카피, 시각 스타일을 함께 넣어 더 정교한 시각 초안을 만들 수 있습니다.", "검증 포인트: 공식 System Card는 이미지 생성 결과의 안전성, 워터마크, 생성물 표시, 정책 적용 범위를 별도로 설명합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "ChatGPT Images 2.0은 “이미지 생성”보다 “초기 시각 커뮤니케이션을 어디까지 AI에게 맡길 수 있는가”를 묻는 업데이트입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "웹디자인 실무에서 AI 이미지는 이미 무드보드와 러프 시안 단계에 들어왔지만, 최종 산출물로 쓰기에는 텍스트와 레이아웃의 신뢰도가 부족했습니다. ChatGPT Images 2.0은 이 병목을 정면으로 다루며, 단순 분위기 이미지보다 포스터, 인포그래픽, UI 요소처럼 정보가 담긴 시각물을 더 현실적인 초안 범위로 끌어옵니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "중요한 변화는 이미지 품질보다 제작 순서입니다. 이제 “컨셉을 만든 뒤 디자인 툴에서 다듬기”가 아니라 “기획 문장, 정보 구조, 카피, 시각 스타일을 함께 넣어 첫 시안을 만들고 디자인 툴에서 검수하기”로 흐름이 바뀝니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "초기 배너, 상세페이지 콘셉트, 프레젠테이션용 인포그래픽을 만들기 위해 여러 도구를 오가며 레퍼런스를 조합하는 일을 줄일 수 있습니다. 대신 브랜드 가이드, 카피 승인, 이미지 권리, 최종 편집 가능성을 검수하는 시간이 더 중요해집니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "AI 제작을 도입할 때는 “몇 장을 빨리 만들 수 있는가?”보다 “브랜드 가이드, 카피 승인, 저작권 검수, 구현 검증, 최종 편집 툴까지 이어지는 제작 프로세스가 있는가?”를 먼저 물어야 합니다."}], "itemsHtml": ["@@quote@@ChatGPT Images 2.0은 “이미지 생성”보다 “초기 시각 커뮤니케이션을 어디까지 AI에게 맡길 수 있는가”를 묻는 업데이트입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@웹디자인 실무에서 AI 이미지는 이미 무드보드와 러프 시안 단계에 들어왔지만, 최종 산출물로 쓰기에는 텍스트와 레이아웃의 신뢰도가 부족했습니다. ChatGPT Images 2.0은 이 병목을 정면으로 다루며, 단순 분위기 이미지보다 포스터, 인포그래픽, UI 요소처럼 정보가 담긴 시각물을 더 현실적인 초안 범위로 끌어옵니다.", "@@subhead@@설계 관점", "@@paragraph@@중요한 변화는 이미지 품질보다 제작 순서입니다. 이제 “컨셉을 만든 뒤 디자인 툴에서 다듬기”가 아니라 “기획 문장, 정보 구조, 카피, 시각 스타일을 함께 넣어 첫 시안을 만들고 디자인 툴에서 검수하기”로 흐름이 바뀝니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@초기 배너, 상세페이지 콘셉트, 프레젠테이션용 인포그래픽을 만들기 위해 여러 도구를 오가며 레퍼런스를 조합하는 일을 줄일 수 있습니다. 대신 브랜드 가이드, 카피 승인, 이미지 권리, 최종 편집 가능성을 검수하는 시간이 더 중요해집니다.", "@@subhead@@점검 질문", "@@paragraph@@AI 제작을 도입할 때는 “몇 장을 빨리 만들 수 있는가?”보다 “브랜드 가이드, 카피 승인, 저작권 검수, 구현 검증, 최종 편집 툴까지 이어지는 제작 프로세스가 있는가?”를 먼저 물어야 합니다."]}]}, {"number": "11", "platform": "Anthropic", "areaKey": "design", "area": "Design", "categoryKey": "ai", "category": "AI", "date": "2026-04-27", "route": "/articles/11", "href": "/articles/11", "articleUrl": "https://email.cttd.co.kr/magazine/articles/11", "image": "https://www.anthropic.com/api/opengraph-illustration?name=Hand%20Quill&backgroundColor=cactus", "imageCaption": "Anthropic 공식 원문 이미지", "tags": ["ClaudeDesign", "AI디자인", "비주얼협업", "웹디자인", "웹서비스기획"], "takeawayHtml": "Claude Design은 AI 디자인 도구 경쟁을 “이미지 생성”이 아니라 “디자인 의도를 팀이 공유하는 방식”의 변화로 읽게 합니다.", "deckHtml": "Anthropic이 4월 17일 <code>Claude Design by Anthropic Labs<\/code>를 공개했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-27"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "직무 태그", "valueHtml": "웹디자인 / 웹서비스기획"}, {"label": "카테고리", "valueHtml": "ai"}, {"label": "출처", "valueHtml": "Anthropic"}, {"label": "관련 매거진 1", "valueHtml": "DIGITAL iNSIGHT Claude Design 해설 | https://ditoday.com/%ED%81%B4%EB%A1%9C%EB%93%9C-%EB%94%94%EC%9E%90%EC%9D%B8-%EB%93%B1%EC%9E%A5-ai%EA%B0%80-%EB%B0%94%EA%BF%80-ui%C2%B7ux-%EB%94%94%EC%9E%90%EC%9D%B8-%EC%8B%A4%EB%AC%B4/"}], "sourceUrl": "https://www.anthropic.com/news/claude-design-anthropic-labs", "sourceTitle": "Introducing Claude Design by Anthropic Labs", "referenceLinks": [], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Anthropic이 4월 17일 <code>Claude Design by Anthropic Labs<\/code>를 공개했습니다."}, {"kind": "list", "html": "서비스 맥락: Claude Design은 디자인, 프로토타입, 슬라이드, 원페이지 문서 같은 시각 작업물을 Claude와 대화하며 만들고 수정하는 연구 프리뷰 제품입니다."}, {"kind": "list", "html": "변경 전: 디자인 AI 도구는 이미지나 화면 산출물을 빠르게 만드는 기능으로 이해되는 경우가 많았습니다."}, {"kind": "list", "html": "변경 후: 사용자는 대화, 인라인 코멘트, 직접 편집, 조정 슬라이더를 오가며 결과물을 수정하고, 조직의 디자인 시스템을 적용하거나 Canva, PDF, PPTX, HTML로 내보낼 수 있습니다."}, {"kind": "list", "html": "원문 기준: 후보 발견 출처는 DIGITAL iNSIGHT였지만, 최종 기준 원문은 Anthropic 공식 발표로 확인했습니다."}], "itemsHtml": ["업데이트: Anthropic이 4월 17일 <code>Claude Design by Anthropic Labs<\/code>를 공개했습니다.", "서비스 맥락: Claude Design은 디자인, 프로토타입, 슬라이드, 원페이지 문서 같은 시각 작업물을 Claude와 대화하며 만들고 수정하는 연구 프리뷰 제품입니다.", "변경 전: 디자인 AI 도구는 이미지나 화면 산출물을 빠르게 만드는 기능으로 이해되는 경우가 많았습니다.", "변경 후: 사용자는 대화, 인라인 코멘트, 직접 편집, 조정 슬라이더를 오가며 결과물을 수정하고, 조직의 디자인 시스템을 적용하거나 Canva, PDF, PPTX, HTML로 내보낼 수 있습니다.", "원문 기준: 후보 발견 출처는 DIGITAL iNSIGHT였지만, 최종 기준 원문은 Anthropic 공식 발표로 확인했습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "Claude Design은 AI 디자인 도구 경쟁을 “이미지 생성”이 아니라 “디자인 의도를 팀이 공유하는 방식”의 변화로 읽게 합니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "디자인 AI 도구가 늘어날수록 필요한 질문은 어떤 도구가 더 예쁜 화면을 만드는가가 아닙니다. 실제 프로젝트에서는 디자인 시스템, 수정 이력, 협업 방식, 코드 전환, 최종 편집 가능성이 함께 맞아야 합니다."}, {"kind": "paragraph", "html": "Anthropic 공식 원문에서 특히 중요한 부분은 온보딩 단계에서 팀의 코드베이스와 디자인 파일을 읽어 디자인 시스템을 만들고, 이후 프로젝트에 색상, 타이포그래피, 컴포넌트를 자동 적용한다는 설명입니다. 이는 AI 시안 생성이 단발성 산출물에서 조직의 디자인 규칙을 반영하는 작업 공간으로 이동하고 있음을 보여줍니다."}, {"kind": "subhead", "html": "설계 관점"}, {"kind": "paragraph", "html": "Claude Design 같은 도구는 시안 생성기로만 보지 말고, 디자인 시스템과 작업 맥락을 어떻게 학습시키는지 확인해야 합니다. 비전문가가 만든 초안을 어느 단계에서 검수하고 승인할지 운영 규칙도 먼저 정해야 합니다."}, {"kind": "paragraph", "html": "핵심은 결과물의 첫 인상이 아니라 handoff입니다. Anthropic은 Claude Design 결과물을 Claude Code로 넘기는 번들, Canva·PDF·PPTX·HTML export, 조직 단위 공유 권한을 함께 제시했습니다. 디자인 검수와 구현 검증이 분리되어 있으면 AI 도구는 빠른 초안 도구에 머물지만, 승인 기준과 전달 형식이 맞으면 실제 제품 제작 흐름에 들어올 수 있습니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "팀은 아이디어를 설명하기 위해 긴 문서와 정적 이미지를 따로 만들지 않아도 됩니다. 대화형 캔버스와 코드 연동이 안정화되면, 문제 정의부터 프로토타입까지 같은 맥락 안에서 공유할 수 있습니다."}, {"kind": "subhead", "html": "점검 질문"}, {"kind": "paragraph", "html": "AI 디자인 도구를 검토할 때는 “툴을 도입할까?”보다 “디자인 의도, 브랜드 가이드, 컴포넌트 규칙, 코드 검증을 누가 승인하는가?”를 물어야 합니다."}], "itemsHtml": ["@@quote@@Claude Design은 AI 디자인 도구 경쟁을 “이미지 생성”이 아니라 “디자인 의도를 팀이 공유하는 방식”의 변화로 읽게 합니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@디자인 AI 도구가 늘어날수록 필요한 질문은 어떤 도구가 더 예쁜 화면을 만드는가가 아닙니다. 실제 프로젝트에서는 디자인 시스템, 수정 이력, 협업 방식, 코드 전환, 최종 편집 가능성이 함께 맞아야 합니다.", "@@paragraph@@Anthropic 공식 원문에서 특히 중요한 부분은 온보딩 단계에서 팀의 코드베이스와 디자인 파일을 읽어 디자인 시스템을 만들고, 이후 프로젝트에 색상, 타이포그래피, 컴포넌트를 자동 적용한다는 설명입니다. 이는 AI 시안 생성이 단발성 산출물에서 조직의 디자인 규칙을 반영하는 작업 공간으로 이동하고 있음을 보여줍니다.", "@@subhead@@설계 관점", "@@paragraph@@Claude Design 같은 도구는 시안 생성기로만 보지 말고, 디자인 시스템과 작업 맥락을 어떻게 학습시키는지 확인해야 합니다. 비전문가가 만든 초안을 어느 단계에서 검수하고 승인할지 운영 규칙도 먼저 정해야 합니다.", "@@paragraph@@핵심은 결과물의 첫 인상이 아니라 handoff입니다. Anthropic은 Claude Design 결과물을 Claude Code로 넘기는 번들, Canva·PDF·PPTX·HTML export, 조직 단위 공유 권한을 함께 제시했습니다. 디자인 검수와 구현 검증이 분리되어 있으면 AI 도구는 빠른 초안 도구에 머물지만, 승인 기준과 전달 형식이 맞으면 실제 제품 제작 흐름에 들어올 수 있습니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@팀은 아이디어를 설명하기 위해 긴 문서와 정적 이미지를 따로 만들지 않아도 됩니다. 대화형 캔버스와 코드 연동이 안정화되면, 문제 정의부터 프로토타입까지 같은 맥락 안에서 공유할 수 있습니다.", "@@subhead@@점검 질문", "@@paragraph@@AI 디자인 도구를 검토할 때는 “툴을 도입할까?”보다 “디자인 의도, 브랜드 가이드, 컴포넌트 규칙, 코드 검증을 누가 승인하는가?”를 물어야 합니다."]}]}, {"number": "09", "platform": "OpenAI", "areaKey": "dev", "area": "DEV", "categoryKey": "ai", "category": "AI", "date": "2026-04-27", "route": "/articles/09", "href": "/articles/09", "articleUrl": "https://email.cttd.co.kr/magazine/articles/09", "image": "https://images.ctfassets.net/kftzwdyauwt9/3IdBQyOlVNdmSCdUjK0zYT/e05480b1b44cc06d6ff2b357c3f80855/introducingchatfinal.jpg?fm=webp&q=90&w=3840", "imageCaption": "OpenAI 공식 소개 이미지", "tags": ["GPT55", "Codex", "AI개발도구", "웹DEV"], "takeawayHtml": "GPT-5.5의 관전 포인트는 코드를 더 많이 쓰는 능력보다, UI 구현과 검증을 한 작업 흐름으로 오래 붙잡는 능력입니다.", "deckHtml": "OpenAI가 4월 23일 GPT-5.5와 GPT-5.5 Pro를 공개했고, 4월 24일에는 GPT-5.5와 GPT-5.5 Pro가 API에서도 제공된다고 업데이트했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-27"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "직무 태그", "valueHtml": "웹DEV"}, {"label": "카테고리", "valueHtml": "ai"}, {"label": "출처", "valueHtml": "OpenAI"}], "sourceUrl": "https://openai.com/index/introducing-gpt-5-5/", "sourceTitle": "OpenAI", "referenceLinks": [{"label": "관련 뉴스", "title": "OpenAI GPT-5.5 System Card", "url": "https://openai.com/index/gpt-5-5-system-card/"}], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: OpenAI가 4월 23일 GPT-5.5와 GPT-5.5 Pro를 공개했고, 4월 24일에는 GPT-5.5와 GPT-5.5 Pro가 API에서도 제공된다고 업데이트했습니다."}, {"kind": "list", "html": "기술 맥락: GPT-5.5는 코딩, 온라인 리서치, 데이터 분석, 문서·스프레드시트 생성, 소프트웨어 조작처럼 여러 도구를 오가는 실제 업무를 더 오래 수행하는 모델로 소개됐습니다."}, {"kind": "list", "html": "변경 전: UI 구현·검증 업무에서는 작업을 잘게 나누고, 코드 수정·테스트·브라우저 확인을 사람이 단계별로 이어 붙여야 했습니다."}, {"kind": "list", "html": "변경 후: Codex와 ChatGPT에서는 GPT-5.5가 코드 작성, 디버깅, 도구 사용, 검증을 더 긴 흐름으로 이어갈 수 있습니다."}, {"kind": "list", "html": "확인 포인트: OpenAI는 GPT-5.5가 ChatGPT와 Codex의 Plus, Pro, Business, Enterprise 사용자에게 배포되고, Codex에서는 400K context window로 제공된다고 설명했습니다."}], "itemsHtml": ["업데이트: OpenAI가 4월 23일 GPT-5.5와 GPT-5.5 Pro를 공개했고, 4월 24일에는 GPT-5.5와 GPT-5.5 Pro가 API에서도 제공된다고 업데이트했습니다.", "기술 맥락: GPT-5.5는 코딩, 온라인 리서치, 데이터 분석, 문서·스프레드시트 생성, 소프트웨어 조작처럼 여러 도구를 오가는 실제 업무를 더 오래 수행하는 모델로 소개됐습니다.", "변경 전: UI 구현·검증 업무에서는 작업을 잘게 나누고, 코드 수정·테스트·브라우저 확인을 사람이 단계별로 이어 붙여야 했습니다.", "변경 후: Codex와 ChatGPT에서는 GPT-5.5가 코드 작성, 디버깅, 도구 사용, 검증을 더 긴 흐름으로 이어갈 수 있습니다.", "확인 포인트: OpenAI는 GPT-5.5가 ChatGPT와 Codex의 Plus, Pro, Business, Enterprise 사용자에게 배포되고, Codex에서는 400K context window로 제공된다고 설명했습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "GPT-5.5의 관전 포인트는 코드를 더 많이 쓰는 능력보다, UI 구현과 검증을 한 작업 흐름으로 오래 붙잡는 능력입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "프론트엔드 개발에서 AI 병목은 생성 자체보다 수정과 검증입니다. 화면은 요구사항, 디자인 시스템, 반응형, 접근성, 브라우저 차이, 테스트 로그를 함께 보며 조정해야 하기 때문입니다."}, {"kind": "subhead", "html": "구현 관점"}, {"kind": "paragraph", "html": "GPT-5.5가 Codex 안에서 긴 작업 맥락, 코드 수정, 테스트, 브라우저 확인을 더 잘 이어갈 수 있다는 점을 봐야 합니다. 디자인-코드 전환의 병목은 생성 자체보다 검증과 수정 반복에 있기 때문입니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "디자인 시안을 구현할 때 목표, 컴포넌트 제약, 접근성 기준, 브라우저 확인 기준을 한 번에 묶어 작업 지시합니다."}, {"kind": "list", "html": "결과물은 스크린샷, 테스트 로그, lint/typecheck 결과를 함께 확인해 AI가 놓친 UI 상태를 추적합니다."}, {"kind": "list", "html": "장기 작업에는 디자인 시스템 토큰, 컴포넌트 사용 규칙, 금지 패턴을 초반 컨텍스트로 고정합니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "Codex: 긴 코드 수정과 테스트 반복을 에이전트 흐름으로 검증할 때 함께 봐야 합니다."}, {"kind": "list", "html": "Playwright: 브라우저 기반 UI 확인과 스크린샷 검증을 자동화할 때 필요합니다."}, {"kind": "list", "html": "Storybook: 컴포넌트 상태별 검증 기준을 AI 작업과 연결하기 좋습니다."}], "itemsHtml": ["@@quote@@GPT-5.5의 관전 포인트는 코드를 더 많이 쓰는 능력보다, UI 구현과 검증을 한 작업 흐름으로 오래 붙잡는 능력입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@프론트엔드 개발에서 A   <script type="module">
    import { createApp } from "https://unpkg.com/vue@3.5.32/dist/vue.esm-browser.prod.js";

    const report = JSON.parse(document.getElementById("report-data").textContent);

    createApp({
      data() {
        return {
          report,
          route: this.currentRoute(),
          shareStatus: "",
        };
      },
      computed: {
        activeIssue() {
          const match = this.route.match(/^\/articles\/(\d+)/);
          if (!match) return null;
          return this.report.issues.find((issue) => issue.number === match[1]) || null;
        },
        activeCategoryKey() {
          const match = this.route.match(/^\/category\/([^/]+)/);
          if (match) return decodeURIComponent(match[1]);
          if (this.activeIssue) {
            const returnMatch = this.detailReturnRoute.match(/^\/category\/([^/]+)/);
            if (returnMatch) return decodeURIComponent(returnMatch[1]);
            return this.activeIssue.areaKey || "";
          }
          return "";
        },
        activeSubcategory() {
          const match = this.route.match(/^\/category\/[^/]+\/([^/?]+)/);
          return match ? decodeURIComponent(match[1]) : "";
        },
        categories() {
          const categoryMap = new Map();
          this.report.issues.forEach((issue) => {
            const key = issue.areaKey || issue.area || "uncategorized";
            if (!categoryMap.has(key)) {
              categoryMap.set(key, {
                key,
                label: issue.area || "분류 없음",
                count: 0,
              });
            }
            categoryMap.get(key).count += 1;
          });
          const order = {"service": 0, "design": 1, "dev": 2};
          return Array.from(categoryMap.values()).sort((a, b) => (order[a.key] ?? 99) - (order[b.key] ?? 99));
        },
        activeCategory() {
          if (!this.activeCategoryKey) return null;
          return this.categories.find((category) => category.key === this.activeCategoryKey) || null;
        },
        categoryIssues() {
          if (!this.activeCategory) return this.report.issues;
          return this.report.issues.filter((issue) => (issue.areaKey || issue.area || "uncategorized") === this.activeCategory.key);
        },
        subcategories() {
          if (!this.activeCategory) return [];
          const subcategoryMap = new Map();
          const devOrder = {"ai": 0, "update": 1, "html": 2, "css": 3, "javascript": 4, "web_accessibility": 5, "tool": 6, "data_api": 7};
          const devLabels = {"ai": "AI", "update": "Update", "html": "HTML", "css": "CSS", "javascript": "JAVASCRIPT", "web_accessibility": "\uc6f9\uc811\uadfc\uc131", "tool": "TOOL", "data_api": "DATA/API"};
          const designOrder = {"ai": 0, "global": 1};
          const designLabels = {"ai": "AI", "global": "global"};
          if (this.activeCategory.key === "dev") {
            Object.keys(devOrder).forEach((key) => {
              subcategoryMap.set(key, {
                key,
                label: devLabels[key] || key,
                count: 0,
              });
            });
          } else if (this.activeCategory.key === "design") {
            Object.keys(designOrder).forEach((key) => {
              subcategoryMap.set(key, {
                key,
                label: designLabels[key] || key,
                count: 0,
              });
            });
          }
          this.categoryIssues.forEach((issue) => {
            const key = issue.categoryKey || issue.category;
            if (!subcategoryMap.has(key)) {
              subcategoryMap.set(key, {
                key,
                label: issue.category,
                count: 0,
              });
            }
            subcategoryMap.get(key).count += 1;
          });
          const subcategories = Array.from(subcategoryMap.values());
          if (this.activeCategory.key === "dev") {
            return subcategories.sort((a, b) => (devOrder[a.key] ?? 99) - (devOrder[b.key] ?? 99));
          }
          if (this.activeCategory.key === "design") {
            return subcategories.sort((a, b) => (designOrder[a.key] ?? 99) - (designOrder[b.key] ?? 99));
          }
          return subcategories;
        },
        visibleIssues() {
          if (!this.activeCategory) return this.report.issues;
          if (!this.activeSubcategory) return this.categoryIssues;
          return this.categoryIssues.filter((issue) => (issue.categoryKey || issue.category) === this.activeSubcategory);
        },
        currentListRoute() {
          if (this.validListRoute(this.route)) return this.route;
          return "/";
        },
        detailReturnRoute() {
          const routeParam = this.routeReturnParam();
          if (routeParam) return routeParam;
          if (this.activeIssue && this.activeIssue.areaKey) return `/category/${encodeURIComponent(this.activeIssue.areaKey)}`;
          return "/";
        },
      },
      mounted() {
        this.syncDocumentState();
        this.syncHeaderCategoryState();
        window.addEventListener("popstate", this.updateRoute);
      },
      unmounted() {
        document.body.classList.remove("is-story-open");
        window.removeEventListener("popstate", this.updateRoute);
      },
      methods: {
        basePath() {
          const path = window.location.pathname.replace(/\/+$/, "") || "/";
          return path === "/magazine" || path.startsWith("/magazine/") ? "/magazine" : "";
        },
        currentRoute() {
          const base = this.basePath();
          const path = window.location.pathname;
          const routePath = base && (path === base || path.startsWith(`${base}/`)) ? path.slice(base.length) || "/" : path || "/";
          return `${routePath}${window.location.search || ""}`;
        },
        withBasePath(path) {
          const base = this.basePath();
          if (!path || path === "/") return base || "/";
          return `${base}${path}`;
        },
        updateRoute() {
          this.route = this.currentRoute();
          this.syncDocumentState();
          this.syncHeaderCategoryState();
          window.scrollTo({ top: 0, left: 0, behavior: "instant" });
        },
        syncDocumentState() {
          document.body.classList.toggle("is-story-open", Boolean(this.activeIssue));
          document.querySelectorAll(".header-back-link").forEach((link) => {
            link.setAttribute("href", this.activeIssue ? this.withBasePath(this.detailReturnRoute) : this.withBasePath("/"));
          });
        },
        syncHeaderCategoryState() {
          document.querySelectorAll(".header-category-nav a").forEach((link) => {
            const key = link.dataset.categoryNav || "";
            const isActive = key === this.activeCategoryKey;
            link.classList.toggle("is-active", isActive);
            if (isActive) {
              link.setAttribute("aria-current", "page");
            } else {
              link.removeAttribute("aria-current");
            }
          });
        },
        categoryPath(categoryKey) {
          return this.withBasePath(`/category/${encodeURIComponent(categoryKey)}`);
        },
        subcategoryPath(categoryKey, subcategory) {
          return this.withBasePath(`/category/${encodeURIComponent(categoryKey)}/${encodeURIComponent(subcategory)}`);
        },
        storyRoute(issue) {
          return `${this.withBasePath(issue.route || `/articles/${issue.number}`)}?from=${encodeURIComponent(this.currentListRoute)}`;
        },
        validListRoute(route) {
          return route === "/" || route === "" || /^\/category\/(service|design|dev|uiux)(?:\/[^?&]+)?$/.test(route || "");
        },
        routeReturnParam() {
          const match = this.route.match(/[?&]from=([^&]+)/);
          if (!match) return "";
          const route = decodeURIComponent(match[1]);
          return this.validListRoute(route) ? route : "";
        },
        goToList() {
          window.location.href = this.withBasePath(this.detailReturnRoute);
        },
        plainText(htmlText) {
          const node = document.createElement("span");
          node.innerHTML = htmlText || "";
          return node.textContent || node.innerText || "";
        },
        async shareIssue(issue) {
          if (!issue) return;
          this.shareStatus = "";
          const shareData = {
            title: `${issue.platform} | Magazine`,
            text: this.plainText(issue.takeawayHtml),
            url: issue.articleUrl || window.location.href,
          };

          if (navigator.share) {
            try {
              await navigator.share(shareData);
              return;
            } catch (error) {
              if (error && error.name === "AbortError") return;
            }
          }

          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(shareData.url);
            this.shareStatus = "링크 복사됨";
            window.setTimeout(() => {
              this.shareStatus = "";
            }, 1600);
          }
        },
        formatSummaryItem(item) {
          const text = String(item);
          const match = text.match(/^([^:：]{2,18})[:：]\s*(.+)$/);
          if (!match) return `<span class="summary-value summary-note">${text}</span>`;
          return `<span class="summary-key">${match[1]}</span><span class="summary-value">${match[2]}</span>`;
        },
        summaryItemClass(item) {
          const text = String(item);
          return /^([^:：]{2,18})[:：]\s*(.+)$/.test(text) ? "" : "summary-note-row";
        },
        isSummaryFact(item) {
          const text = String(item);
          const match = text.match(/^([^:：]{2,18})[:：]\s*(.+)$/);
          return !match || !["업데이트", "서비스 맥락", "기술 맥락", "변경 전", "변경 후"].includes(match[1]);
        },
        summaryCoreItems(items) {
          return items.filter((item) => !this.isSummaryFact(item));
        },
        summaryFactItems(items) {
          return items.filter((item) => this.isSummaryFact(item));
        },
      },
    }).mount("#app");
  </script>
