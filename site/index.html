 "html": "1일 지급 코인: 400코인"}, {"kind": "list", "html": "최대 누적 코인: 3,200코인"}, {"kind": "list", "html": "갱신 시간: 매일 10시"}], "itemsHtml": ["업데이트: <code>오늘의 발견<\/code> 브랜드관 방문 후 버튼을 누르면 1일 400코인을 지급합니다.", "서비스 맥락: 브랜드관 탐색, 방문 보상, 퍼플코인 페이백을 하나의 흐름으로 묶었습니다.", "변경 전: 브랜드 기획전은 할인 상품을 둘러보는 일회성 탐색에 그치기 쉬웠습니다.", "변경 후: 매일 새로운 브랜드와 방문 보상 버튼을 결합해 반복 방문 이유를 만들었습니다.", "1일 지급 코인: 400코인", "최대 누적 코인: 3,200코인", "갱신 시간: 매일 10시"]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "브랜드를 발견하게 만들려면, 할인보다 먼저 “오늘 다시 들어올 이유”가 필요합니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "SSF SHOP의 <code>오늘의 발견<\/code>은 브랜드관 방문을 보상과 연결한 사례입니다. 표면적으로는 코인 지급 이벤트처럼 보이지만, 실제로는 브랜드 탐색을 반복 방문 구조로 바꾸는 장치에 가깝습니다."}, {"kind": "paragraph", "html": "패션 플랫폼에서 브랜드관은 자주 만들어지지만, 사용자가 매일 다시 방문할 이유를 만드는 일은 쉽지 않습니다. 매일 10시에 새로운 브랜드가 열리고, 방문 후 버튼을 누르면 코인을 받는 구조는 브랜드 탐색을 습관에 가깝게 만듭니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "보상형 UX는 버튼만 크게 만들면 이벤트 소진으로 끝납니다. 디자이너는 보상 버튼 이후의 화면을 봐야 합니다. 브랜드 스토리, 대표 상품 저장, 팔로우 CTA가 자연스럽게 이어질 때 방문 보상이 실제 탐색 경험으로 바뀝니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 어떤 브랜드를 봐야 할지 처음부터 직접 고르지 않아도 됩니다. 서비스가 매일 하나의 브랜드를 추천하고, 방문 행동에 작은 보상을 붙이면 탐색의 시작점이 훨씬 가벼워집니다."}, {"kind": "paragraph", "html": "다만 보상 버튼만 강조하면 체리피킹으로 끝날 수 있습니다. 브랜드 스토리, 대표 상품, 팔로우 CTA가 함께 있어야 방문 보상이 실제 브랜드 탐색 행동으로 이어집니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "브랜드 기획전을 설계할 때는 할인율보다 재방문 리듬을 먼저 봐야 합니다. “매일 바뀌는 이유가 있는가?”, “방문 보상이 브랜드 이해로 이어지는가?”, “보상 이후 팔로우나 상품 저장으로 연결되는가?”가 실제 UX 점검 포인트입니다."}], "itemsHtml": ["@@quote@@브랜드를 발견하게 만들려면, 할인보다 먼저 “오늘 다시 들어올 이유”가 필요합니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@SSF SHOP의 <code>오늘의 발견<\/code>은 브랜드관 방문을 보상과 연결한 사례입니다. 표면적으로는 코인 지급 이벤트처럼 보이지만, 실제로는 브랜드 탐색을 반복 방문 구조로 바꾸는 장치에 가깝습니다.", "@@paragraph@@패션 플랫폼에서 브랜드관은 자주 만들어지지만, 사용자가 매일 다시 방문할 이유를 만드는 일은 쉽지 않습니다. 매일 10시에 새로운 브랜드가 열리고 /knockit/home"}], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: 컨템포러리 패션 셀렉션과 혜택 콘텐츠를 담은 <code>KNOCKIT<\/code> 서비스를 오픈했습니다."}, {"kind": "list", "html": "서비스 맥락: 홈, 검색, 상품 상세 등 여러 화면에서 쇼핑에이전트 기능을 제공한다고 안내했습니다."}, {"kind": "list", "html": "변경 전: 네이버 쇼핑은 검색어 입력 후 상품을 비교하는 범용 탐색 성격이 강했습니다."}, {"kind": "list", "html": "변경 후: 네이버플러스 스토어 안에 패션 버티컬을 열고, 상황·취향·브랜드·혜택을 묶어 발견형 탐색을 강화했습니다."}, {"kind": "list", "html": "네이버플러스 멤버십 사용자는 최대 10% 적립 혜택을 받을 수 있다고 보도됐습니다."}, {"kind": "list", "html": "노크잇 전용 10% 할인 쿠폰은 최대 1만 원 조건으로 제공됩니다."}, {"kind": "list", "html": "<code>셀렉트샵<\/code>에는 패션 아이템 특화 30여 개 편집숍이 포함된 것으로 보도됐습니다."}], "itemsHtml": ["업데이트: 컨템포러리 패션 셀렉션과 혜택 콘텐츠를 담은 <code>KNOCKIT<\/code> 서비스를 오픈했습니다.", "서비스 맥락: 홈, 검색, 상품 상세 등 여러 화면에서 쇼핑에이전트 기능을 제공한다고 안내했습니다.", "변경 전: 네이버 쇼핑은 검색어 입력 후 상품을 비교하는 범용 탐색 성격이 강했습니다.", "변경 후: 네이버플러스 스토어 안에 패션 버티컬을 열고, 상황·취향·브랜드·혜택을 묶어 발견형 탐색을 강화했습니다.", "네이버플러스 멤버십 사용자는 최대 10% 적립 혜택을 받을 수 있다고 보도됐습니다.", "노크잇 전용 10% 할인 쿠폰은 최대 1만 원 조건으로 제공됩니다.", "<code>셀렉트샵<\/code>에는 패션 아이템 특화 30여 개 편집숍이 포함된 것으로 보도됐습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "사고 싶은 것은 있는데, 뭐라고 검색해야 할지 모를 때가 있습니다. KNOCKIT은 그 막막한 첫 장면을 서비스가 대신 열어주는 변화입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "KNOCKIT은 네이버플러스 스토어 안에서 패션을 하나의 독립된 쇼핑 장르처럼 다루려는 시도입니다. 기존 네이버 쇼핑이 검색어와 가격 비교에 강했다면, 이번 변화는 정확한 상품명을 모르는 사용자에게 취향과 상황으로 들어가는 새 입구를 열어줍니다."}, {"kind": "paragraph", "html": "이 이슈는 네이버가 검색형 쇼핑에서 패션 발견형 쇼핑으로 UX를 확장하는 사례입니다. 패션 커머스에서는 상품 수보다 <code>어떤 상황에서 무엇을 입을지<\/code>를 먼저 제안하는 구조가 탐색 피로를 줄입니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "발견형 홈은 “무엇을 추천했는가”보다 “왜 지금 이걸 보여주는가”가 읽혀야 합니다. 카드 안에서 상황 이미지, 스타일 키워드, 브랜드명, 혜택이 한 흐름으로 묶이면 추천은 광고가 아니라 서비스가 큐레이션한 선택지처럼 느껴집니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "핵심은 상품을 먼저 보여주기보다, 상품이 필요한 장면을 먼저 보여주는 방식입니다. 달리기 좋은 날, 집 앞에 가볍게 나갈 때, 분위기 전환이 필요할 때처럼 생활 장면이 먼저 제시되면 사용자는 색상, 가격대, 브랜드, 소재 필터를 처음부터 하나씩 조합하지 않아도 됩니다."}, {"kind": "paragraph", "html": "패션 상품은 이미지 한 장으로 설득하기 어렵습니다. 착용감, 핏, 움직임, 함께 입는 방식이 구매 결정에 영향을 주기 때문입니다. 쇼핑라이브와 라이브 특가가 함께 묶이는 이유도 여기에 있습니다. 발견한 스타일을 바로 확인하고, 혜택까지 연결하는 흐름을 만들 수 있습니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "이 업데이트를 클라이언트에게 이야기한다면, 질문은 “추천 영역을 추가할까요?”가 아닙니다. 더 좋은 질문은 “우리 서비스는 사용자가 어떤 장면에서 상품을 떠올리게 하는가?”입니다."}, {"kind": "paragraph", "html": "멤버십 최대 10% 적립과 전용 쿠폰은 단순한 가격 혜택이 아니라, 발견형 탐색을 구매 전환으로 이어주는 장치입니다. 콘텐츠 큐레이션과 혜택 UX가 같은 흐름 안에 놓일 때, 패션 홈은 단순한 상품 진열장이 아니라 쇼핑을 시작하게 만드는 편집면이 됩니다."}], "itemsHtml": ["@@quote@@사고 싶은 것은 있는데, 뭐라고 검색해야 할지 모를 때가 있습니다. KNOCKIT은 그 막막한 첫 장면을 서비스가 대신 열어주는 변화입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@KNOCKIT은 네이버플러스 스토어 안에서 패션을 하나의 독립된 쇼핑 장르처럼 다루려는 시도입니다. 기존 네이버 쇼핑이 검색어와 가격 비교에 강했다면, 이번 변화는 정확한 상품명을 모르는 사용자에게 취향과 상황으로 들어가는 새 입구를 열어줍니다.", "@@paragraph@@이 이슈는 네이버가 검색형 쇼핑에서 패션 발견형 쇼핑으로 UX를 확장하는 사례입니다. 패션 커머스에서는 상품 수보다 <code>어떤 상황에서 무엇을 입을지<\/code>를 먼저 제안하는 구조가 탐색 피로를 줄입니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@발견형 홈은 “무엇을 추천했는가”보다 “왜 지금 이걸 보여주는가”가 읽혀야 합니다. 카드 안에서 상황 이미지, 스타일 키워드, 브랜드명, 혜택이 한 흐름으로 묶이면 추천은 광고가 아니라 서비스가 큐레이션한 선택지처럼 느껴집니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@핵심은 상품을 먼저 보여주기보다, 상품이 필요한 장면을 먼저 보여주는 방식입니다. 달리기 좋은 날, 집 앞에 가볍게 나갈 때, 분위기 전환이 필요할 때처럼 생활 장면이 먼저 제시되면 사용자는 색상, 가격대, 브랜드, 소재 필터를 처음부터 하나씩 조합하지 않아도 됩니다.", "@@paragraph@@패션 상품은 이미지 한 장으로 설득하기 어렵습니다. 착용감, 핏, 움직임, 함께 입는 방식이 구매 결정에 영향을 주기 때문입니다. 쇼핑라이브와 라이브 특가가 함께 묶이는 이유도 여기에 있습니다. 발견한 스타일을 바로 확인하고, 혜택까지 연결하는 흐름을 만들 수 있습니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@이 업데이트를 클라이언트에게 이야기한다면, 질문은 “추천 영역을 추가할까요?”가 아닙니다. 더 좋은 질문은 “우리 서비스는 사용자가 어떤 장면에서 상품을 떠올리게 하는가?”입니다.", "@@paragraph@@멤버십 최대 10% 적립과 전용 쿠폰은 단순한 가격 혜택이 아니라, 발견형 탐색을 구매 전환으로 이어주는 장치입니다. 콘텐츠 큐레이션과 혜택 UX가 같은 흐름 안에 놓일 때, 패션 홈은 단순한 상품 진열장이 아니라 쇼핑을 시작하게 만드는 편집면이 됩니다."]}]}, {"number": "04", "platform": "네이버플러스 스토어", "areaKey": "uiux", "a 개인화 쇼핑 플랫폼으로 소개하고 있습니다."}, {"kind": "list", "html": "확인 한계: PDF에 있던 클릭률·전환율 수치는 공식 원문에서 직접 확인하지 못해 본문 수치로 쓰지 않았습니다."}], "itemsHtml": ["업데이트: 네이버플러스 스토어 앱에서 <code>쇼핑 AI 에이전트<\/code> 베타를 공개했습니다.", "서비스 맥락: 키워드 검색 이후 AI가 상품 정보 요약, 비교, 리뷰 분석, 조건 필터링을 대화형으로 지원하는 구조입니다.", "변경 전: 사용자가 검색 결과를 훑고, 필터를 조정하고, 개별 상품 리뷰를 직접 읽어야 했습니다.", "변경 후: AI가 탐색 초반부터 구매 기준을 정리하고 비교 후보를 좁히는 역할을 맡습니다.", "공개 시점: 2026년 2월 26일 베타 공개로 보도됐습니다.", "공식 방향: 네이버는 네이버플러스 스토어를 AI 추천 기반 개인화 쇼핑 플랫폼으로 소개하고 있습니다.", "확인 한계: PDF에 있던 클릭률·전환율 수치는 공식 원문에서 직접 확인하지 못해 본문 수치로 쓰지 않았습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "쇼핑 AI의 가치는 상품을 대신 골라주는 데서 끝나지 않습니다. 사용자가 무엇을 비교해야 하는지 먼저 정리해주는 데 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "네이버 쇼핑 AI 에이전트는 KNOCKIT보다 앞선 변화입니다. KNOCKIT이 패션 발견형 홈이라면, 쇼핑 AI 에이전트는 검색 이후의 비교 노동을 줄이는 장치입니다."}, {"kind": "paragraph", "html": "커넥터스 보도 기준으로 이 기능은 네이버플러스 스토어에서 쇼핑 키워드를 입력하면 검색 결과 영역에 AI 답변을 생성하고, 추가 조건을 대화형으로 좁혀가는 방식입니다. 상품 요약, 리뷰 분석, 조건 필터링이 한 흐름에 붙는다는 점에서 기존 검색 필터와 다릅니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "AI 에이전트 UX에서 중요한 것은 챗봇 창의 존재가 아니라 <code>결정 기준의 구조화<\/code>입니다. 사용자가 &quot;소파&quot;라고 검색했을 때 인원수, 공간 크기, 소재, 배송 조건, 후기 신뢰도처럼 비교해야 할 기준을 먼저 보여주면 탐색은 훨씬 짧아집니다."}, {"kind": "paragraph", "html": "다만 베타 단계에서는 답변의 연속성, 상품 특정성, 잘못된 비교 가능성이 남아 있습니다. 그래서 AI 결과에는 추천 근거, 비교 기준, 원문 리뷰 연결, 조건 변경 버튼이 함께 있어야 합니다. 제 의견은 분명합니다. AI 쇼핑은 &quot;대화가 된다&quot;보다 &quot;틀렸을 때 사용자가 바로 검증할 수 있다&quot;가 더 중요합니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 리뷰를 수십 개 읽고, 상세 페이지를 여러 탭으로 열고, 가격·배송·후기 기준을 머릿속에서 다시 계산하는 일을 덜 할 수 있습니다. AI가 후보를 줄이고 비교 기준을 먼저 제시하면 사용자는 선택 자체에 집중할 수 있습니다."}, {"kind": "paragraph", "html": "이 구조는 패션, 리빙, 디지털처럼 비교 속성이 많은 카테고리에서 특히 강합니다. 검색 결과를 많이 보여주는 서비스보다, 고르는 기준을 먼저 만들어주는 서비스가 전환에 더 가깝습니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "클라이언트 서비스에 AI 탐색을 붙인다면 질문은 &quot;챗봇을 넣을까요?&quot;가 아닙니다. &quot;사용자가 지금 직접 비교하고 있는 속성은 무엇인가?&quot;, &quot;AI가 그 속성을 카드와 필터로 다시 돌려줄 수 있는가?&quot;, &quot;추천이 틀렸을 때 사용자가 근거를 확인할 수 있는가?&quot;를 먼저 봐야 합니다."}], "itemsHtml": ["@@quote@@쇼핑 AI의 가치는 상품을 대신 골라주는 데서 끝나지 않습니다. 사용자가 무엇을 비교해야 하는지 먼저 정리해주는 데 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@네이버 쇼핑 AI 에이전트는 KNOCKIT보다 앞선 변화입니다. KNOCKIT이 패션 발견형 홈이라면, 쇼핑 AI 에이전트는 검색 이후의 비교 노동을 줄이는 장치입니다.", "@@paragraph@@커넥터스 보도 기준으로 이 기능은 네이버플러스 스토어에서 쇼핑 키워드를 입력하면 검색 결과 영역에 AI 답변을 생성하고, 추가 조건을 대화형으로 좁혀가는 방식입니다. 상품 요약, 리뷰 분석, 조건 필터링이 한 흐름에 붙는다는 점에서 기존 검색 필터와 다릅니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@AI 에이전트 UX에서 중요한 것은 챗봇 창의 존재가 아니라 <code>결정 기준의 구조화<\/code>입니다. 사용자가 &quot;소파&quot;라고 검색했을 때 인원수, 공간 크기, 소재, 배송 조건, 후기 신뢰도처럼 비교해야 할 기준을 먼저 보여주면 탐색은 훨씬 짧아집니다.", "@@paragraph@@다만 베타 단계에서는 답변의 연속성, 상품 특정성, 잘못된 비교 가능성이 남아 있습니다. 그래서 AI 결과에는 추천 근거, 비교 기준, 원문 리뷰 연결, 조건 변경 버튼이 함께 있어야 합니다. 제 의견은 분명합니다. AI 쇼핑은 &quot;대화가 된다&quot;보다 &quot;틀렸을 때 사용자가 바로 검증할 수 있다&quot;가 더 중요합니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 리뷰를 수십 개 읽고, 상세 페이지를 여러 탭으로 열고, 가격·배송·후기 기준을 머릿속에서 다시 계산하는 일을 덜 할 수 있습니다. AI가 후보를 줄이고 비교 기준을 먼저 제시하면 사용자는 선택 자체에 집중할 수 있습니다.", "@@paragraph@@이 구조는 패션, 리빙, 디지털처럼 비교 속성이 많은 카테고리에서 특히 강합니다. 검색 결과를 많이 보여주는 서비스보다, 고르는 기준을 먼저 만들어주는 서비스가 전환에 더 가깝습니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@클라이언트 서비스에 AI 탐색을 붙인다면 질문은 &quot;챗봇을 넣을까요?&quot;가 아닙니다. &quot;사용자가 지금 직접 비교하고 있는 속성은 무엇인가?&quot;, &quot;AI가 그 속성을 카드와 필터로 다시 돌려줄 수 있는가?&quot;, &quot;추천이 틀렸을 때 사용자가 근거를 확인할 수 있는가?&quot;를 먼저 봐야 합니다."]}]}, {"number": "05", "platform": "롯데홈쇼핑", "areaKey": "uiux", "area": "UIUX", "categoryKey": "ecommerce", "category": "ecommerce", "date": "2026-04-20", "route": "#/story/05", "href": "articles/2026-04-20-story-05.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-05.html", "image": "https://is1-ssl.mzstatic.com/image/thumb/PurpleSource211/v4/47/97/dd/4797dd96-b7bb-585a-e3b2-90307ca961de/iOS_1_1242X2688.jpg/300x650bb.jpg", "imageCaption": "롯데홈쇼핑 App Store 공식 앱 화면", "tags": ["찜", "혜택알림", "재방문"], "takeawayHtml": "마음에 든 상품을 찜해두는 순간, 구매는 끝난 것이 아니라 잠시 미뤄진 상태가 됩니다.", "deckHtml": "<code>새로워진 찜<\/code>에서 관심 상품 혜택 정보를 확인할 수 있게 했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "KR"}, {"label": "카테고리", "valueHtml": "ecommerce"}, {"label": "출처", "valueHtml": "App Store 릴리즈 노트"}], "sourceUrl": "https://apps.apple.com/kr/app/%EB%A1%AF%EB%8D%B0%ED%99%88%EC%87%BC%ED%95%91/id380934119", "sourceTitle": "롯데홈쇼핑 앱 - App Store", "referenceLinks": [], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: <code>새로워진 찜<\/code>에서 관심 상품 혜택 정보를 확인할 수 있게 했습니다."}, {"kind": "list", "html": "서비스 맥락: 홈 매장에서 방송알림을 바로 신청할 수 있게 해, 저장 후 재방문까지 연결합니다."}, {"kind": "list", "html": "변경 전: 찜은 관심 상품을 저장해두는 정적 목록에 가까웠습니다."}, {"kind": "list", "html": "변경 후: 찜한 상품의 혜택 정보와 방송 알림을 통해 재방문 행동을 유도합니다."}], "itemsHtml": ["업데이트: <code>새로워진 찜<\/code>에서 관심 상품 혜택 정보를 확인할 수 있게 했습니다.", "서비스 맥락: 홈 매장에서 방송알림을 바로 신청할 수 있게 해, 저장 후 재방문까지 연결합니다.", "변경 전: 찜은 관심 상품을 저장해두는 정적 목록에 가까웠습니다.", "변경 후: 찜한 상품의 혜택 정보와 방송 알림을 통해 재방문 행동을 유도합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "마음에 든 상품을 찜해두는 순간, 구매는 끝난 것이 아니라 잠시 미뤄진 상태가 됩니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "롯데홈쇼핑의 이번 업데이트는 겉으로 보면 작습니다. 하지만 찜의 역할을 바꾼다는 점에서 꽤 중요합니다. 많은 커머스 서비스에서 찜은 사용자가 언젠가 다시 볼 상품을 쌓아두는 정적인 목록에 머뭅니다."}, {"kind": "paragraph", "html": "홈쇼핑에서는 사정이 조금 다릅니다. 가격, 혜택, 방송 시간처럼 구매 타이밍을 결정하는 정보가 계속 바뀝니다. 찜한 상품의 혜택 정보를 보여주는 것은 저장된 상품을 다시 구매 후보로 끌어올리는 장치입니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "찜 화면은 저장 목록처럼 평평하게 만들기보다 상태 변화가 보이는 피드로 설계하는 편이 좋습니다. 가격 하락, 방송 예정, 쿠폰 적용, 품절 임박 같은 신호를 카드 위계로 정리하면 사용자는 어떤 상품을 먼저 다시 봐야 하는지 바로 알 수 있습니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자가 상품을 발견한 자리에서 방송알림까지 신청할 수 있다면, 찜은 단순 저장을 넘어 다음 행동을 예약하는 기능이 됩니다. 사용자는 다시 검색하지 않아도 되고, 서비스는 사용자가 돌아올 이유를 하나 더 갖게 됩니다."}, {"kind": "paragraph", "html": "좋은 찜 UX는 저장 목록이 아니라 <code>구매 타이밍 알림판<\/code>에 가깝습니다. 가격, 쿠폰, 재고, 방송 알림을 붙일수록 찜은 구매 전 마지막 대기 상태를 다시 활성화하는 CRM 접점이 됩니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "클라이언트 서비스에서 찜을 개선한다면 목록 UI부터 손대기보다, 먼저 <code>찜 이후 어떤 정보를 알려줄 것인가<\/code>를 정해야 합니다. 가격 하락, 쿠폰 만료, 재고 변동, 방송 시작, 배송 마감 같은 정보가 구매 타이밍을 만듭니다."}, {"kind": "paragraph", "html": "찜 화면은 마이페이지 하위 메뉴보다, 구매를 망설이던 사용자를 다시 불러오는 CRM 화면에 가깝습니다. 좋은 찜 UX는 “저장해두었습니다”에서 끝나지 않고, “지금 다시 볼 이유가 생겼습니다”까지 말해야 합니다."}], "itemsHtml": ["@@quote@@마음에 든 상품을 찜해두는 순간, 구매는 끝난 것이 아니라 잠시 미뤄진 상태가 됩니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@롯데홈쇼핑의 이번 업데이트는 겉으로 보면 작습니다. 하지만 찜의 역할을 바꾼다는 점에서 꽤 중요합니다. 많은 커머스 서비스에서 찜은 사용자가 언젠가 다시 볼 상품을 쌓아두는 정적인 목록에 머뭅니다.", "@@paragraph@@홈쇼핑에서는 사정이 조금 다릅니다. 가격, 혜택, 방송 시간처럼 구매 타이밍을 결정하는 정보가 계속 바뀝니다. 찜한 상품의 혜택 정보를 보여주는 것은 저장된 상품을 다시 구매 후보로 끌어올리는 장치입니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@찜 화면은 저장 목록처럼 평평하게 만들기보다 상태 변화가 보이는 피드로 설계하는 편이 좋습니다. 가격 하락, 방송 예정, 쿠폰 적용, 품절 임박 같은 신호를 카드 위계로 정리하면 사용자는 어떤 상품을 먼저 다시 봐야 하는지 바로 알 수 있습니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자가 상품을 발견한 자리에서 방송알림까지 신청할 수 있다면, 찜은 단순 저장을 넘어 다음 행동을 예약하는 기능이 됩니다. 사용자는 다시 검색하지 않아도 되고, 서비스는 사용자가 돌아올 이유를 하나 더 갖게 됩니다.", "@@paragraph@@좋은 찜 UX는 저장 목록이 아니라 <code>구매 타이밍 알림판<\/code>에 가깝습니다. 가격, 쿠폰, 재고, 방송 알림을 붙일수록 찜은 구매 전 마지막 대기 상태를 다시 활성화하는 CRM 접점이 됩니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@클라이언트 서비스에서 찜을 개선한다면 목록 UI부터 손대기보다, 먼저 <code>찜 이후 어떤 정보를 알려줄 것인가<\/code>를 정해야 합니다. 가격 하락, 쿠폰 만료, 재고 변동, 방송 시작, 배송 마감 같은 정보가 구매 타이밍을 만듭니다.", "@@paragraph@@찜 화면은 마이페이지 하위 메뉴보다, 구매를 망설이던 사용자를 다시 불러오는 CRM 화면에 가깝습니다. 좋은 찜 UX는 “저장해두었습니다”에서 끝나지 않고, “지금 다시 볼 이유가 생겼습니다”까지 말해야 합니다."]}]}, {"number": "06", "platform": "쿠팡이츠", "areaKey": "uiux", "area": "UIUX", "categoryKey": "ecommerce", "category": "ecommerce", "date": "2026-04-20", "route": "#/story/06", "href": "articles/2026-04-20-story-06.html", 3월 G마켓 GMV 전년 대비 12% 성장, 누적 셀러 수 66만 명"}], "itemsHtml": ["업데이트: 월 2,900원 적립형 멤버십 <code>꼭 멤버십<\/code> 출시를 예고했습니다.", "서비스 맥락: 월 최대 7만 원 페이백과 <code>캐시 보장<\/code>을 핵심 가치로 내세웠습니다.", "변경 전: 멤버십 가입 전 사용자가 월 이용료 대비 혜택을 충분히 받을지 직접 계산해야 했습니다.", "변경 후: 월 이용료보다 적게 적립되면 차액을 보상하는 구조로 손실 불안을 줄였습니다.", "월 이용료: 2,900원", "월 최대 페이백: 7만 원", "캐시 보장: 월 적립금이 이용료보다 적으면 차액을 스마일캐시로 보상", "구매 없는 달: 월회비 2,900원을 스마일캐시로 지급", "서비스 배경: 2026년 3월 G마켓 GMV 전년 대비 12% 성장, 누적 셀러 수 66만 명"]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "멤버십 가입 버튼 앞에서 사용자가 따지는 것은 혜택의 총액보다 “이번 달 회비를 건질 수 있을까”에 가깝습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "G마켓 꼭 멤버십은 매출 뉴스보다 신규 멤버십 서비스 UX로 봐야 합니다. 핵심은 혜택을 더 크게 포장하는 데 있지 않습니다. 가입 전 사용자가 느끼는 불안을 낮추는 데 있습니다."}, {"kind": "paragraph", "html": "월 2,900원이라는 가격도 중요하지만, 더 눈에 띄는 장치는 적립금이 월회비보다 적으면 차액을 보상한다는 <code>캐시 보장<\/code>입니다. 공식 보도자료 기준으로 구매가 발생하지 않은 달에도 월회비 2,900원을 스마일캐시로 지급합니다. <code>최대 혜택<\/code>보다 <code>손해 보지 않음<\/code> 메시지가 가입 장벽을 낮추는 구조입니다."}, {"kind": "paragraph", "html": "기존 멤버십 화면은 대개 쿠폰, 적립, 제휴 혜택을 길게 나열합니다. 문제는 그 다음입니다. 사용자는 그 많은 혜택 중에서 내가 실제로 얼마나 쓸 수 있는지 직접 계산해야 합니다. 꼭 멤버십은 이 계산 부담을 서비스가 대신 떠안는 구조에 가깝습니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "멤버십 화면은 혜택표보다 계산 UI가 중요합니다. 예상 구매액, 예상 적립액, 월회비 회수 여부를 한 화면에서 시뮬레이션하면 CTA는 단순한 “가입하기”가 아니라 “내가 손해 보지 않는지 확인하기”에 가까워집니다."}, {"kind": "subhead", "html": "수치가 말해주는 배경"}, {"kind": "paragraph", "html": "신세계그룹 뉴스룸에 따르면 G마켓은 2026년 3월 GMV가 전년 대비 12% 성장했고, 누적 셀러 수 66만 명을 기록했습니다. 이 숫자는 꼭 멤버십이 단순한 이벤트가 아니라, 성장세를 이어가기 위한 서비스 장치라는 점을 보여줍니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "멤버십 가입 화면에서는 <code>최대 7만 원<\/code>보다 <code>이번 달 내가 손해 보지 않는 이유<\/code>가 더 강한 메시지일 수 있습니다. 사용자는 큰 숫자보다 자기 상황에 맞는 계산을 원합니다. 예상 구매액, 예상 적립액, 보장 금액, 월회비 회수 여부가 한 화면에서 이어질 때 설득력은 커집니다."}, {"kind": "paragraph", "html": "클라이언트에게는 혜택표를 더 풍성하게 만들기 전에, 사용자가 가입 직전 느끼는 불안이 무엇인지 먼저 물어야 합니다. 가격이 부담인지, 조건이 복잡한지, 자주 쓰지 않을까 봐 걱정되는지에 따라 설득 UX는 완전히 달라집니다."}], "itemsHtml": ["@@quote@@멤버십 가입 버튼 앞에서 사용자가 따지는 것은 혜택의 총액보다 “이번 달 회비를 건질 수 있을까”에 가깝습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@G마켓 꼭 멤버십은 매출 뉴스보다 신규 멤버십 서비스 UX로 봐야 합니다. 핵심은 혜택을 더 크게 포장하는 데 있지 않습니다. 가입 전 사용자가 느끼는 불안을 낮추는 데 있습니다.", "@@paragraph@@월 2,900원이라는 가격도 중요하지만, 더 눈에 띄는 장치는 적립금이 월회비보다 적으면 차액을 보상한다는 <code>캐시 보장<\/code>입니다. 공식 보도자료 기준으로 구매가 발생하지 않은 달에도 월회비 2,900원을 스마일캐시로 지급합니다. <code>최대 혜택<\/code>보다 <code>손해 보지 않음<\/code> 메시지가 가입 장벽을 낮추는 구조입니다.", "@@paragraph@@기존 멤버십 화면은 대개 쿠폰, 적립, 제휴 혜택을 길게 나열합니다. 문제는 그 다음입니다. 사용자는 그 많은 혜택 중에서 내가 실제로 얼마나 쓸 수 있는지 직접 계산해야 합니다. 꼭 멤버십은 이 계산 부담을 서비스가 대신 떠안는 구조에 가깝습니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@멤버십 화면은 혜택표보다 계산 UI가 중요합니다. 예상 구매액, 예상 적립액, 월회비 회수 여부를 한 화면에서 시뮬레이션하면 CTA는 단순한 “가입하기”가 아니라 “내가 손해 보지 않는지 확인하기”에 가까워집니다.", "@@subhead@@수치가 말해주는 배경", "@@paragraph@@신세계그룹 뉴스룸에 따르면 G마켓은 2026년 3월 GMV가 전년 대비 12% 성장했고, 누적 셀러 수 66만 명을 기록했습니다. 이 숫자는 꼭 멤버십이 단순한 이벤트가 아니라, 성장세를 이어가기 위한 서비스 장치라는 점을 보여줍니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@멤버십 가입 화면에서는 <code>최대 7만 원<\/code>보다 <code>이번 달 내가 손해 보지 않는 이유<\/code>가 더 강한 메시지일 수 있습니다. 사용자는 큰 숫자보다 자기 상황에 맞는 계산을 원합니다. 예상 구매액, 예상 적립액, 보장 금액, 월회비 회수 여부가 한 화면에서 이어질 때 설득력은 커집니다.", "@@paragraph@@클라이언트에게는 혜택표를 더 풍성하게 만들기 전에, 사용자가 가입 직전 느끼는 불안이 무엇인지 먼저 물어야 합니다. 가격이 부담인지, 조건이 복잡한지, 자주 쓰지 않을까 봐 걱정되는지에 따라 설득 UX는 완전히 달라집니다."]}]}, {"number": "08", "platform": "화해", "areaKey": "uiux", "area": "UIUX", "categoryKey": "beauty", "category": "beauty", "date": "2026-04-20", "route": "#/story/08", "href": "articles/2026-04-20-story-08.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-08.html", "image": "https://is1-ssl.mzstatic.com/image/thumb/PurpleSource221/v4/e9/3b/fc/e93bfc6a-3639-7618-bfa5-d7ff6f44307a/1__U1102_U1162_U1109_U1161_U110b_U116d_U11bc_U1110_U1166_U11b7__U110b_U1162_U11b8_U1111_U1173_U1105_U1175_U1107_U1172_iOS_1290x2796.png/300x650bb.jpg", "imageCaption": "화해 App Store 공식 앱 화면", "tags": ["AI", "추천", "성분데이터", "뷰티"], "takeawayHtml": "추천이 많아질수록 사용자는 오히려 기준을 찾습니다. 화해의 듀프템 찾기는 그 기준을 ‘내가 이미 좋아하는 제품’에서 시작합니다.", "deckHtml": "<code>듀프템 찾기<\/code> 기능 추가. 좋아하는 제품과 성분이 가장 비슷한 제품을 AI가 자동 추천합니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "KR"}, {"label": "카테고리", "valueHtml": "beauty"}, {"label": "출처", "valueHtml": "App Store 릴리즈 노트"}], "sourceUrl": "https://apps.apple.com/kr/app/%ED%99%94%ED%95%B4-%EB%8C%80%ED%95%9C%EB%AF%BC%EA%B5%AD-1%EB%93%B1-%EB%B7%B0%ED%8B%B0-%EC%95%B1/id940056100", "sourceTitle": "화해 (대한민국 1등 뷰티 앱) 앱 - App Store", "referenceLinks": [], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: <code>듀프템 찾기<\/code> 기능 추가. 좋아하는 제품과 성분이 가장 비슷한 제품을 AI가 자동 추천합니다."}, {"kind": "list", "html": "서비스 맥락: 콘셉트는 <code>같은 효과, 더 가벼운 가격<\/code>. 고가 인생템의 저가 대체품 탐색을 지원합니다."}, {"kind": "list", "html": "변경 전: 사용자가 직접 성분표, 가격, 리뷰를 비교하며 대체 상품을 찾아야 했습니다."}, {"kind": "list", "html": "변경 후: AI가 성분 유사도 기반으로 듀프템 후보를 자동 제시합니다."}], "itemsHtml": ["업데이트: <code>듀프템 찾기<\/code> 기능 추가. 좋아하는 제품과 성분이 가장 비슷한 제품을 AI가 자동 추천합니다.", "서비스 맥락: 콘셉트는 <code>같은 효과, 더 가벼운 가격<\/code>. 고가 인생템의 저가 대체품 탐색을 지원합니다.", "변경 전: 사용자가 직접 성분표, 가격, 리뷰를 비교하며 대체 상품을 찾아야 했습니다.", "변경 후: AI가 성분 유사도 기반으로 듀프템 후보를 자동 제시합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "추천이 많아질수록 사용자는 오히려 기준을 찾습니다. 화해의 듀프템 찾기는 그 기준을 ‘내가 이미 좋아하는 제품’에서 시작합니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "화해의 <code>듀프템 찾기<\/code>는 AI 기능이라는 점보다, 비교의 출발점을 명확하게 잡았다는 점이 중요합니다. 사용자는 막연히 좋은 제품을 찾는 것이 아니라, 이미 좋아하는 제품과 성분이 비슷하면서 가격 부담이 낮은 대안을 찾습니다."}, {"kind": "paragraph", "html": "이 기능은 검색창에 키워드를 넣고 결과를 훑는 방식보다 목적이 선명합니다. <code>내 인생템<\/code>을 기준점으로 삼기 때문에 추천 결과를 받아들이는 신뢰의 출발점이 생깁니다. 사용자는 새로운 제품을 보는 것이 아니라, 익숙한 제품과의 거리를 확인하는 셈입니다."}, {"kind": "paragraph", "html": "이 흐름은 <code>정밀 검색(Fine Search)<\/code> 트렌드와 맞물려 있습니다. 사용자는 “좋은 상품”보다 “내가 쓰는 것과 얼마나 비슷한지”를 확인하고 싶어합니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "AI 추천은 결과 카드보다 근거를 보여주는 인터페이스가 더 중요합니다. 성분 유사도, 다른 성분, 가격 차이, 리뷰 경향을 같은 카드 안에서 비교 가능하게 배치해야 사용자는 추천을 검증할 수 있고, 서비스는 “AI가 골라줬다”보다 “내 기준으로 비교해줬다”는 신뢰를 얻습니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자가 덜 해도 되는 일은 성분표를 옆에 놓고 하나씩 대조하는 일입니다. 가격 민감 소비자의 구매 후보군을 넓히고, 제품 비교 시간을 줄이는 역할을 서비스가 대신 맡는 셈입니다."}, {"kind": "paragraph", "html": "뷰티 커머스에서 성분 데이터는 단순 정보가 아니라 추천 품질을 결정하는 UX 인프라입니다. 추천 근거가 보이지 않으면 AI 추천은 광고처럼 느껴질 수 있습니다. 듀프 추천은 신뢰도 높은 데이터가 없으면 오히려 역효과가 날 수 있습니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "사이트나 앱에 적용한다면 추천 카드에는 결과만 보여주면 부족합니다. <code>비슷한 성분<\/code>, <code>다른 성분<\/code>, <code>가격 차이<\/code>, <code>리뷰 경향<\/code>처럼 사용자가 스스로 납득할 수 있는 근거가 함께 있어야 합니다."}, {"kind": "paragraph", "html": "이 패턴은 패션의 유사 스타일 추천, 도서의 비슷한 취향 작품 추천, 커머스의 대체 상품 추천에도 확장할 수 있습니다. 핵심은 추천을 더 많이 보여주는 것이 아니라, 사용자가 비교하느라 쓰는 시간을 줄여주는 것입니다."}], "itemsHtml": ["@@quote@@추천이 많아질수록 사용자는 오히려 기준을 찾습니다. 화해의 듀프템 찾기는 그 기준을 ‘내가 이미 좋아하는 제품’에서 시작합니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@화해의 <code>듀프템 찾기<\/code>는 AI 기능이라는 점보다, 비교의 출발점을 명확하게 잡았다는 점이 중요합니다. 사용자는 막연히 좋은 제품을 찾는 것이 아니라, 이미 좋아하는 제품과 성분이 비슷하면서 가격 부담이 낮은 대안을 찾습니다.", "@@paragraph@@이 기능은 검색창에 키워드를 넣고 결과를 훑는 방식보다 목적이 선명합니다. <code>내 인생템<\/code>을 기준점으로 삼기 때문에 추천 결과를 받아들이는 신뢰의 출발점이 생깁니다. 사용자는 새로운 제품을 보는 것이 아니라, 익숙한 제품과의 거리를 확인하는 셈입니다.", "@@paragraph@@이 흐름은 <code>정밀 검색(Fine Search)<\/code> 트렌드와 맞물려 있습니다. 사용자는 “좋은 상품”보다 “내가 쓰는 것과 얼마나 비슷한지”를 확인하고 싶어합니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@AI 추천은 결과 카드보다 근거를 보여주는 인터페이스가 더 중요합니다. 성분 유사도, 다른 성분, 가격 차이, 리뷰 경향을 같은 카드 안에서 비교 가능하게 배치해야 사용자는 추천을 검증할 수 있고, 서비스는 “AI가 골라줬다”보다 “내 기준으로 비교해줬다”는 신뢰를 얻습니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자가 덜 해도 되는 일은 성분표를 옆에 놓고 하나씩 대조하는 일입니다. 가격 민감 소비자의 구매 후보군을 넓히고, 제품 비교 시간을 줄이는 역할을 서비스가 대신 맡는 셈입니다.", "@@paragraph@@뷰티 커머스에서 성분 데이터는 단순 정보가 아니라 추천 품질을 결정하는 UX 인프라입니다. 추천 근거가 보이지 않으면 AI 추천은 광고처럼 느껴질 수 있습니다. 듀프 추천은 신뢰도 높은 데이터가 없으면 오히려 역효과가 날 수 있습니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@사이트나 앱에 적용한다면 추천 카드에는 결과만 보여주면 부족합니다. <code>비슷한 성분<\/code>, <code>다른 성분<\/code>, <code>가격 차이<\/code>, <code>리뷰 경향<\/code>처럼 사용자가 스스로 납득할 수 있는 근거가 함께 있어야 합니다.", "@@paragraph@@이 패턴은 패션의 유사 스타일 추천, 도서의 비슷한 취향 작품 추천, 커머스의 대체 상품 추천에도 확장할 수 있습니다. 핵심은 추천을 더 많이 보여주는 것이 아니라, 사용자가 비교하느라 쓰는 시간을 줄여주는 것입니다."]}]}, {"number": "09", "platform": "@cosme", "areaKey": "uiux", "area": "UIUX", "categoryKey": "beauty", "category": "beauty", "date": "2026-04-20", "route": "#/story/09", "href": "articles/2026-04-20-story-09.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-09.html", "image": "https://www.istyle.co.jp/news/uploads/3419f2c3d9db241f0ae8d145dfabe7d8c42784ff.png", "imageCaption": "@cosme 공식 이미지", "tags": ["RNA", "AI피부진단", "뷰티개인화"], "takeawayHtml": "뷰티 개인화는 설문을 줄이는 쪽에서, 사용자의 현재 상태를 데이터로 다시 읽는 쪽으로 이동하고 있습니다.", "deckHtml": "@cosme 앱에 얼굴 이미지로 RNA 발현 정보 기반 피부 타입을 추정하는 <code>肌遺伝子モード判定<\/code> 기능이 탑재됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "JP"}, {"label": "카테고리", "valueHtml": "beauty"}, {"label": "출처", "valueHtml": "istyle 공식 보도자료"}], "sourceUrl": "https://www.istyle.co.jp/news/press/2025/05/0521.html", "sourceTitle": "アイスタイル、顔画像からRNAに基づく肌タイプを推定する 「肌遺伝子モード判定」機能を＠cosmeアプリに搭載 ～生活者と商品の新たな出会い方の創出を目指す～", "referenceLinks": [{"label": "관련 뉴스", "title": "Kao RNA Monitoring 기술", "url": "https://www.kao.com/jp/newsroom/news/release/2019/20190604-001/"}], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: @cosme 앱에 얼굴 이미지로 RNA 발현 정보 기반 피부 타입을 추정하는 <code>肌遺伝子モード判定<\/code> 기능이 탑재됐습니다."}, {"kind": "list", "html": "서비스 맥락: istyle과 Kao의 <code>RNA Co-creation Consortium<\/code>, Perfect Corporation의 AI 피부 분석 기술이 결합된 사례입니다."}, {"kind": "list", "html": "변경 전: 일반 피부 진단은 건조, 유분, 모공, 톤처럼 표면 상태 중심으로 해석되는 경우가 많았습니다."}, {"kind": "list", "html": "변경 후: 스마트폰으로 촬영한 민낯 사진을 바탕으로 피지 RNA 발현 정보 기반 피부 모드를 즉시 추정합니다."}, {"kind": "list", "html": "진단 모드: <code>C1(つるつる期)<\/code>와 <code>C2(ぴかぴか期)<\/code> 2가지로 분류합니다."}, {"kind": "list", "html": "케어 항목: 번들거림, 모공, 주름, 칙칙함, 노란기, 윤기 등 6개 파라미터를 제시합니다."}, {"kind": "list", "html": "확인 한계: PDF에는 2026년 3월 6일로 적혀 있었지만, 직접 확인 가능한 공식 보도자료는 2025년 5월 21일입니다."}], "itemsHtml": ["업데이트: @cosme 앱에 얼굴 이미지로 RNA 발현 정보 기반 피부 타입을 추정하는 <code>肌遺伝子モード判定<\/code> 기능이 탑재됐습니다.", "서비스 맥락: istyle과 Kao의 <code>RNA Co-creation Consortium<\/code>, Perfect Corporation의 AI 피부 분석 기술이 결합된 사례입니다.", "변경 전: 일반 피부 진단은 건조, 유분, 모공, 톤처럼 표면 상태 중심으로 해석되는 경우가 많았습니다.", "변경 후: 스마트폰으로 촬영한 민낯 사진을 바탕으로 피지 RNA 발현 정보 기반 피부 모드를 즉시 추정합니다.", "진단 모드: <code>C1(つるつる期)<\/code>와 <code>C2(ぴかぴか期)<\/code> 2가지로 분류합니다.", "케어 항목: 번들거림, 모공, 주름, 칙칙함, 노란기, 윤기 등 6개 파라미터를 제시합니다.", "확인 한계: PDF에는 2026년 3월 6일로 적혀 있었지만, 직접 확인 가능한 공식 보도자료는 2025년 5월 21일입니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "뷰티 개인화는 설문을 줄이는 쪽에서, 사용자의 현재 상태를 데이터로 다시 읽는 쪽으로 이동하고 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "@cosme의 RNA 피부 진단은 단순한 카메라 피부 분석보다 한 단계 깊은 개인화 레퍼런스입니다. 공식 자료에 따르면 Kao의 RNA 연구 기반 AI가 사용자의 민낯 사진을 통계적으로 분석해 현재 피부 상태를 두 가지 피부 유전자 모드로 분류합니다."}, {"kind": "paragraph", "html": "중요한 점은 RNA를 직접 채취하지 않는다는 것입니다. 기존 피지 RNA 분석은 채취와 분석 비용이 컸지만, 이번 기능은 얼굴 이미지만으로 RNA 발현 정보 기반 피부 타입을 추정합니다. 사용자의 진입 장벽을 낮춘 것이 UX상 핵심입니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "이 기능의 가치는 &quot;AI 피부 진단&quot;이라는 문구보다 <code>진단 이후 상품 선택 기준<\/code>에 있습니다. @cosme는 피부 모드별로 케어 포인트를 제시하고, 결과 화면에서 상품 응모 캠페인까지 연결합니다. 진단이 콘텐츠로 끝나는 것이 아니라, 추천과 재방문 흐름으로 이어지는 구조입니다."}, {"kind": "paragraph", "html": "다만 이런 수준의 개인화는 독자 구현 난도가 높습니다. Kao급 연구 데이터와 기술 파트너십이 필요하기 때문입니다. 클라이언트에게는 자체 개발보다 신뢰 가능한 진단 파트너, 결과 설명 UX, 추천 근거 UI를 먼저 검토하라고 말하는 편이 현실적입니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "사용자는 긴 설문을 채우거나 피부 상태를 스스로 해석하지 않아도 됩니다. 촬영, 진단, 케어 포인트, 상품 선택까지 이어지면 뷰티 탐색의 출발점이 훨씬 명확해집니다."}, {"kind": "paragraph", "html": "특히 월 단위 캠페인 구조는 진단을 1회성 이벤트로 끝내지 않고 피부 변화 트래킹과 재방문 이유로 바꿉니다. 뷰티 서비스에서 진단 UX는 &quot;내 피부가 어떤가&quot;보다 &quot;이번 달 무엇을 다르게 써야 하나&quot;까지 답해야 쓸모가 생깁니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "뷰티·헬스 클라이언트라면 &quot;AI 진단을 넣을 수 있나?&quot;보다 &quot;진단 결과가 다음 행동으로 이어지는가?&quot;를 먼저 봐야 합니다. 결과 카드가 제품 추천, 루틴 변경, 재측정 주기, 비교 가능한 수치로 이어지지 않으면 AI 진단은 흥미 기능에 머뭅니다."}], "itemsHtml": ["@@quote@@뷰티 개인화는 설문을 줄이는 쪽에서, 사용자의 현재 상태를 데이터로 다시 읽는 쪽으로 이동하고 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@@cosme의 RNA 피부 진단은 단순한 카메라 피부 분석보다 한 단계 깊은 개인화 레퍼런스입니다. 공식 자료에 따르면 Kao의 RNA 연구 기반 AI가 사용자의 민낯 사진을 통계적으로 분석해 현재 피부 상태를 두 가지 피부 유전자 모드로 분류합니다.", "@@paragraph@@중요한 점은 RNA를 직접 채취하지 않는다는 것입니다. 기존 피지 RNA 분석은 채취와 분석 비용이 컸지만, 이번 기능은 얼굴 이미지만으로 RNA 발현 정보 기반 피부 타입을 추정합니다. 사용자의 진입 장벽을 낮춘 것이 UX상 핵심입니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@이 기능의 가치는 &quot;AI 피부 진단&quot;이라는 문구보다 <code>진단 이후 상품 선택 기준<\/code>에 있습니다. @cosme는 피부 모드별로 케어 포인트를 제시하고, 결과 화면에서 상품 응모 캠페인까지 연결합니다. 진단이 콘텐츠로 끝나는 것이 아니라, 추천과 재방문 흐름으로 이어지는 구조입니다.", "@@paragraph@@다만 이런 수준의 개인화는 독자 구현 난도가 높습니다. Kao급 연구 데이터와 기술 파트너십이 필요하기 때문입니다. 클라이언트에게는 자체 개발보다 신뢰 가능한 진단 파트너, 결과 설명 UX, 추천 근거 UI를 먼저 검토하라고 말하는 편이 현실적입니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@사용자는 긴 설문을 채우거나 피부 상태를 스스로 해석하지 않아도 됩니다. 촬영, 진단, 케어 포인트, 상품 선택까지 이어지면 뷰티 탐색의 출발점이 훨씬 명확해집니다.", "@@paragraph@@특히 월 단위 캠페인 구조는 진단을 1회성 이벤트로 끝내지 않고 피부 변화 트래킹과 재방문 이유로 바꿉니다. 뷰티 서비스에서 진단 UX는 &quot;내 피부가 어떤가&quot;보다 &quot;이번 달 무엇을 다르게 써야 하나&quot;까지 답해야 쓸모가 생깁니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@뷰티·헬스 클라이언트라면 &quot;AI 진단을 넣을 수 있나?&quot;보다 &quot;진단 결과가 다음 행동으로 이어지는가?&quot;를 먼저 봐야 합니다. 결과 카드가 제품 추천, 루틴 변경, 재측정 주기, 비교 가능한 수치로 이어지지 않으면 AI 진단은 흥미 기능에 머뭅니다."]}]}, {"number": "10", "platform": "올리브영", "areaKey": "uiux", "area": "UIUX", "categoryKey": "beauty", "category": "beauty", "date": "2026-04-20", "route": "#/story/10", "href": "articles/2026-04-20-story-10.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-10.html", "image": "https://wimg.sedaily.com/news/legacy/2025/07/12/2GVBK810L6_1_m.png", "imageCaption": "올리브영 공식 이미지", "tags": ["일본진출", "크로스보더", "K뷰티"], "takeawayHtml": "K뷰티의 일본 진출은 상품을 수출하는 문제가 아니라, 발견과 체험을 어디에서 시작하게 할지 정하는 문제입니다.", "deckHtml": "올리브영이 일본 오프라인 매장 진출을 검토하고 있다는 보도가 확인됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "KR→JP"}, {"label": "카테고리", "valueHtml": "beauty"}, {"label": "출처", "valueHtml": "서울경제"}], "sourceUrl": "https://signalm.sedaily.com/NewsView/2GVBK810L6/GD0209", "sourceTitle": "[단독]", "referenceLinks": [], "sections": [{"title": "서비스 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: 올리브영이 일본 오프라인 매장 진출을 검토하고 있다는 보도가 확인됐습니다."}, {"kind": "list", "html": "서비스 맥락: 글로벌몰 일본발 매출 증가와 일본 내 K뷰티 수요를 바탕으로 온라인에서 오프라인 접점으로 확장하려는 흐름입니다."}, {"kind": "list", "html": "변경 전: 일본 고객은 글로벌몰, 라쿠텐·큐텐 등 온라인 채널과 일부 입점 브랜드 중심으로 K뷰티를 접했습니다."}, {"kind": "list", "html": "변경 후: 도쿄 1호점이 현실화되면 큐레이션, 테스터, 오프라인 체험, 글로벌몰 재구매가 연결되는 옴니채널 접점이 생깁니다."}, {"kind": "list", "html": "글로벌몰 일본발 매출: 전년 대비 258% 증가로 보도됐습니다."}, {"kind": "list", "html": "일본 주요 상권 변수: 도쿄 주요 지역 상업용 부동산 공실률 0.7%로 보도됐습니다."}, {"kind": "list", "html": "확인 한계: CJ올리브영은 보도에서 일본 오프라인 진출 관련 결정된 내용은 없다고 밝혔습니다."}], "itemsHtml": ["업데이트: 올리브영이 일본 오프라인 매장 진출을 검토하고 있다는 보도가 확인됐습니다.", "서비스 맥락: 글로벌몰 일본발 매출 증가와 일본 내 K뷰티 수요를 바탕으로 온라인에서 오프라인 접점으로 확장하려는 흐름입니다.", "변경 전: 일본 고객은 글로벌몰, 라쿠텐·큐텐 등 온라인 채널과 일부 입점 브랜드 중심으로 K뷰티를 접했습니다.", "변경 후: 도쿄 1호점이 현실화되면 큐레이션, 테스터, 오프라인 체험, 글로벌몰 재구매가 연결되는 옴니채널 접점이 생깁니다.", "글로벌몰 일본발 매출: 전년 대비 258% 증가로 보도됐습니다.", "일본 주요 상권 변수: 도쿄 주요 지역 상업용 부동산 공실률 0.7%로 보도됐습니다.", "확인 한계: CJ올리브영은 보도에서 일본 오프라인 진출 관련 결정된 내용은 없다고 밝혔습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "K뷰티의 일본 진출은 상품을 수출하는 문제가 아니라, 발견과 체험을 어디에서 시작하게 할지 정하는 문제입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "올리브영 일본 진출 이슈는 앱 업데이트는 아니지만, 커머스 UX 관점에서는 중요합니다. 일본 뷰티 시장은 오프라인 체험 선호가 강하고, 드러그스토어와 전문점의 영향력이 큽니다. 온라인 매출 성장이 수요 검증이라면, 오프라인 매장은 신뢰와 체험을 만드는 단계입니다."}, {"kind": "paragraph", "html": "서울경제 보도 기준으로 올리브영 글로벌몰의 일본발 매출은 전년 대비 258% 증가했습니다. 이 숫자는 일본 내 K뷰티 수요가 이미 온라인에서 확인됐다는 뜻입니다. 다음 과제는 그 수요를 어떤 오프라인 경험으로 전환하느냐입니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "오프라인 매장을 단순 판매 채널로 보면 이 이슈의 핵심을 놓칩니다. 올리브영이 강한 부분은 브랜드 큐레이션, 랭킹, 리뷰, 추천, 프로모션을 한 화면처럼 묶는 편집력입니다. 일본 매장에서도 이 구조가 살아야 합니다."}, {"kind": "paragraph", "html": "매장에서는 테스트, 랭킹, 피부 고민별 진열, QR 기반 글로벌몰 연결, 재구매 쿠폰, 현지 인기 리뷰가 하나의 루프로 이어져야 합니다. 제 의견으로는 일본 진출의 승부처는 &quot;한국 상품이 많다&quot;가 아니라 &quot;일본 고객이 처음 사도 덜 실패하게 고를 수 있다&quot;입니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "일본 사용자는 낯선 K뷰티 브랜드를 직접 조사하고, 리뷰를 번역하고, 자기 피부 고민에 맞는 제품을 따로 비교하는 일을 덜 해야 합니다. 매장과 앱이 함께 작동하면 사용자는 현장에서 체험하고, 온라인에서 다시 찾고, 다음 구매까지 이어갈 수 있습니다."}, {"kind": "paragraph", "html": "올리브영 같은 큐레이션 플랫폼의 해외 확장은 SKU를 많이 가져가는 전략보다 현지 고객의 첫 구매 실패를 줄이는 전략이 더 중요합니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "크로스보더를 준비하는 클라이언트라면 &quot;어느 나라에 팔까?&quot;보다 &quot;그 나라 사용자가 처음 구매할 때 무엇을 불안해하는가?&quot;를 먼저 물어야 합니다. 오프라인 체험, 현지 리뷰, 랭킹, 재구매 경로가 함께 설계되지 않으면 해외 진출은 단순 유통 확장에 그칩니다."}], "itemsHtml": ["@@quote@@K뷰티의 일본 진출은 상품을 수출하는 문제가 아니라, 발견과 체험을 어디에서 시작하게 할지 정하는 문제입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@올리브영 일본 진출 이슈는 앱 업데이트는 아니지만, 커머스 UX 관점에서는 중요합니다. 일본 뷰티 시장은 오프라인 체험 선호가 강하고, 드러그스토어와 전문점의 영향력이 큽니다. 온라인 매출 성장이 수요 검증이라면, 오프라인 매장은 신뢰와 체험을 만드는 단계입니다.", "@@paragraph@@서울경제 보도 기준으로 올리브영 글로벌몰의 일본발 매출은 전년 대비 258% 증가했습니다. 이 숫자는 일본 내 K뷰티 수요가 이미 온라인에서 확인됐다는 뜻입니다. 다음 과제는 그 수요를 어떤 오프라인 경험으로 전환하느냐입니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@오프라인 매장을 단순 판매 채널로 보면 이 이슈의 핵심을 놓칩니다. 올리브영이 강한 부분은 브랜드 큐레이션, 랭킹, 리뷰, 추천, 프로모션을 한 화면처럼 묶는 편집력입니다. 일본 매장에서도 이 구조가 살아야 합니다.", "@@paragraph@@매장에서는 테스트, 랭킹, 피부 고민별 진열, QR 기반 글로벌몰 연결, 재구매 쿠폰, 현지 인기 리뷰가 하나의 루프로 이어져야 합니 nd": "list", "html": "변경 전: 콘텐츠 추천, 감상 중 조작, 책갈피 동기화가 각각 분리된 사용 경험에 가까웠습니다."}, {"kind": "list", "html": "변경 후: 추천 홈, 뷰어 조작, 기기 간 이어보기 품질을 함께 개선했습니다."}], "itemsHtml": ["업데이트: <code>웹소설 추천 홈<\/code>이 새로 열렸습니다.", "서비스 맥락: 웹툰 스크롤바 활용, 만화 책갈피 기기별 동기화도 함께 개선됐습니다.", "변경 전: 콘텐츠 추천, 감상 중 조작, 책갈피 동기화가 각각 분리된 사용 경험에 가까웠습니다.", "변경 후: 추천 홈, 뷰어 조작, 기기 간 이어보기 품질을 함께 개선했습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "콘텐츠 서비스의 재방문은 “다음에 볼 것”을 추천하는 일과 “어디까지 봤는지”를 기억하는 일이 함께 맞물릴 때 생깁니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "리디 업데이트에서 눈에 띄는 점은 추천 홈, 뷰어 조작, 책갈피 동기화가 함께 언급됐다는 점입니다. 리디는 발견, 감상, 이어보기를 한 번에 다듬었습니다."}, {"kind": "paragraph", "html": "많은 서비스가 추천 영역만 개선하지만, 실제 재방문은 콘텐츠를 찾는 순간과 읽는 도중의 마찰이 함께 줄어들 때 만들어집니다. 추천 홈만 좋아서는 부족하고, 읽는 도중의 위치와 기기 간 맥락까지 이어져야 합니다."}, {"kind": "paragraph", "html": "웹소설 추천 홈은 사용자가 다음 작품을 찾는 발견 영역입니다. 웹툰 스크롤바는 감상 중 위치를 다루는 인터페이스이고, 만화 책갈피 기기별 동기화는 사용자가 다시 돌아왔을 때 읽던 맥락을 잃지 않게 만드는 장치입니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "콘텐츠 홈은 추천 영역과 이어보기 영역을 따로 디자인하면 힘이 약해집니다. 새 작품 카드 옆에 최근 감상 상태, 장르 선호, 중단 지점이 함께 읽히면 다음 클릭은 단순 탐색이 아니라 실제 감상으로 이어질 가능성이 커집니다."}, {"kind": "subhead", "html": "커머스에 적용하면 무엇이 보이나"}, {"kind": "paragraph", "html": "이 구조는 콘텐츠 서비스에만 머물지 않습니다. 이커머스에서도 추천 상품, 상세 탐색, 최근 본 상품, 찜 상태 동기화가 같은 방식으로 작동합니다. 사용자가 떠났다가 돌아왔을 때 “어디서 다시 시작해야 하는지”를 알려주는 서비스가 재방문을 더 자연스럽게 만듭니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "클라이언트 서비스에서 추천 기능을 기획할 때는 <code>추천 정확도<\/code>만 묻는 데서 멈추면 안 됩니다. 추천 이후 사용자가 상세 탐색으로 넘어가는지, 다시 돌아왔을 때 이전 맥락을 이어갈 수 있는지까지 함께 봐야 합니다."}, {"kind": "paragraph", "html": "좋은 추천 UX는 첫 클릭을 만드는 기능에서 끝나지 않습니다. 사용자가 다시 돌아왔을 때 “아, 여기서 이어가면 되겠다”라고 느끼게 만드는 기능까지 포함합니다."}], "itemsHtml": ["@@quote@@콘텐츠 서비스의 재방문은 “다음에 볼 것”을 추천하는 일과 “어디까지 봤는지”를 기억하는 일이 함께 맞물릴 때 생깁니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@리디 업데이트에서 눈에 띄는 점은 추천 홈, 뷰어 조작, 책갈피 동기화가 함께 언급됐다는 점입니다. 리디는 발견, 감상, 이어보기를 한 번에 다듬었습니다.", "@@paragraph@@많은 서비스가 추천 영역만 개선하지만, 실제 재방문은 콘텐츠를 찾는 순간과 읽는 도중의 마찰이 함께 줄어들 때 만들어집니다. 추천 홈만 좋아서는 부족하고, 읽는 도중의 위치와 기기 간 맥락까지 이어져야 합니다.", "@@paragraph@@웹소설 추천 홈은 사용자가 다음 작품을 찾는 발견 영역입니다. 웹툰 스크롤바는 감상 중 위치를 다루는 인터페이스이고, 만화 책갈피 기기별 동기화는 사용자가 다시 돌아왔을 때 읽던 맥락을 잃지 않게 만드는 장치입니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@콘텐츠 홈은 추천 영역과 이어보기 영역을 따로 디자인하면 힘이 약해집니다. 새 작품 카드 옆에 최근 감상 상태, 장르 선호, 중단 지점이 함께 읽히면 다음 클릭은 단순 탐색이 아니라 실제 감상으로 이어질 가능성이 커집니다.", "@@subhead@@커머스에 적용하면 무엇이 보이나", "@@paragraph@@이 구조는 콘텐츠 서비스에만 머물지 않습니다. 이커머스에서도 추천 상품, 상세 탐색, 최근 본 상품, 찜 상태 동기화가 같은 방식으로 작동합니다. 사용자가 떠났다가 돌아왔을 때 “어디서 다시 시작해야 하는지”를 알려주는 서비스가 재방문을 더 자연스럽게 만듭니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@클라이언트 서비스에서 추천 기능을 기획할 때는 <code>추천 정확도<\/code>만 묻는 데서 멈추면 안 됩니다. 추천 이후 사용자가 상세 탐색으로 넘어가는지, 다시 돌아왔을 때 이전 맥락을 이어갈 수 있는지까지 함께 봐야 합니다.", "@@paragraph@@좋은 추천 UX는 첫 클릭을 만드는 기능에서 끝나지 않습니다. 사용자가 다시 돌아왔을 때 “아, 여기서 이어가면 되겠다”라고 느끼게 만드는 기능까지 포함합니다."]}]}, {"number": "12", "platform": "YES24 eBook", "areaKey": "uiux", "area": "UIUX", "categoryKey": "book_content", "category": "book", "date": "2026-04-20", "route": "#/story/12", "href": "articles/2026-04-20-story-12.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-12.html", "image": "https://is1-ssl.mzstatic.com/image/thumb/PurpleSource221/v4/c6/50/f9/c650f984-3b2f-6acf-48ff-2f4a31eee8f6/Appstore_preview_69_01.png/300x650bb.jpg", "imageCaption": "YES24 eBook App Store 공식 앱 화면", "tags": ["로그인", "복귀UX"], "takeawayHtml": "로그인은 인증 절차가 아니라, 사용자가 다시 읽던 자리로 돌아가는 첫 관문입니다.", "deckHtml": "SNS 간편 로그인 기능이 추가됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "KR"}, {"label": "카테고리", "valueHtml": "book_content"}, {"label": "출처", "valueHtml": "App Store 릴리즈 노트"}], "sourceUrl": "https://apps.apple.com/kr/app/%EC%98%88%EC%8A%A424-ebook-%ED%81%AC%EB%A0%88%EB%A7%88%ED%81%B4%EB%9F%BD/id1009076561", "sourceTitle": "예스24 eBook & 크레마클럽 앱 - App Store", "referenceLinks": [], "sections": [{"title": 자연스럽게 만듭니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "선물 UX의 핵심은 상품 추천보다 수령 정보 처리입니다. 사용자가 &quot;이걸 보내고 싶다&quot;고 느낀 직후, 서비스는 결제와 메시지 전달까지 짧게 끝내야 합니다. 받는 사람 정보 입력, 배송지 수정, 품절 대체 같은 복잡한 절차는 가능한 한 뒤쪽으로 보내야 합니다."}, {"kind": "paragraph", "html": "楽天市場의 업데이트는 큰 화면 개편은 아니지만 구매 전환 관점에서는 가치가 큽니다. 특히 생일, 감사, 시즌 선물처럼 즉흥 구매가 많은 카테고리에서 효과가 날 수 있습니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "보낸 사람은 받는 사람의 주소를 미리 확인하지 않아도 됩니다. 받는 사람도 URL을 통해 자신이 직접 수령 흐름에 들어갈 수 있어, 주소 오입력이나 배송지 확인 부담이 줄어듭니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "선물 기능을 가진 커머스라면 &quot;선물 포장 옵션이 있는가?&quot;보다 &quot;받는 사람 정보를 언제 요구하는가?&quot;를 먼저 점검해야 합니다. 선물 UX는 옵션이 아니라 타이밍의 문제입니다."}], "itemsHtml": ["@@quote@@좋은 선물 UX는 받는 사람의 정보를 먼저 요구하지 않을수록 가볍습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@楽天市場의 소셜기프트는 선물 구매에서 가장 큰 마찰 중 하나를 뒤로 미룹니다. 선물하려는 마음이 생긴 순간, 사용자가 주소를 묻고 답을 기다리는 과정은 구매 흐름을 끊습니다. URL 전달 방식은 구매 결정을 먼저 완료하게 하고, 수령 정보 입력은 받는 사람 쪽으로 넘깁니다.", "@@paragraph@@이 변화는 커머스에서 꽤 실질적입니다. 선물은 일반 구매보다 감정적 동기가 강하지만, 배송 정보 입력에서 갑자기 행정 업무처럼 바뀌기 쉽습니다. 소셜기프트는 이 전환을 더 자연스럽게 만듭니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@선물 UX의 핵심은 상품 추천보다 수령 정보 처리입니다. 사용자가 &quot;이걸 보내고 싶다&quot;고 느낀 직후, 서비스는 결제와 메시지 전달까지 짧게 끝내야 합니다. 받는 사람 정보 입력, 배송지 수정, 품절 대체 같은 복잡한 절차는 가능한 한 뒤쪽으로 보내야 합니다.", "@@paragraph@@楽天市場의 업데이트는 큰 화면 개편은 아니지만 구매 전환 관점에서는 가치가 큽니다. 특히 생일, 감사, 시즌 선물처럼 즉흥 구매가 많은 카테고리에서 효과가 날 수 있습니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@보낸 사람은 받는 사람의 주소를 미리 확인하지 않아도 됩니다. 받는 사람도 URL을 통해 자신이 직접 수령 흐름에 들어갈 수 있어, 주소 오입력이나 배송지 확인 부담이 줄어듭니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@선물 기능을 가진 커머스라면 &quot;선물 포장 옵션이 있는가?&quot;보다 &quot;받는 사람 정보를 언제 요구하는가?&quot;를 먼저 점검해야 합니다. 선물 UX는 옵션이 아니라 타이밍의 문제입니다."]}]}, {"number": "15", "platform": "ZOZOTOWN", "areaKey": "uiux", "area": "UIUX", "categoryKey": "fashion", "category": "fashion", "date": "2026-04-20", "route": "#/story/15", "href": "articles/2026-04-20-story-15.html", "articleUr ."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "ZOZOTOWN은 일본 패션 커머스에서 계속 봐야 하는 기준 서비스입니다. 다만 이번 릴리즈 노트는 구체 기능명을 밝히지 않았습니다. 그래서 본문에는 넣되, 강한 트렌드 사례가 아니라 JP 시장 모니터링 카드로 다루는 편이 정확합니다."}, {"kind": "paragraph", "html": "이런 항목을 남겨두는 이유는 단순합니다. 다음 주나 다음 달에 구체 기능이 공개됐을 때 변화의 흐름을 이어서 볼 수 있기 때문입니다."}, {"kind": "subhead", "html": "UIUX 전문가 관점"}, {"kind": "paragraph", "html": "패션 커머스에서 <code>일부 기능 개선<\/code>은 검색, 사이즈, 찜, 추천, 결제, 배송 중 어디에나 걸릴 수 있습니다. 기능명이 없을 때는 개선 효과를 추정하지 않는 게 맞습니다. 대신 대표 앱의 업데이트 빈도와 릴리즈 표현을 추적하면, 큰 개편 전후의 신호를 잡을 수 있습니다."}, {"kind": "subhead", "html": "사용자는 무엇을 덜 해도 될까"}, {"kind": "paragraph", "html": "이번 릴리즈 노트만으로는 사용자가 무엇을 덜 하게 됐는지 단정할 수 없습니다. 추가 화면 확인이나 공식 공지가 나오면 다시 판단해야 합니다."}, {"kind": "subhead", "html": "클라이언트에게 던질 질문"}, {"kind": "paragraph", "html": "경쟁사 릴리즈를 볼 때 <code>기능 개선<\/code>이라는 문구만으로 기획 방향을 추정하고 있지는 않은가? 근거가 약한 항목은 관찰 대상으로 남기고, 실제 화면 변화가 확인될 때 의사결정에 반영하는 편이 안전합니다."}], "itemsHtml": ["@@quote@@모든 업데이트를 트렌드로 부풀리면 리포트의 신뢰도가 떨어집니다. ZOZOTOWN은 이번 주에는 관찰 카드로 두는 게 맞습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@ZOZOTOWN은 일본 패션 커머스에서 계속 봐야 하는 기준 서비스입니다. 다만 이번 릴리즈 노트는 구체 기능명을 밝히지 않았습니다. 그래서 본문에는 넣되, 강한 트렌드 사례가 아니라 JP 시장 모니터링 카드로 다루는 편이 정확합니다.", "@@paragraph@@이런 항목을 남겨두는 이유는 단순합니다. 다음 주나 다음 달에 구체 기능이 공개됐을 때 변화의 흐름을 이어서 볼 수 있기 때문입니다.", "@@subhead@@UIUX 전문가 관점", "@@paragraph@@패션 커머스에서 <code>일부 기능 개선<\/code>은 검색, 사이즈, 찜, 추천, 결제, 배송 중 어디에나 걸릴 수 있습니다. 기능명이 없을 때는 개선 효과를 추정하지 않는 게 맞습니다. 대신 대표 앱의 업데이트 빈도와 릴리즈 표현을 추적하면, 큰 개편 전후의 신호를 잡을 수 있습니다.", "@@subhead@@사용자는 무엇을 덜 해도 될까", "@@paragraph@@이번 릴리즈 노트만으로는 사용자가 무엇을 덜 하게 됐는지 단정할 수 없습니다. 추가 화면 확인이나 공식 공지가 나오면 다시 판단해야 합니다.", "@@subhead@@클라이언트에게 던질 질문", "@@paragraph@@경쟁사 릴리즈를 볼 때 <code>기능 개선<\/code>이라는 문구만으로 기획 방향을 추정하고 있지는 않은가? 근거가 약한 항목은 관찰 대상으로 남기고, 실제 화면 변화가 확인될 때 의사결정에 반영하는 편이 안전합니다."]}]}, {"number": "16", "platform": "Next.js", "areaKey": "dev", "area": "DEV", "categoryKey": "tool", "category": "TOOL", "date": "2026-04-20", "route": "#/story/16", "href": "articles/2026-04-20-story-16.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-16.html", "image": "https://h8dxkfmaphn8o0p3.public.blob.vercel-storage.com/static/blog/nextjs-across-platforms/twitter-card.png", "imageCaption": "Next.js 공식 이미지", "tags": ["AdapterAPI", "OpenNext", "배포표준화"], "takeawayHtml": "프론트엔드 프레임워크의 경쟁 축이 화면 렌더링에서 배포 계약의 표준화로 이동하고 있습니다.", "deckHtml": "Next.js 16.2에서 안정화된 Adapter API를 기반으로 배포 플랫폼별 어댑터 계약을 공개했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "Next.js 공식 블로그"}], "sourceUrl": "https://nextjs.org/blog/nextjs-across-platforms", "sourceTitle": "Next.js Across Platforms: Adapters, OpenNext, and Our Commitments", "referenceLinks": [{"label": "관련 뉴스", "title": "Next.js 16.2", "url": "https://nextjs.org/blog/next-16-2"}], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Next.js 16.2에서 안정화된 Adapter API를 기반으로 배포 플랫폼별 어댑터 계약을 공개했습니다."}, {"kind": "list", "html": "기술 맥락: OpenNext, Netlify, Cloudflare, AWS Amplify, Google Cloud와 함께 프레임워크 출력물을 플랫폼이 해석할 수 있는 공용 인터페이스로 정리했습니다."}, {"kind": "list", "html": "변경 전: Next.js 앱을 Vercel 외 플랫폼에 배포할 때 플랫폼별 구현과 호환성 검증이 분산돼 있었습니다."}, {"kind": "list", "html": "변경 후: 라우트, prerender, 정적 자산, 런타임 타깃, 캐싱 규칙을 포함한 typed/versioned build output을 어댑터가 소비하는 구조로 바뀌었습니다."}, {"kind": "list", "html": "확인할 영향: 안정화 범위 Adapter API, 공유 테스트 스위트, verified adapter 기준 / 관련 런타임 Vercel adapter, Bun reference adapter, OpenNext 기반 Netlify/Cloudflare/AWS 계열"}], "itemsHtml": ["업데이트: Next.js 16.2에서 안정화된 Adapter API를 기반으로 배포 플랫폼별 어댑터 계약을 공개했습니다.", "기술 맥락: OpenNext, Netlify, Cloudflare, AWS Amplify, Google Cloud와 함께 프레임워크 출력물을 플랫폼이 해석할 수 있는 공용 인터페이스로 정리했습니다.", "변경 전: Next.js 앱을 Vercel 외 플랫폼에 배포할 때 플랫폼별 구현과 호환성 검증이 분산돼 있었습니다.", "변경 후: 라우트, prerender, 정적 자산, 런타임 타깃, 캐싱 규칙을 포함한 typed/versioned build output을 어댑터가 소비하는 구조로 바뀌었습니다.", "확인할 영향: 안정화 범위 Adapter API, 공유 테스트 스위트, verified adapter 기준 / 관련 런타임 Vercel adapter, Bun reference adapter, OpenNext 기반 Netlify/Cloudflare/AWS 계열"]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "프론트엔드 프레임워크의 경쟁 축이 화면 렌더링에서 배포 계약의 표준화로 이동하고 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Next.js의 Adapter API 안정화는 단순한 배포 옵션 추가가 아닙니다. 프레임워크가 빌드 결과를 어떤 형태로 내보내고, 플랫폼이 그것을 어떻게 실행해야 하는지에 대한 공용 계약을 만든 변화입니다."}, {"kind": "paragraph", "html": "App Router, RSC, PPR, 캐싱, 스트리밍처럼 프레임워크 내부 동작이 복잡해질수록 배포 플랫폼은 단순히 Node 서버를 실행하는 수준으로는 호환성을 보장하기 어렵습니다. Adapter API와 테스트 스위트는 이 복잡성을 플랫폼별 추측이 아니라 검증 가능한 인터페이스로 바꾸려는 시도입니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀이 봐야 할 포인트는 &quot;어디에 배포할 수 있는가&quot;보다 &quot;프레임워크 기능을 어느 플랫폼까지 같은 의미로 실행할 수 있는가&quot;입니다. 캐시 무효화, 스트리밍, 라우팅, 정적 자산 처리 방식이 플랫폼마다 다르면 같은 코드라도 운영 결과가 달라집니다."}, {"kind": "paragraph", "html": "이제 Next.js 프로젝트의 기술 선택에는 어댑터 지원 상태, 테스트 통과 여부, 플랫폼별 캐싱 문서가 함께 들어가야 합니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "화면 산출물 기준으로 정적 페이지, 동적 라우트, 스트리밍 구간, 이미지/폰트 자산을 먼저 구분합니다."}, {"kind": "list", "html": "Vercel 외 배포라면 링크 이동, 헤더/푸터 공통 레이아웃, 이미지 최적화, 캐시 갱신이 staging에서 같은지 체크합니다."}, {"kind": "list", "html": "QA 문서에는 adapter별로 깨질 수 있는 <code>next/image<\/code>, 폰트 preload, metadata, fallback 화면을 별도 항목으로 둡니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "OpenNext: Vercel 외 인프라에서 Next.js 기능을 어디까지 같은 의미로 실행할 수 있는지 확인하는 핵심 adapter 축입니다."}, {"kind": "list", "html": "Platform adapters: Vercel Adapter, Cloudflare Workers, Netlify Runtime, AWS Amplify Hosting은 배포 대상별 캐싱, 라우팅, 런타임 차이를 비교해야 해서 함께 봐야 합니다."}, {"kind": "list", "html": "Partial Prerendering: adapter 호환성 검증에서 streaming, static shell, dynamic hole 처리가 실제 사용자 경험에 직접 영향을 줍니다."}, {"kind": "list", "html": "CDN cache invalidation: revalidation과 캐시 동기화가 플랫폼마다 다르게 동작하면 같은 코드도 운영 결과가 달라질 수 있습니다."}], "itemsHtm
