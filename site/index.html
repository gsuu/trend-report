 코딩 도구의 품질은 모델보다 먼저, 프레임워크가 런타임 문맥을 얼마나 잘 노출하느냐에 달려 있습니다.", "deckHtml": "Next.js 16.2에 AI-assisted development를 위한 <code>AGENTS.md<\/code>, browser log forwarding, dev server lock file, experimental Agent DevTools가 추가됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "Next.js 공식 블로그"}], "sourceUrl": "https://nextjs.org/blog/next-16-2-ai", "sourceTitle": "Next.js 16.2: AI Improvements", "referenceLinks": [{"label": "관련 뉴스", "title": "Building Next.js for an agentic future", "url": "https://nextjs.org/blog/agentic-future"}], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Next.js 16.2에 AI-assisted development를 위한 <code>AGENTS.md<\/code>, browser log forwarding, dev server lock file, experimental Agent DevTools가 추가됐습니다."}, {"kind": "list", "html": "기술 맥락: AI 코딩 에이전트가 브라우저 오류, 라우트 상태, React DevTools 진단을 터미널 기반으로 이해하도록 돕는 방향입니다."}, {"kind": "list", "html": "변경 전: 개발자는 브라우저 오버레이의 에러를 복사해 AI 도구에 전달해야 했고, 에이전트는 런타임 상태를 직접 보지 못했습니다."}, {"kind": "list", "html": "변경 후: 프로젝트 생성 시 문맥 문서가 포함되고, 브라우저 로그와 프레임워크 진단이 에이전트가 접근 가능한 형태로 노출됩니다."}, {"kind": "list", "html": "확인할 영향: 주요 기능 <code>AGENTS.md<\/code> 기본 생성, browser error terminal forwarding, <code>next-browser<\/code> experimental tooling / 확인 한계 Agent DevTools는 experimental 상태라 운영 팀 표준 도입 전 검증이 필요합니다."}], "itemsHtml": ["업데이트: Next.js 16.2에 AI-assisted development를 위한 <code>AGENTS.md<\/code>, browser log forwarding, dev server lock file, experimental Agent DevTools가 추가됐습니다.", "기술 맥락: AI 코딩 에이전트가 브라우저 오류, 라우트 상태, React DevTools 진단을 터미널 기반으로 이해하도록 돕는 방향입니다.", "변경 전: 개발자는 브라우저 오버레이의 에러를 복사해 AI 도구에 전달해야 했고, 에이전트는 런타임 상태를 직접 보지 못했습니다.", "변경 후: 프로젝트 생성 시 문맥 문서가 포함되고, 브라우저 로그와 프레임워크 진단이 에이전트가 접근 가능한 형태로 노출됩니다.", "확인할 영향: 주요 기능 <code>AGENTS.md<\/code> 기본 생성, browser error terminal forwarding, <code>next-browser<\/code> experimental tooling / 확인 한계 Agent DevTools는 experimental 상태라 운영 팀 표준 도입 전 검증이 필요합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "AI 코딩 도구의 품질은 모델보다 먼저, 프레임워크가 런타임 문맥을 얼마나 잘 노출하느냐에 달려 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "AI 개발 보조가 보편화되면서 &quot;코드를 작성하게 하는 것&quot;보다 &quot;실패한 상태를 이해하게 하는 것&quot;이 더 중요해졌습니다. Next.js 팀은 에이전트가 브라우저를 직접 보지 못하는 문제를 프레임워크 레벨에서 해결하려고 합니다."}, {"kind": "paragraph", "html": "브라우저 런타임 오류, hydration mismatch, 서버 함수 실행 로그, 라우트 세그먼트 상태는 HTML만 봐서는 알 수 없습니다. 이 정보를 터미널과 MCP 계열 도구로 넘기는 흐름은 AI 개발 환경의 기본 인프라가 될 가능성이 큽니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀은 이제 AI 도구 도입을 IDE 플러그인 관점만으로 보면 부족합니다. 프레임워크가 어떤 디버깅 신호를 구조화해서 제공하는지, 에러 로그가 재현 가능한지, agent가 잘못된 추론을 했을 때 사람이 검증할 수 있는지까지 봐야 합니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "공통 컴포넌트 규칙, CSS naming, 접근성 체크 기준을 <code>AGENTS.md<\/code>에 적어 에이전트가 잘못된 마크업을 제안하지 않게 합니다."}, {"kind": "list", "html": "hydration mismatch, className 누락, responsive breakpoint 오류처럼 화면 구현에서 자주 나는 이슈를 브라우저 로그로 모읍니다."}, {"kind": "list", "html": "AI가 수정한 결과는 시안 기준 화면, 키보드 포커스, 모바일 viewport에서 사람이 다시 검수하는 절차를 둡니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "AGENTS.md: 에이전트가 프로젝트 규칙과 프레임워크 문서를 먼저 읽게 만드는 기본 문맥 파일입니다."}, {"kind": "list", "html": "Next.js Dev Overlay: hydration mismatch와 route 오류를 사람이 보는 진단 화면에서 에이전트가 읽을 수 있는 신호로 연결해야 합니다."}, {"kind": "list", "html": "React DevTools: component tree, props, hooks 상태를 에이전트 진단과 사람이 보는 디버깅 기준으로 맞출 수 있습니다."}, {"kind": "list", "html": "Model Context Protocol: 프레임워크 진단, 브라우저 상태, 로컬 도구를 에이전트가 호출 가능한 인터페이스로 묶는 기반입니다."}, {"kind": "list", "html": "<code>next-browser<\/code>: 브라우저 로그, 스크린샷, PPR shell 분석을 터미널에서 읽게 해 agent debugging 흐름을 검증할 수 있습니다."}], "itemsHtml": ["@@quote@@AI 코딩 도구의 품질은 모델보다 먼저, 프레임워크가 런타임 문맥을 얼마나 잘 노출하느냐에 달려 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@AI 개발 보조가 보편화되면서 &quot;코드를 작성하게 하는 것&quot;보다 &quot;실패한 상태를 이해하게 하는 것&quot;이 더 중요해졌습니다. Next.js 팀은 에이전트가 브라우저를 직접 보지 못하는 문제를 프레임워크 레벨에서 해결하려고 합니다.", "@@paragraph@@브라우저 런타임 오류, hydration mismatch, 서버 함수 실행 로그, 라우트 세그먼트 상태는 HTML만 봐서는 알 수 없습니다. 이 정보를 터미널과 MCP 계열 도구로 넘기는 흐름은 AI 개발 환경의 기본 인프라가 될 가능성이 큽니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@프론트엔드 팀은 이제 AI 도구 도입을 IDE 플러그인 관점만으로 보면 부족합니다. 프레임워크가 어떤 디버깅 신호를 구조화해서 제공하는지, 에러 로그가 재현 가능한지, agent가 잘못된 추론을 했을 때 사람이 검증할 수 있는지까지 봐야 합니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@공통 컴포넌트 규칙, CSS naming, 접근성 체크 기준을 <code>AGENTS.md<\/code>에 적어 에이전트가 잘못된 마크업을 제안하지 않게 합니다.", "@@list@@hydration mismatch, className 누락, responsive breakpoint 오류처럼 화면 구현에서 자주 나는 이슈를 브라우저 로그로 모읍니다.", "@@list@@AI가 수정한 결과는 시안 기준 화면, 키보드 포커스, 모바일 viewport에서 사람이 다시 검수하는 절차를 둡니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@AGENTS.md: 에이전트가 프로젝트 규칙과 프레임워크 문서를 먼저 읽게 만드는 기본 문맥 파일입니다.", "@@list@@Next.js Dev Overlay: hydration mismatch와 route 오류를 사람이 보는 진단 화면에서 에이전트가 읽을 수 있는 신호로 연결해야 합니다.", "@@list@@React DevTools: component tree, props, hooks 상태를 에이전트 진단과 사람이 보는 디버깅 기준으로 맞출 수 있습니다.", "@@list@@Model Context Protocol: 프레임워크 진단, 브라우저 상태, 로컬 도구를 에이전트가 호출 가능한 인터페이스로 묶는 기반입니다.", "@@list@@<code>next-browser<\/code>: 브라우저 로그, 스크린샷, PPR shell 분석을 터미널에서 읽게 해 agent debugging 흐름을 검증할 수 있습니다."]}]}, {"number": "18", "platform": "TypeScript", "areaKey": "dev", "area": "DEV", "categoryKey": "javascript", "category": "JAVASCRIPT", "date": "2026-04-20", "route": "#/story/18", "href": "articles/2026-04-20-story-18.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-18.html", "image": "https://devblogs.microsoft.com/typescript/wp-content/uploads/sites/11/2026/03/ts-6.0-2.png", "imageCaption": "TypeScript 공식 이미지", "tags": ["TypeScript6", "ES2025", "Temporal"], "takeawayHtml": "TypeScript 업그레이드는 문법 문제가 아니라, 팀의 런타임 기준을 명시하는 작업이 되고 있습니다.", "deckHtml": "TypeScript 6.0에서 <code>target<\/code>과 <code>lib<\/code>에 <code>es2025<\/code> 옵션이 추가되고, Temporal 타입 지원이 포함됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "TypeScript 공식 블로그"}], "sourceUrl": "https://devblogs.microsoft.com/typescript/announcing-typescript-6-0/", "sourceTitle": "Announcing TypeScript 6.0 - TypeScript", "referenceLinks": [], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: TypeScript 6.0에서 <code>target<\/code>과 <code>lib<\/code>에 <code>es2025<\/code> 옵션이 추가되고, Temporal 타입 지원이 포함됐습니다."}, {"kind": "list", "html": "기술 맥락: JavaScript 표준 API가 늘어나면서 타입 시스템과 런타임 타깃 설정을 더 명시적으로 맞춰야 하는 상황입니다."}, {"kind": "list", "html": "변경 전: <code>RegExp.escape<\/code>, <code>Promise.try<\/code>, Iterator/Set 계열 메서드 같은 타입은 <code>esnext<\/code>에 남아 있어 안정 타깃과 실험 타깃의 경계가 흐렸습니다."}, {"kind": "list", "html": "변경 후: ES2025 내장 API 타입이 별도 타깃으로 정리되고, Temporal은 <code>esnext<\/code> 또는 granular lib를 통해 타입을 사용할 수 있습니다."}, {"kind": "list", "html": "확인할 영향: 주요 변화 <code>es2025<\/code> target/lib, Temporal 타입, DOM iterable 타입 정리 / 확인 한계 Temporal 런타임 지원은 브라우저/서버 환경별 확인이 필요합니다."}], "itemsHtml": ["업데이트: TypeScript 6.0에서 <code>target<\/code>과 <code>lib<\/code>에 <code>es2025<\/code> 옵션이 추가되고, Temporal 타입 지원이 포함됐습니다.", "기술 맥락: JavaScript 표준 API가 늘어나면서 타입 시스템과 런타임 타깃 설정을 더 명시적으로 맞춰야 하는 상황입니다.", "변경 전: <code>RegExp.escape<\/code>, <code>Promise.try<\/code>, Iterator/Set 계열 메서드 같은 타입은 <code>esnext<\/code>에 남아 있어 안정 타깃과 실험 타깃의 경계가 흐렸습니다.", "변경 후: ES2025 내장 API 타입이 별도 타깃으로 정리되고, Temporal은 <code>esnext<\/code> 또는 granular lib를 통해 타입을 사용할 수 있습니다.", "확인할 영향: 주요 변화 <code>es2025<\/code> target/lib, Temporal 타입, DOM iterable 타입 정리 / 확인 한계 Temporal 런타임 지원은 브라우저/서버 환경별 확인이 필요합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "TypeScript 업그레이드는 문법 문제가 아니라, 팀의 런타임 기준을 명시하는 작업이 되고 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "TypeScript 6.0의 핵심은 새 문법보다 표준 API 타입의 정리입니다. ES2025 타깃이 생기면서 팀은 &quot;우리가 어떤 JavaScript 표준을 빌드 기준으로 삼는가&quot;를 더 분명하게 설정할 수 있습니다."}, {"kind": "paragraph", "html": "Temporal 타입 지원도 중요합니다. 날짜와 시간 처리는 프론트엔드에서 오래된 pain point였고, 표준 API가 타입 레벨에서 보이기 시작하면 라이브러리 의존성, polyfill, 런타임 지원 정책을 다시 점검해야 합니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀은 <code>tsconfig<\/code>를 프로젝트 초기 설정 파일로만 방치하면 안 됩니다. target/lib 설정은 번들 출력, 타입 체크, 브라우저 호환성, polyfill 전략에 직접 연결됩니다."}, {"kind": "paragraph", "html": "특히 디자인 시스템이나 공통 패키지를 운영하는 팀은 ES2025 API를 타입으로 허용할지, 실제 런타임 지원이 확인된 환경에서만 쓸지 기준을 문서화해야 합니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "UI 컴포넌트 props 타입과 HTML attribute 타입을 정리해 Button, Link, Image 같은 공통 컴포넌트 사용 실수를 줄입니다."}, {"kind": "list", "html": "<code>target<\/code>/<code>lib<\/code> 변경 후 최신 API 사용이 실제 지원 브라우저에서 동작하는지 BrowserStack 또는 실기기 QA 범위에 넣습니다."}, {"kind": "list", "html": "날짜/시간 표기가 있는 UI는 Temporal/polyfill 적용 여부와 함께 fallback 문구와 locale 표시가 깨지지 않는지 확인합니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "<code>tsconfig<\/code> target/lib: 타입으로 허용하는 표준 API와 실제 빌드 출력 기준을 맞추는 출발점입니다."}, {"kind": "list", "html": "Browserslist: 서비스가 지원하는 브라우저 범위와 TypeScript lib 설정이 어긋나는지 확인해야 합니다."}, {"kind": "list", "html": "core-js/polyfill 정책: 타입은 통과하지만 런타임에서 없는 API를 보완할 기준이 필요합니다."}, {"kind": "list", "html": "Temporal polyfill: Temporal 타입 도입은 실제 브라우저/Node 지원 전까지 polyfill 전략과 함께 검토해야 합니다."}, {"kind": "list", "html": "package <code>exports<\/code> 조건: 공통 패키지가 어떤 런타임과 번들러에 어떤 출력을 제공하는지 target 설정과 함께 봐야 합니다."}], "itemsHtml": ["@@quote@@TypeScript 업그레이드는 문법 문제가 아니라, 팀의 런타임 기준을 명시하는 작업이 되고 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@TypeScript 6.0의 핵심은 새 문법보다 표준 API 타입의 정리입니다. ES2025 타깃이 생기면서 팀은 &quot;우리가 어떤 JavaScript 표준을 빌드 기준으로 삼는가&quot;를 더 분명하게 설정할 수 있습니다.", "@@paragraph@@Temporal 타입 지원도 중요합니다. 날짜와 시간 처리는 프론트엔드에서 오래된 pain point였고, 표준 API가 타입 레벨에서 보이기 시작하면 라이브러리 의존성, polyfill, 런타임 지원 정책을 다시 점검해야 합니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@프론트엔드 팀은 <code>tsconfig<\/code>를 프로젝트 초기 설정 파일로만 방치하면 안 됩니다. target/lib 설정은 번들 출력, 타입 체크, 브라우저 호환성, polyfill 전략에 직접 연결됩니다.", "@@paragraph@@특히 디자인 시스템이나 공통 패키지를 운영하는 팀은 ES2025 API를 타입으로 허용할지, 실제 런타임 지원이 확인된 환경에서만 쓸지 기준을 문서화해야 합니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@UI 컴포넌트 props 타입과 HTML attribute 타입을 정리해 Button, Link, Image 같은 공통 컴포넌트 사용 실수를 줄입니다.", "@@list@@<code>target<\/code>/<code>lib<\/code> 변경 후 최신 API 사용이 실제 지원 브라우저에서 동작하는지 BrowserStack 또는 실기기 QA 범위에 넣습니다.", "@@list@@날짜/시간 표기가 있는 UI는 Temporal/polyfill 적용 여부와 함께 fallback 문구와 locale 표시가 깨지지 않는지 확인합니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@<code>tsconfig<\/code> target/lib: 타입으로 허용하는 표준 API와 실제 빌드 출력 기준을 맞추는 출발점입니다.", "@@list@@Browserslist: 서비스가 지원하는 브라우저 범위와 TypeScript lib 설정이 어긋나는지 확인해야 합니다.", "@@list@@core-js/polyfill 정책: 타입은 통과하지만 런타임에서 없는 API를 보완할 기준이 필요합니다.", "@@list@@Temporal polyfill: Temporal 타입 도입은 실제 브라우저/Node 지원 전까지 polyfill 전략과 함께 검토해야 합니다.", "@@list@@package <code>exports<\/code> 조건: 공통 패키지가 어떤 런타임과 번들러에 어떤 출력을 제공하는지 target 설정과 함께 봐야 합니다."]}]}, {"number": "19", "platform": "ESLint", "areaKey": "dev", "area": "DEV", "categoryKey": "tool", "category": "TOOL", "date": "2026-04-20", "route": "#/story/19", "href": "articles/2026-04-20-story-19.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-19.html", "image": "https://eslint.org/apple-touch-icon.png", "imageCaption": "ESLint 공식 이미지", "tags": ["ESLint10", "LanguageAwareRules", "Temporal"], "takeawayHtml": "프론트엔드 품질 도구는 이제 파일 확장자를 넘어서 언어별 의미를 구분하는 단계로 가고 있습니다.", "deckHtml": "ESLint v10.2.1 패치가 공개됐고, 직전 v10.2.0에서는 language-aware rules와 Temporal 인식이 추가됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "ESLint 공식 블로그"}], "sourceUrl": "https://eslint.org/blog/2026/04/eslint-v10.2.1-released/", "sourceTitle": "ESLint v10.2.1 released - ESLint - Pluggable JavaScript Linter", "referenceLinks": [{"label": "관련 뉴스", "title": "ESLint v10.2.0 released", "url": "https://eslint.org/blog/2026/04/eslint-v10.2.0-released/"}], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: ESLint v10.2.1 패치가 공개됐고, 직전 v10.2.0에서는 language-aware rules와 Temporal 인식이 추가됐습니다."}, {"kind": "list", "html": "기술 맥락: ESLint가 JavaScript 전용 lint를 넘어 언어별 rule 적용 범위를 명시하는 방향으로 확장되고 있습니다."}, {"kind": "list", "html": "변경 전: rule이 어떤 언어/파서 조합을 지원하는지 명확하지 않으면 TypeScript, Markdown, JSON 등 다언어 lint 구성에서 오동작 위험이 있었습니다."}, {"kind": "list", "html": "변경 후: custom rule의 <code>meta.languages<\/code>로 지원 언어를 선언할 수 있고, 지원되지 않는 언어에 rule이 켜지면 런타임 오류로 드러납니다."}, {"kind": "list", "html": "확인할 영향: 주요 변화 <code>meta.languages<\/code>, Temporal global 인식, <code>no-obj-calls<\/code> Temporal 처리 / 최신 패치 v10.2.1에서 code path analysis와 <code>no-async-promise-executor<\/code> false positive 등 버그 수정"}], "itemsHtml": ["업데이트: ESLint v10.2.1 패치가 공개됐고, 직전 v10.2.0에서는 language-aware rules와 Temporal 인식이 추가됐습니다.", "기술 맥락: ESLint가 JavaScript 전용 lint를 넘어 언어별 rule 적용 범위를 명시하는 방향으로 확장되고 있습니다.", "변경 전: rule이 어떤 언어/파서 조합을 지원하는지 명확하지 않으면 TypeScript, Markdown, JSON 등 다언어 lint 구성에서 오동작 위험이 있었습니다.", "변경 후: custom rule의 <code>meta.languages<\/code>로 지원 언어를 선언할 수 있고, 지원되지 않는 언어에 rule이 켜지면 런타임 오류로 드러납니다.", "확인할 영향: 주요 변화 <code>meta.languages<\/code>, Temporal global 인식, <code>no-obj-calls<\/code> Temporal 처리 / 최신 패치 v10.2.1에서 code path analysis와 <code>no-async-promise-executor<\/code> false positive 등 버그 수정"]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "프론트엔드 품질 도구는 이제 파일 확장자를 넘어서 언어별 의미를 구분하는 단계로 가고 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "현대 프론트엔드 저장소는 JavaScript와 TypeScript만으로 구성되지 않습니다. Markdown, JSON, CSS-in-JS, MDX, 설정 파일이 한 모노레포 안에서 함께 lint됩니다. ESLint가 language-aware rule을 도입한 것은 이 복잡한 구성에서 rule 적용 범위를 더 명확히 하려는 변화입니다."}, {"kind": "paragraph", "html": "Temporal 지원도 같은 흐름입니다. 표준 API가 추가될 때 lint 도구가 이를 모르면 <code>no-undef<\/code> 같은 기본 rule이 잘못된 경고를 만들 수 있습니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "팀은 ESLint v10 계열을 단순 버전 업데이트로 보면 안 됩니다. 사내 custom rule이나 플러그인이 있다면 어떤 language option에서 동작하는지 명시해야 하고, TypeScript/Markdown/JSON lint 범위가 섞인 구성에서는 rule 충돌을 점검해야 합니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "화면 구현 산출물에 섞이는 JS, TS, MDX, JSON, CSS-in-JS 파일을 패턴별로 분리해 lint rule 적용 범위를 정합니다."}, {"kind": "list", "html": "접근성, alt, button type, aria 속성처럼 마크업 품질에 직접 연결되는 rule은 PR에서 반드시 실패하도록 둡니다."}, {"kind": "list", "html": "문서나 JSON에 JavaScript rule이 잘못 적용되는 경우를 줄이기 위해 flat config를 파일 타입별로 나눕니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "ESLint flat config: 파일 패턴별 rule 적용 범위를 명시해야 language-aware rules의 효과가 납니다."}, {"kind": "list", "html": "<code>@typescript-eslint<\/code>: TypeScript 파서와 rule이 ESLint v10의 언어 구분과 충돌하지 않는지 확인해야 합니다."}, {"kind": "list", "html": "Markdown/JSON lint plugins: 다언어 저장소에서 JavaScript rule이 문서나 설정 파일에 잘못 적용되는 문제를 줄일 수 있습니다."}, {"kind": "list", "html": "custom rule <code>meta.languages<\/code>: 사내 rule이 어떤 언어에서 동작하는지 선언해야 예기치 않은 런타임 오류를 막을 수 있습니다."}, {"kind": "list", "html": "monorepo lint pipeline: 패키지별 lint 범위와 CI 실행 순서가 rule 적용 범위와 맞는지 같이 점검해야 합니다."}], "itemsHtml": ["@@quote@@프론트엔드 품질 도구는 이제 파일 확장자를 넘어서 언어별 의미를 구분하는 단계로 가고 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@현대 프론트엔드 저장소는 JavaScript와 TypeScript만으로 구성되지 않습니다. Markdown, JSON, CSS-in-JS, MDX, 설정 파일이 한 모노레포 안에서 함께 lint됩니다. ESLint가 language-aware rule을 도입한 것은 이 복잡한 구성에서 rule 적용 범위를 더 명확히 하려는 변화입니다.", "@@paragraph@@Temporal 지원도 같은 흐름입니다. 표준 API가 추가될 때 lint 도구가 이를 모르면 <code>no-undef<\/code> 같은 기본 rule이 잘못된 경고를 만들 수 있습니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@팀은 ESLint v10 계열을 단순 버전 업데이트로 보면 안 됩니다. 사내 custom rule이나 플러그인이 있다면 어떤 language option에서 동작하는지 명시해야 하고, TypeScript/Markdown/JSON lint 범위가 섞인 구성에서는 rule 충돌을 점검해야 합니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@화면 구현 산출물에 섞이는 JS, TS, MDX, JSON, CSS-in-JS 파일을 패턴별로 분리해 lint rule 적용 범위를 정합니다.", "@@list@@접근성, alt, button type, aria 속성처럼 마크업 품질에 직접 연결되는 rule은 PR에서 반드시 실패하도록 둡니다.", "@@list@@문서나 JSON에 JavaScript rule이 잘못 적용되는 경우를 줄이기 위해 flat config를 파일 타입별로 나눕니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@ESLint flat config: 파일 패턴별 rule 적용 범위를 명시해야 language-aware rules의 효과가 납니다.", "@@list@@<code>@typescript-eslint<\/code>: TypeScript 파서와 rule이 ESLint v10의 언어 구분과 충돌하지 않는지 확인해야 합니다.", "@@list@@Markdown/JSON lint plugins: 다언어 저장소에서 JavaScript rule이 문서나 설정 파일에 잘못 적용되는 문제를 줄일 수 있습니다.", "@@list@@custom rule <code>meta.languages<\/code>: 사내 rule이 어떤 언어에서 동작하는지 선언해야 예기치 않은 런타임 오류를 막을 수 있습니다.", "@@list@@monorepo lint pipeline: 패키지별 lint 범위와 CI 실행 순서가 rule 적용 범위와 맞는지 같이 점검해야 합니다."]}]}, {"number": "20", "platform": "WebKit/Safari", "areaKey": "dev", "area": "DEV", "categoryKey": "css", "category": "CSS", "date": "2026-04-20", "route": "#/story/20", "href": "articles/2026-04-20-story-20.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-20.html", "image": "https://webkit.org/apple-touch-icon.png", "imageCaption": "WebKit/Safari 공식 이미지", "tags": ["Safari264", "CSSGridLanes", "WebTransport"], "takeawayHtml": "프론트엔드 구현의 난이도는 새 기능 자체보다, 브라우저 간 격차가 언제 줄어드는지에 달려 있습니다.", "deckHtml": "Safari 26.4에 CSS Grid Lanes, WebTransport, Keyboard Lock API 등 웹 플랫폼 기능과 191개 수정 사항이 포함됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "WebKit 공식 블로그"}], "sourceUrl": "https://webkit.org/blog/17862/webkit-features-for-safari-26-4/", "sourceTitle": "WebKit Features for Safari 26.4", "referenceLinks": [], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Safari 26.4에 CSS Grid Lanes, WebTransport, Keyboard Lock API 등 웹 플랫폼 기능과 191개 수정 사항이 포함됐습니다."}, {"kind": "list", "html": "기술 맥락: WebKit은 이번 릴리즈를 새로운 기능보다 기존 웹 표준과의 호환성, 레이아웃 엔진 개선, 개발자 요청 반영에 초점을 둔 업데이트로 설명했습니다."}, {"kind": "list", "html": "변경 전: masonry 스타일 레이아웃, 저지연 양방향 통신, 키보드 단축키 제어 같은 기능은 브라우저별 구현 차이가 컸습니다."}, {"kind": "list", "html": "변경 후: Safari에서도 Grid Lanes, WebTransport, Keyboard Lock API 지원 범위가 넓어져 복잡한 웹 앱 구현 선택지가 늘어납니다."}, {"kind": "list", "html": "확인할 영향: 주요 기능 CSS Grid Lanes, WebTransport, Keyboard Lock API, <code>sizes<\/code> 속성 안의 <code>min()<\/code>/<code>max()<\/code>/<code>clamp()<\/code> 지원 / 수정 규모 44개 기능, 191개 수정, 1개 deprecation"}], "itemsHtml": ["업데이트: Safari 26.4에 CSS Grid Lanes, WebTransport, Keyboard Lock API 등 웹 플랫폼 기능과 191개 수정 사항이 포함됐습니다.", "기술 맥락: WebKit은 이번 릴리즈를 새로운 기능보다 기존 웹 표준과의 호환성, 레이아웃 엔진 개선, 개발자 요청 반영에 초점을 둔 업데이트로 설명했습니다.", "변경 전: masonry 스타일 레이아웃, 저지연 양방향 통신, 키보드 단축키 제어 같은 기능은 브라우저별 구현 차이가 컸습니다.", "변경 후: Safari에서도 Grid Lanes, WebTransport, Keyboard Lock API 지원 범위가 넓어져 복잡한 웹 앱 구현 선택지가 늘어납니다.", "확인할 영향: 주요 기능 CSS Grid Lanes, WebTransport, Keyboard Lock API, <code>sizes<\/code> 속성 안의 <code>min()<\/code>/<code>max()<\/code>/<code>clamp()<\/code> 지원 / 수정 규모 44개 기능, 191개 수정, 1개 deprecation"]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "프론트엔드 구현의 난이도는 새 기능 자체보다, 브라우저 간 격차가 언제 줄어드는지에 달려 있습니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Safari 26.4는 프론트엔드 팀이 다시 확인해야 할 브라우저 업데이트입니다. 특히 CSS Grid Lanes와 WebTransport는 UI 레이아웃과 실시간 경험 구현에 영향을 줍니다."}, {"kind": "paragraph", "html": "다만 중요한 것은 &quot;Safari가 새 기능을 넣었다&quot;가 아니라, 기존 표준과의 차이를 줄이는 방향입니다. WebKit은 이번 릴리즈에서 개발자들이 요구한 호환성, 버그 수정, spec coverage를 강조했습니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀은 CSS/브라우저 기능을 도입할 때 Chrome 기준만으로 판단하면 안 됩니다. Safari 지원이 넓어질 때 비로소 polyfill, fallback, custom JavaScript 레이아웃 코드를 줄일 수 있습니다."}, {"kind": "paragraph", "html": "Grid Lanes는 카드형 피드, 갤러리, 대시보드 레이아웃에 영향을 줄 수 있고, WebTransport는 협업 도구나 실시간 인터랙션에서 WebSocket 대체 옵션으로 검토할 수 있습니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "카드 그리드, 상품 리스트, 갤러리처럼 레이아웃이 복잡한 화면부터 Safari 26.4와 구버전 Safari fallback을 나눠 확인합니다."}, {"kind": "list", "html": "WebTransport 같은 기능은 화면 구현 단계에서 feature detection 상태와 대체 UI 문구를 먼저 준비합니다."}, {"kind": "list", "html": "Keyboard Lock과 단축키 UX는 포커스 이동, input 입력, 스크린리더 사용 시 충돌이 없는지 QA 체크리스트에 넣습니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "CSS Grid Lanes: masonry 스타일 UI를 JavaScript 측정 코드 없이 구현할 수 있는지 확인해야 합니다."}, {"kind": "list", "html": "Masonry layout fallback: Safari 외 브라우저나 구버전 환경에서 레이아웃이 무너지지 않도록 대체 구조가 필요합니다."}, {"kind": "list", "html": "WebTransport: 저지연 양방향 통신을 WebSocket 이후 옵션으로 검토할 수 있습니다."}, {"kind": "list", "html": "WebSocket fallback: WebTransport 지원이 완전하지 않은 환경에서도 실시간 기능을 유지해야 합니다."}, {"kind": "list", "html": "Safari Technology Preview: Safari 안정 버전 도입 전 웹 플랫폼 기능과 버그 수정 흐름을 미리 검증할 수 있습니다."}], "itemsHtml": ["@@quote@@프론트엔드 구현의 난이도는 새 기능 자체보다, 브라우저 간 격차가 언제 줄어드는지에 달려 있습니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Safari 26.4는 프론트엔드 팀이 다시 확인해야 할 브라우저 업데이트입니다. 특히 CSS Grid Lanes와 WebTransport는 UI 레이아웃과 실시간 경험 구현에 영향을 줍니다.", "@@paragraph@@다만 중요한 것은 &quot;Safari가 새 기능을 넣었다&quot;가 아니라, 기존 표준과의 차이를 줄이는 방향입니다. WebKit은 이번 릴리즈에서 개발자들이 요구한 호환성, 버그 수정, spec coverage를 강조했습니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@프론트엔드 팀은 CSS/브라우저 기능을 도입할 때 Chrome 기준만으로 판단하면 안 됩니다. Safari 지원이 넓어질 때 비로소 polyfill, fallback, custom JavaScript 레이아웃 코드를 줄일 수 있습니다.", "@@paragraph@@Grid Lanes는 카드형 피드, 갤러리, 대시보드 레이아웃에 영향을 줄 수 있고, WebTransport는 협업 도구나 실시간 인터랙션에서 WebSocket 대체 옵션으로 검토할 수 있습니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@카드 그리드, 상품 리스트, 갤러리처럼 레이아웃이 복잡한 화면부터 Safari 26.4와 구버전 Safari fallback을 나눠 확인합니다.", "@@list@@WebTransport 같은 기능은 화면 구현 단계에서 feature detection 상태와 대체 UI 문구를 먼저 준비합니다.", "@@list@@Keyboard Lock과 단축키 UX는 포커스 이동, input 입력, 스크린리더 사용 시 충돌이 없는지 QA 체크리스트에 넣습니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@CSS Grid Lanes: masonry 스타일 UI를 JavaScript 측정 코드 없이 구현할 수 있는지 확인해야 합니다.", "@@list@@Masonry layout fallback: Safari 외 브라우저나 구버전 환경에서 레이아웃이 무너지지 않도록 대체 구조가 필요합니다.", "@@list@@WebTransport: 저지연 양방향 통신을 WebSocket 이후 옵션으로 검토할 수 있습니다.", "@@list@@WebSocket fallback: WebTransport 지원이 완전하지 않은 환경에서도 실시간 기능을 유지해야 합니다.", "@@list@@Safari Technology Preview: Safari 안정 버전 도입 전 웹 플랫폼 기능과 버그 수정 흐름을 미리 검증할 수 있습니다."]}]}, {"number": "21", "platform": "Node.js", "areaKey": "dev", "area": "DEV", "categoryKey": "data_api", "category": "DATA/API", "date": "2026-04-20", "route": "#/story/21", "href": "articles/2026-04-20-story-21.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-21.html", "image": "https://nodejs.org/en/next-data/og/announcements/Node.js%20%E2%80%94%20Evolving%20the%20Node.js%20Release%20Schedule", "imageCaption": "Node.js 공식 이미지", "tags": ["ReleaseSchedule", "LTS", "FrontendToolchain"], "takeawayHtml": "프론트엔드 팀의 Node 버전 정책은 개발 환경 문제가 아니라 제품 배포 안정성의 일부입니다.", "deckHtml": "Node.js가 2026년 10월 이후 릴리즈 정책을 연 1회 major release와 모든 release의 LTS 전환 구조로 바꾼다고 발표했습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "Node.js 공식 블로그"}], "sourceUrl": "https://nodejs.org/en/blog/announcements/evolving-the-nodejs-release-schedule", "sourceTitle": "Node.js — Evolving the Node.js Release Schedule", "referenceLinks": [{"label": "관련 뉴스", "title": "Node.js Releases", "url": "https://nodejs.org/en/about/previous-releases"}], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Node.js가 2026년 10월 이후 릴리즈 정책을 연 1회 major release와 모든 release의 LTS 전환 구조로 바꾼다고 발표했습니다."}, {"kind": "list", "html": "기술 맥락: 프론트엔드 빌드 도구, 패키지 매니저, 테스트 환경은 Node.js 버전에 직접 영향을 받기 때문에 릴리즈 정책 변화는 FE 운영 정책과 연결됩니다."}, {"kind": "list", "html": "변경 전: odd/even release 구분으로 Current와 LTS 채택 판단이 필요했고, 많은 조직은 odd-numbered release를 건너뛰었습니다."}, {"kind": "list", "html": "변경 후: 2027년 Node.js 27부터 alpha, current, LTS 흐름으로 정리되고 모든 major가 LTS로 이어지는 구조가 됩니다."}, {"kind": "list", "html": "확인할 영향: 유지되는 원칙 LTS 기간, migration window, quality standard, security process / 현재 확인 Node.js v24는 2026-04-15 기준 LTS로 표시됩니다."}], "itemsHtml": ["업데이트: Node.js가 2026년 10월 이후 릴리즈 정책을 연 1회 major release와 모든 release의 LTS 전환 구조로 바꾼다고 발표했습니다.", "기술 맥락: 프론트엔드 빌드 도구, 패키지 매니저, 테스트 환경은 Node.js 버전에 직접 영향을 받기 때문에 릴리즈 정책 변화는 FE 운영 정책과 연결됩니다.", "변경 전: odd/even release 구분으로 Current와 LTS 채택 판단이 필요했고, 많은 조직은 odd-numbered release를 건너뛰었습니다.", "변경 후: 2027년 Node.js 27부터 alpha, current, LTS 흐름으로 정리되고 모든 major가 LTS로 이어지는 구조가 됩니다.", "확인할 영향: 유지되는 원칙 LTS 기간, migration window, quality standard, security process / 현재 확인 Node.js v24는 2026-04-15 기준 LTS로 표시됩니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "프론트엔드 팀의 Node 버전 정책은 개발 환경 문제가 아니라 제품 배포 안정성의 일부입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Node.js 릴리즈 정책 변화는 당장 화면을 바꾸지는 않지만, 프론트엔드 개발 운영에는 큰 영향을 줍니다. Next.js, Vite, ESLint, TypeScript, Playwright 같은 도구가 모두 Node 런타임 위에서 움직이기 때문입니다."}, {"kind": "paragraph", "html": "릴리즈 라인이 단순해지면 장기적으로 팀의 업그레이드 계획은 쉬워질 수 있습니다. 대신 alpha/current/LTS 흐름을 어떻게 검증할지, CI와 로컬 개발 환경을 언제 올릴지 기준을 세워야 합니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀은 <code>engines.node<\/code>, <code>.nvmrc<\/code>, CI 이미지, Docker base image, 배포 런타임을 같은 정책으로 묶어야 합니다. 도구별 최소 Node 버전이 올라가는 속도가 빨라지고 있어, 오래된 LTS에 묶인 프로젝트는 lint/build/test 업데이트에서 계속 마찰을 겪게 됩니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "로컬 화면 구현 환경의 Node 버전을 <code>.nvmrc<\/code>, package manager, CI preview build와 같은 기준으로 맞춥니다."}, {"kind": "list", "html": "Sass, PostCSS, Tailwind, Vite, Next 빌드가 Node 버전 변경 후 같은 결과를 내는지 CSS 산출물 diff와 visual regression으로 확인합니다."}, {"kind": "list", "html": "새 LTS 전환 시점에는 디자이너 확인용 preview URL과 production build를 같은 Node 이미지에서 만들도록 배포 문서를 고칩니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "Node.js release schedule: 연 1회 major와 10월 LTS 전환을 기준으로 업그레이드 일정을 세워야 합니다."}, {"kind": "list", "html": "<code>engines.node<\/code>: 로컬 개발, 패키지 설치, 배포 런타임의 최소 Node 기준을 코드로 명시합니다."}, {"kind": "list", "html": "Corepack: pnpm/yarn 버전 차이로 생기는 lockfile과 install 재현성 문제를 줄일 수 있습니다."}, {"kind": "list", "html": "CI runner image: 로컬 Node 버전과 CI 이미지가 다르면 build/test 실패가 뒤늦게 발견됩니다."}, {"kind": "list", "html": "Vite/Next.js 최소 Node 요구사항: 프론트엔드 도구가 요구하는 Node 기준이 프로젝트 런타임 정책보다 빨리 올라갈 수 있습니다."}], "itemsHtml": ["@@quote@@프론트엔드 팀의 Node 버전 정책은 개발 환경 문제가 아니라 제품 배포 안정성의 일부입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Node.js 릴리즈 정책 변화는 당장 화면을 바꾸지는 않지만, 프론트엔드 개발 운영에는 큰 영향을 줍니다. Next.js, Vite, ESLint, TypeScript, Playwright 같은 도구가 모두 Node 런타임 위에서 움직이기 때문입니다.", "@@paragraph@@릴리즈 라인이 단순해지면 장기적으로 팀의 업그레이드 계획은 쉬워질 수 있습니다. 대신 alpha/current/LTS 흐름을 어떻게 검증할지, CI와 로컬 개발 환경을 언제 올릴지 기준을 세워야 합니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@프론트엔드 팀은 <code>engines.node<\/code>, <code>.nvmrc<\/code>, CI 이미지, Docker base image, 배포 런타임을 같은 정책으로 묶어야 합니다. 도구별 최소 Node 버전이 올라가는 속도가 빨라지고 있어, 오래된 LTS에 묶인 프로젝트는 lint/build/test 업데이트에서 계속 마찰을 겪게 됩니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@로컬 화면 구현 환경의 Node 버전을 <code>.nvmrc<\/code>, package manager, CI preview build와 같은 기준으로 맞춥니다.", "@@list@@Sass, PostCSS, Tailwind, Vite, Next 빌드가 Node 버전 변경 후 같은 결과를 내는지 CSS 산출물 diff와 visual regression으로 확인합니다.", "@@list@@새 LTS 전환 시점에는 디자이너 확인용 preview URL과 production build를 같은 Node 이미지에서 만들도록 배포 문서를 고칩니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@Node.js release schedule: 연 1회 major와 10월 LTS 전환을 기준으로 업그레이드 일정을 세워야 합니다.", "@@list@@<code>engines.node<\/code>: 로컬 개발, 패키지 설치, 배포 런타임의 최소 Node 기준을 코드로 명시합니다.", "@@list@@Corepack: pnpm/yarn 버전 차이로 생기는 lockfile과 install 재현성 문제를 줄일 수 있습니다.", "@@list@@CI runner image: 로컬 Node 버전과 CI 이미지가 다르면 build/test 실패가 뒤늦게 발견됩니다.", "@@list@@Vite/Next.js 최소 Node 요구사항: 프론트엔드 도구가 요구하는 Node 기준이 프로젝트 런타임 정책보다 빨리 올라갈 수 있습니다."]}]}, {"number": "22", "platform": "Vite", "areaKey": "dev", "area": "DEV", "categoryKey": "tool", "category": "TOOL", "date": "2026-04-20", "route": "#/story/22", "href": "articles/2026-04-20-story-22.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-22.html", "image": "https://vite.dev/og-image-announcing-vite8.webp", "imageCaption": "Vite 공식 이미지", "tags": ["Vite8", "Rolldown", "Tooling"], "takeawayHtml": "프론트엔드 빌드 도구의 다음 경쟁은 빠른 개발 서버가 아니라, 개발과 배포가 같은 파이프라인을 얼마나 공유하는가입니다.", "deckHtml": "Vite 8이 Rolldown을 단일 Rust 기반 번들러로 채택해 stable release로 공개됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "Vite 공식 블로그"}], "sourceUrl": "https://vite.dev/blog/announcing-vite8", "sourceTitle": "Vite 8.0 is out!", "referenceLinks": [], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Vite 8이 Rolldown을 단일 Rust 기반 번들러로 채택해 stable release로 공개됐습니다."}, {"kind": "list", "html": "기술 맥락: 기존에는 개발 속도는 esbuild, 프로덕션 번들은 Rollup에 의존하는 이중 구조였지만, Vite 8은 개발과 빌드 파이프라인을 하나의 번들러 축으로 정리하는 방향입니다."}, {"kind": "list", "html": "변경 전: 프로젝트 규모가 커질수록 dev server, production build, 플러그인 변환 경로가 서로 다른 도구 조합에 걸쳐 있었습니다."}, {"kind": "list", "html": "변경 후: Rolldown 기반으로 기존 esbuild/Rollup 설정을 호환 변환하면서 빌드 속도와 플러그인 호환성을 함께 가져가는 구조를 제시했습니다."}, {"kind": "list", "html": "확인할 영향: 주요 변화 Rolldown 통합, Vite Devtools 옵션, <code>resolve.tsconfigPaths<\/code>, browser console forwarding, <code>@vitejs/plugin-react<\/code> v6의 Oxc 기반 React Refresh / 확인 수치 Vite 팀은 Rolldown 통합으로 10~30배 빠른 빌드 가능성을 제시했고, Vite 주간 다운로드를 6,500만 회로 설명했습니다."}], "itemsHtml": ["업데이트: Vite 8이 Rolldown을 단일 Rust 기반 번들러로 채택해 stable release로 공개됐습니다.", "기술 맥락: 기존에는 개발 속도는 esbuild, 프로덕션 번들은 Rollup에 의존하는 이중 구조였지만, Vite 8은 개발과 빌드 파이프라인을 하나의 번들러 축으로 정리하는 방향입니다.", "변경 전: 프로젝트 규모가 커질수록 dev server, production build, 플러그인 변환 경로가 서로 다른 도구 조합에 걸쳐 있었습니다.", "변경 후: Rolldown 기반으로 기존 esbuild/Rollup 설정을 호환 변환하면서 빌드 속도와 플러그인 호환성을 함께 가져가는 구조를 제시했습니다.", "확인할 영향: 주요 변화 Rolldown 통합, Vite Devtools 옵션, <code>resolve.tsconfigPaths<\/code>, browser console forwarding, <code>@vitejs/plugin-react<\/code> v6의 Oxc 기반 React Refresh / 확인 수치 Vite 팀은 Rolldown 통합으로 10~30배 빠른 빌드 가능성을 제시했고, Vite 주간 다운로드를 6,500만 회로 설명했습니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "프론트엔드 빌드 도구의 다음 경쟁은 빠른 개발 서버가 아니라, 개발과 배포가 같은 파이프라인을 얼마나 공유하는가입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Vite 8은 단순한 major release가 아니라 Vite의 도구 철학이 바뀌는 지점입니다. 개발에는 esbuild, 배포에는 Rollup이라는 분업 구조가 오래 작동했지만, 앱 규모와 프레임워크 복잡도가 커질수록 같은 코드가 단계별로 다르게 처리되는 문제가 커졌습니다."}, {"kind": "paragraph", "html": "Rolldown 통합은 Rust 기반 속도 개선만이 아니라, dev와 build 사이의 변환 차이를 줄이려는 시도입니다. 여기에 browser console forwarding이 들어간 점도 중요합니다. 런타임 오류가 터미널로 넘어오면 AI 코딩 에이전트와 CLI 기반 디버깅 도구가 프론트엔드 상태를 더 직접적으로 읽을 수 있습니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀은 Vite 8 업그레이드를 &quot;빌드가 빨라지는가&quot;로만 보면 부족합니다. 기존 Rollup 플러그인, esbuild transform, Babel 기반 React Compiler 설정, tsconfig path alias가 어떤 방식으로 변환되는지 점검해야 합니다."}, {"kind": "paragraph", "html": "특히 디자인 시스템이나 모노레포처럼 빌드 설정을 많이 공유하는 조직은 Vite 8의 호환 레이어가 실제 패키지별 설정을 얼마나 안정적으로 처리하는지 작은 범위에서 먼저 검증해야 합니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "공통 CSS, asset import, SVG/icon 처리, path alias가 Rolldown 전환 후 같은 output을 내는지 작은 페이지부터 검증합니다."}, {"kind": "list", "html": "dev server와 production build에서 class name, font loading, image URL, CSS order가 달라지지 않는지 visual regression을 돌립니다."}, {"kind": "list", "html": "browser console forwarding은 반응형 깨짐, hydration warning, asset 404 같은 UI 구현 이슈를 빠르게 수집하는 용도로 씁니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "Rolldown: Vite 8의 핵심 번들러이므로 기존 Rollup/esbuild 경로와 결과 차이를 먼저 검증해야 합니다."}, {"kind": "list", "html": "Oxc: React Refresh, transform, future tree-shaking 최적화가 Oxc 기반으로 이동하고 있어 함께 봐야 합니다."}, {"kind": "list", "html": "Rollup plugin compatibility: 기존 플러그인이 Rolldown 호환 레이어에서 그대로 동작하는지 업그레이드 리스크를 가릅니다."}, {"kind": "list", "html": "<code>resolve.tsconfigPaths<\/code>: 별도 alias 플러그인을 줄일 수 있지만 monorepo path 설정과 충돌하는지 확인해야 합니다."}, {"kind": "list", "html": "Browser console forwarding: 런타임 오류를 CLI와 에이전트가 읽을 수 있게 만드는 디버깅 흐름과 연결됩니다."}], "itemsHtml": ["@@quote@@프론트엔드 빌드 도구의 다음 경쟁은 빠른 개발 서버가 아니라, 개발과 배포가 같은 파이프라인을 얼마나 공유하는가입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Vite 8은 단순한 major release가 아니라 Vite의 도구 철학이 바뀌는 지점입니다. 개발에는 esbuild, 배포에는 Rollup이라는 분업 구조가 오래 작동했지만, 앱 규모와 프레임워크 복잡도가 커질수록 같은 코드가 단계별로 다르게 처리되는 문제가 커졌습니다.", "@@paragraph@@Rolldown 통합은 Rust 기반 속도 개선만이 아니라, dev와 build 사이의 변환 차이를 줄이려는 시도입니다. 여기에 browser console forwarding이 들어간 점도 중요합니다. 런타임 오류가 터미널로 넘어오면 AI 코딩 에이전트와 CLI 기반 디버깅 도구가 프론트엔드 상태를 더 직접적으로 읽을 수 있습니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@프론트엔드 팀은 Vite 8 업그레이드를 &quot;빌드가 빨라지는가&quot;로만 보면 부족합니다. 기존 Rollup 플러그인, esbuild transform, Babel 기반 React Compiler 설정, tsconfig path alias가 어떤 방식으로 변환되는지 점검해야 합니다.", "@@paragraph@@특히 디자인 시스템이나 모노레포처럼 빌드 설정을 많이 공유하는 조직은 Vite 8의 호환 레이어가 실제 패키지별 설정을 얼마나 안정적으로 처리하는지 작은 범위에서 먼저 검증해야 합니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@공통 CSS, asset import, SVG/icon 처리, path alias가 Rolldown 전환 후 같은 output을 내는지 작은 페이지부터 검증합니다.", "@@list@@dev server와 production build에서 class name, font loading, image URL, CSS order가 달라지지 않는지 visual regression을 돌립니다.", "@@list@@browser console forwarding은 반응형 깨짐, hydration warning, asset 404 같은 UI 구현 이슈를 빠르게 수집하는 용도로 씁니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@Rolldown: Vite 8의 핵심 번들러이므로 기존 Rollup/esbuild 경로와 결과 차이를 먼저 검증해야 합니다.", "@@list@@Oxc: React Refresh, transform, future tree-shaking 최적화가 Oxc 기반으로 이동하고 있어 함께 봐야 합니다.", "@@list@@Rollup plugin compatibility: 기존 플러그인이 Rolldown 호환 레이어에서 그대로 동작하는지 업그레이드 리스크를 가릅니다.", "@@list@@<code>resolve.tsconfigPaths<\/code>: 별도 alias 플러그인을 줄일 수 있지만 monorepo path 설정과 충돌하는지 확인해야 합니다.", "@@list@@Browser console forwarding: 런타임 오류를 CLI와 에이전트가 읽을 수 있게 만드는 디버깅 흐름과 연결됩니다."]}]}, {"number": "23", "platform": "Astro", "areaKey": "dev", "area": "DEV", "categoryKey": "data_api", "category": "DATA/API", "date": "2026-04-20", "route": "#/story/23", "href": "articles/2026-04-20-story-23.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-23.html", "image": "https://astro.build/_astro/og-astro-6.DDjHPVzL.webp", "imageCaption": "Astro 공식 이미지", "tags": ["Astro6", "Framework", "Cloudflare"], "takeawayHtml": "프레임워크의 개발 경험은 이제 빠른 HMR보다, 배포될 런타임을 로컬에서 얼마나 정확히 재현하는가로 평가됩니다.", "deckHtml": "Astro 6가 built-in Fonts API, Content Security Policy API, Live Content Collections, 재설계된 <code>astro dev<\/code>를 포함해 공개됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "Astro 공식 블로그"}], "sourceUrl": "https://astro.build/blog/astro-6/", "sourceTitle": "Astro 6.0 | Astro", "referenceLinks": [], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Astro 6가 built-in Fonts API, Content Security Policy API, Live Content Collections, 재설계된 <code>astro dev<\/code>를 포함해 공개됐습니다."}, {"kind": "list", "html": "기술 맥락: Astro는 Vite Environment API를 활용해 개발 환경에서도 실제 production runtime을 더 가깝게 실행하는 방향으로 dev server와 build pipeline을 개편했습니다."}, {"kind": "list", "html": "변경 전: Cloudflare Workers, Bun, Deno 같은 non-Node runtime을 목표로 할 때 로컬 개발은 Node 기반 시뮬레이션에 가까웠고, 배포 후에야 런타임 차이가 드러나는 경우가 있었습니다."}, {"kind": "list", "html": "변경 후: Cloudflare adapter는 개발, prerendering, production 단계에서 <code>workerd<\/code>를 사용해 KV, D1, R2, Durable Objects 같은 platform binding을 로컬에서 다룰 수 있게 했습니다."}, {"kind": "list", "html": "확인할 영향: 주요 변화 redesigned <code>astro dev<\/code>, Cloudflare runtime parity, Fonts API, CSP API, Live Content Collections, experimental Rust compiler / 확인 한계 Rust compiler, queued rendering, route caching은 experimental이므로 production 도입 전 별도 검증이 필요합니다."}], "itemsHtml": ["업데이트: Astro 6가 built-in Fonts API, Content Security Policy API, Live Content Collections, 재설계된 <code>astro dev<\/code>를 포함해 공개됐습니다.", "기술 맥락: Astro는 Vite Environment API를 활용해 개발 환경에서도 실제 production runtime을 더 가깝게 실행하는 방향으로 dev server와 build pipeline을 개편했습니다.", "변경 전: Cloudflare Workers, Bun, Deno 같은 non-Node runtime을 목표로 할 때 로컬 개발은 Node 기반 시뮬레이션에 가까웠고, 배포 후에야 런타임 차이가 드러나는 경우가 있었습니다.", "변경 후: Cloudflare adapter는 개발, prerendering, production 단계에서 <code>workerd<\/code>를 사용해 KV, D1, R2, Durable Objects 같은 platform binding을 로컬에서 다룰 수 있게 했습니다.", "확인할 영향: 주요 변화 redesigned <code>astro dev<\/code>, Cloudflare runtime parity, Fonts API, CSP API, Live Content Collections, experimental Rust compiler / 확인 한계 Rust compiler, queued rendering, route caching은 experimental이므로 production 도입 전 별도 검증이 필요합니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "프레임워크의 개발 경험은 이제 빠른 HMR보다, 배포될 런타임을 로컬에서 얼마나 정확히 재현하는가로 평가됩니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Astro 6의 핵심은 기능 목록보다 production parity입니다. 정적 사이트 중심 프레임워크였던 Astro가 Cloudflare Workers, Bun, Deno 같은 런타임을 직접 개발 경험 안으로 끌어들이고 있습니다."}, {"kind": "paragraph", "html": "이는 프론트엔드 앱이 CDN에 정적 파일을 올리는 단계를 넘어, edge runtime, content layer, 보안 정책, 폰트 최적화를 하나의 배포 단위로 다루게 됐기 때문입니다. 로컬에서 production runtime을 확인하지 못하면 가장 비싼 버그는 배포 후에 발견됩니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "Astro를 쓰는 팀은 Astro 6 업그레이드에서 adapter와 runtime binding을 먼저 확인해야 합니다. Cloudflare의 KV, D1, R2, Durable Objects를 실제로 쓰는 프로젝트라면 개발 환경의 mock layer를 줄일 기회가 생깁니다."}, {"kind": "paragraph", "html": "또한 Fonts API와 CSP API는 UI 품질과 보안 정책을 프레임워크 설정으로 끌어올립니다. 디자인 시스템 폰트 로딩, fallback, preload, self-hosting 정책을 개별 페이지 구현이 아니라 프로젝트 규칙으로 정리할 수 있습니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "정적 페이지, 콘텐츠 컬렉션, Cloudflare adapter 페이지를 나눠 화면 산출물이 dev/prod에서 같은지 먼저 확인합니다."}, {"kind": "list", "html": "Fonts API는 브랜드 폰트 preload, fallback font, CLS 영향을 디자인 시스템 기준으로 정리하는 데 씁니다."}, {"kind": "list", "html": "CSP API 적용 후 inline style/script, 외부 이미지, 폼/위젯 삽입이 막히지 않는지 QA 항목에 추가합니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "Vite Environment API: Astro dev server가 실제 production runtime을 로컬에서 재현하는 기반입니다."}, {"kind": "list", "html": "Cloudflare <code>workerd<\/code>: Workers 배포 프로젝트는 Node 시뮬레이션이 아니라 실제 런타임 차이를 로컬에서 확인해야 합니다."}, {"kind": "list", "html": "KV/D1/R2/Durable Objects: Cloudflare binding을 쓰는 앱은 데이터 접근과 상태 저장이 dev/prod에서 같은지 검증해야 합니다."}, {"kind": "list", "html": "Fonts API: 폰트 로딩, preload, self-hosting 정책을 페이지 구현이 아니라 프레임워크 설정으로 관리할 수 있습니다."}, {"kind": "list", "html": "CSP API: 보안 헤더를 앱 구조와 함께 선언해 배포 후 CSP 오류를 줄이는 데 연결됩니다."}], "itemsHtml": ["@@quote@@프레임워크의 개발 경험은 이제 빠른 HMR보다, 배포될 런타임을 로컬에서 얼마나 정확히 재현하는가로 평가됩니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Astro 6의 핵심은 기능 목록보다 production parity입니다. 정적 사이트 중심 프레임워크였던 Astro가 Cloudflare Workers, Bun, Deno 같은 런타임을 직접 개발 경험 안으로 끌어들이고 있습니다.", "@@paragraph@@이는 프론트엔드 앱이 CDN에 정적 파일을 올리는 단계를 넘어, edge runtime, content layer, 보안 정책, 폰트 최적화를 하나의 배포 단위로 다루게 됐기 때문입니다. 로컬에서 production runtime을 확인하지 못하면 가장 비싼 버그는 배포 후에 발견됩니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@Astro를 쓰는 팀은 Astro 6 업그레이드에서 adapter와 runtime binding을 먼저 확인해야 합니다. Cloudflare의 KV, D1, R2, Durable Objects를 실제로 쓰는 프로젝트라면 개발 환경의 mock layer를 줄일 기회가 생깁니다.", "@@paragraph@@또한 Fonts API와 CSP API는 UI 품질과 보안 정책을 프레임워크 설정으로 끌어올립니다. 디자인 시스템 폰트 로딩, fallback, preload, self-hosting 정책을 개별 페이지 구현이 아니라 프로젝트 규칙으로 정리할 수 있습니다.", "@@subhead@@실무에 어떻게 적용할 수 있을까", "@@list@@정적 페이지, 콘텐츠 컬렉션, Cloudflare adapter 페이지를 나눠 화면 산출물이 dev/prod에서 같은지 먼저 확인합니다.", "@@list@@Fonts API는 브랜드 폰트 preload, fallback font, CLS 영향을 디자인 시스템 기준으로 정리하는 데 씁니다.", "@@list@@CSP API 적용 후 inline style/script, 외부 이미지, 폼/위젯 삽입이 막히지 않는지 QA 항목에 추가합니다.", "@@subhead@@같이 보면 좋은 기술", "@@list@@Vite Environment API: Astro dev server가 실제 production runtime을 로컬에서 재현하는 기반입니다.", "@@list@@Cloudflare <code>workerd<\/code>: Workers 배포 프로젝트는 Node 시뮬레이션이 아니라 실제 런타임 차이를 로컬에서 확인해야 합니다.", "@@list@@KV/D1/R2/Durable Objects: Cloudflare binding을 쓰는 앱은 데이터 접근과 상태 저장이 dev/prod에서 같은지 검증해야 합니다.", "@@list@@Fonts API: 폰트 로딩, preload, self-hosting 정책을 페이지 구현이 아니라 프레임워크 설정으로 관리할 수 있습니다.", "@@list@@CSP API: 보안 헤더를 앱 구조와 함께 선언해 배포 후 CSP 오류를 줄이는 데 연결됩니다."]}]}, {"number": "24", "platform": "Playwright", "areaKey": "dev", "area": "DEV", "categoryKey": "ai", "category": "AI", "date": "2026-04-20", "route": "#/story/24", "href": "articles/2026-04-20-story-24.html", "articleUrl": "https://email.cttd.co.kr/magazine/articles/2026-04-20-story-24.html", "image": "https://repository-images.githubusercontent.com/221981891/8c5c6942-c91f-4df1-825f-4cf474056bd7", "imageCaption": "Playwright 공식 이미지", "tags": ["Playwright159", "Testing", "Observability"], "takeawayHtml": "테스트 자동화의 다음 과제는 테스트를 더 많이 돌리는 것이 아니라, 실패한 순간을 사람과 에이전트가 같은 화면으로 이해하게 만드는 것입니다.", "deckHtml": "Playwright 1.59에 <code>page.screencast<\/code>, <code>browser.bind()<\/code>, Dashboard, CLI debugger, CLI trace analysis 등 agent-aware 테스트 관찰 기능이 추가됐습니다.", "facts": [{"label": "발행날짜", "valueHtml": "2026-04-20"}, {"label": "국가", "valueHtml": "GLOBAL"}, {"label": "카테고리", "valueHtml": "dev"}, {"label": "출처", "valueHtml": "Playwright 공식 릴리즈 노트"}], "sourceUrl": "https://playwright.dev/docs/release-notes", "sourceTitle": "Release notes | Playwright", "referenceLinks": [{"label": "관련 뉴스", "title": "Playwright v1.59.0 GitHub Release", "url": "https://github.com/microsoft/playwright/releases/tag/v1.59.0"}], "sections": [{"title": "기술 변화 요약", "className": "article-section", "prose": false, "blocks": [{"kind": "list", "html": "업데이트: Playwright 1.59에 <code>page.screencast<\/code>, <code>browser.bind()<\/code>, Dashboard, CLI debugger, CLI trace analysis 등 agent-aware 테스트 관찰 기능이 추가됐습니다."}, {"kind": "list", "html": "기술 맥락: E2E 테스트는 실패 로그만으로 원인을 파악하기 어려워지고 있으며, AI 코딩 에이전트가 브라우저 상태를 공유하고 사람이 중간에 개입할 수 있는 관찰 인터페이스가 중요해지고 있습니다."}, {"kind": "list", "html": "변경 전: 테스트 실패를 이해하려면 trace viewer, 영상, 콘솔 로그, DOM snapshot을 사람이 따로 열어봐야 했습니다."}, {"kind": "list", "html": "변경 후: 실행 중인 브라우저 세션을 CLI, MCP, 다른 Playwright client가 연결해 보고, screencast와 action annotation으로 검증 과정을 영상 증거처럼 남길 수 있습니다."}, {"kind": "list", "html": "확인할 영향: 주요 변화 <code>page.screencast<\/code>, <code>browser.bind()<\/code>, <code>playwright-cli show<\/code> Dashboard, <code>--debug=cli<\/code>, CLI trace commands, <code>await using<\/code>, aria snapshot 옵션 확장 / 브라우저 버전 Playwright 1.59 계열은 Chromium 147, Firefox 149, WebKit 26.4 기반으로 안내됩니다."}], "itemsHtml": ["업데이트: Playwright 1.59에 <code>page.screencast<\/code>, <code>browser.bind()<\/code>, Dashboard, CLI debugger, CLI trace analysis 등 agent-aware 테스트 관찰 기능이 추가됐습니다.", "기술 맥락: E2E 테스트는 실패 로그만으로 원인을 파악하기 어려워지고 있으며, AI 코딩 에이전트가 브라우저 상태를 공유하고 사람이 중간에 개입할 수 있는 관찰 인터페이스가 중요해지고 있습니다.", "변경 전: 테스트 실패를 이해하려면 trace viewer, 영상, 콘솔 로그, DOM snapshot을 사람이 따로 열어봐야 했습니다.", "변경 후: 실행 중인 브라우저 세션을 CLI, MCP, 다른 Playwright client가 연결해 보고, screencast와 action annotation으로 검증 과정을 영상 증거처럼 남길 수 있습니다.", "확인할 영향: 주요 변화 <code>page.screencast<\/code>, <code>browser.bind()<\/code>, <code>playwright-cli show<\/code> Dashboard, <code>--debug=cli<\/code>, CLI trace commands, <code>await using<\/code>, aria snapshot 옵션 확장 / 브라우저 버전 Playwright 1.59 계열은 Chromium 147, Firefox 149, WebKit 26.4 기반으로 안내됩니다."]}, {"title": "인사이트", "className": "article-section is-deep-dive", "prose": true, "blocks": [{"kind": "quote", "html": "테스트 자동화의 다음 과제는 테스트를 더 많이 돌리는 것이 아니라, 실패한 순간을 사람과 에이전트가 같은 화면으로 이해하게 만드는 것입니다."}, {"kind": "subhead", "html": "왜 지금 이 업데이트인가"}, {"kind": "paragraph", "html": "Playwright 1.59는 테스트 실행 도구가 agent workflow의 관찰 계층으로 확장되는 사례입니다. 자동 수정과 코드 생성이 늘어날수록 중요한 것은 &quot;에이전트가 무엇을 봤고 어떤 동작을 했는가&quot;를 사람이 검토할 수 있는 증거입니다."}, {"kind": "paragraph", "html": "<code>browser.bind()<\/code>와 Dashboard는 실행 중인 브라우저를 여러 클라이언트가 공유하게 만들고, screencast는 액션 annotation과 chapter를 붙여 검증 과정을 기록합니다. 이는 단순 녹화보다 코드 리뷰와 QA 인수인계에 더 가까운 형식입니다."}, {"kind": "subhead", "html": "프론트엔드 개발 전문가 관점"}, {"kind": "paragraph", "html": "프론트엔드 팀은 E2E 테스트를 CI의 pass/fail 장치로만 두면 안 됩니다. 실패를 재현하고 해석하는 비용이 크다면 테스트가 많아질수록 유지보수 부담도 커집니다."}, {"kind": "paragraph", "html": "Playwright 1.59의 변화는 flaky test 대응, PR 리뷰, 에이전트 기반 테스트 수정에 직접 연결됩니다. 특히 checkout, signup, 권한 설정처럼 시각적 흐름이 중요한 테스트는 screencast receipt를 리뷰 산출물로 남기는 방식을 검토할 수 있습니다."}, {"kind": "subhead", "html": "실무에 어떻게 적용할 수 있을까"}, {"kind": "list", "html": "핵심 화면은 desktop/mobile viewport별 screenshot baseline을 만들고 PR마다 시각 회귀를 비교합니다."}, {"kind": "list", "html": "<code>page.screencast<\/code>는 반응형 메뉴, 모달, 결제 폼처럼 인터랙션이 긴 화면의 QA 증거로 남깁니다."}, {"kind": "list", "html": "ARIA snapshot은 버튼명, 링크명, heading 구조가 시안과 접근성 기준을 동시에 만족하는지 확인하는 데 씁니다."}, {"kind": "subhead", "html": "같이 보면 좋은 기술"}, {"kind": "list", "html": "Playwright trace viewer: 실패한 테스트의 네트워크, DOM, 콘솔, 액션 기록을 사람이 검토하는 기준입니다."}, {"kind": "list", "html": "<code>page.screencast<\/code>: QA나 코드 리뷰에서 테스트 실행 장면을 영상 증거로 남길 수 있습니다."}, {"kind": "list", "html": "<code>browser.bind()<\/code>: 실행 중인 브라우저 세션에 사람과 에이전트가 함께 붙는 디버깅 흐름을 만듭니다."}, {"kind": "list", "html": "ARIA snapshot: 시각 화면뿐 아니라 접근성 트리 기준으로 UI 상태를 검증할 수 있습니다."}, {"kind": "list", "html": "Flaky test quarantine: 관찰성이 높아져도 불안정 테스트를 격리하고 복구하는 운영 정책이 필요합니다."}], "itemsHtml": ["@@quote@@테스트 자동화의 다음 과제는 테스트를 더 많이 돌리는 것이 아니라, 실패한 순간을 사람과 에이전트가 같은 화면으로 이해하게 만드는 것입니다.", "@@subhead@@왜 지금 이 업데이트인가", "@@paragraph@@Playwright 1.59는 테스트 실행 도구가 agent workflow의 관찰 계층으로 확장되는 사례입니다. 자동 수정과 코드 생성이 늘어날수록 중요한 것은 &quot;에이전트가 무엇을 봤고 어떤 동작을 했는가&quot;를 사람이 검토할 수 있는 증거입니다.", "@@paragraph@@<code>browser.bind()<\/code>와 Dashboard는 실행 중인 브라우저를 여러 클라이언트가 공유하게 만들고, screencast는 액션 annotation과 chapter를 붙여 검증 과정을 기록합니다. 이는 단순 녹화보다 코드 리뷰와 QA 인수인계에 더 가까운 형식입니다.", "@@subhead@@프론트엔드 개발 전문가 관점", "@@paragraph@@프론트엔드 팀은 E2E 테스트를 CI의 pass/fail 장치로만 두면 안 됩니다. 실패를 재현하고 해석하는 비용이 크다면 테스트가 많아질수록 유지보수 부담도 커집니다.", "@@paragraph@@Pla   <main id="app" :class="{ 'article-main': activeIssue }" v-cloak>

  <script type="module">
    import { createApp } from "https://unpkg.com/vue@3.5.32/dist/vue.esm-browser.prod.js";

    const report = JSON.parse(document.getElementById("report-data").textContent);

    createApp({
      data() {
        return {
          report,
          route: window.location.hash || "#magazine",
          shareStatus: "",
        };
      },
      computed: {
        activeIssue() {
          const match = this.route.match(/^#\/story\/(\d+)/);
          if (!match) return null;
          return this.report.issues.find((issue) => issue.number === match[1]) || null;
        },
        activeCategoryKey() {
          const match = this.route.match(/^#\/category\/([^/]+)/);
          if (match) return decodeURIComponent(match[1]);
          if (this.activeIssue) {
            const returnMatch = this.detailReturnRoute.match(/^#\/category\/([^/]+)/);
            if (returnMatch) return decodeURIComponent(returnMatch[1]);
            return this.activeIssue.areaKey || "";
          }
          return "";
        },
        activeSubcategory() {
          const match = this.route.match(/^#\/category\/[^/]+\/(.+)$/);
          return match ? decodeURIComponent(match[1]) : "";
        },
        categories() {
          const categoryMap = new Map();
          this.report.issues.forEach((issue) => {
            const key = issue.areaKey || issue.area || "uncategorized";
            if (!categoryMap.has(key)) {
              categoryMap.set(key, {
                key,
                label: issue.area || "분류 없음",
                count: 0,
              });
            }
            categoryMap.get(key).count += 1;
          });
          const order = {"uiux": 0, "dev": 1};
          return Array.from(categoryMap.values()).sort((a, b) => (order[a.key] ?? 99) - (order[b.key] ?? 99));
        },
        activeCategory() {
          if (!this.activeCategoryKey) return null;
          return this.categories.find((category) => category.key === this.activeCategoryKey) || null;
        },
        categoryIssues() {
          if (!this.activeCategory) return this.report.issues;
          return this.report.issues.filter((issue) => (issue.areaKey || issue.area || "uncategorized") === this.activeCategory.key);
        },
        subcategories() {
          if (!this.activeCategory) return [];
          const subcategoryMap = new Map();
          const devOrder = {"html": 0, "css": 1, "javascript": 2, "web_accessibility": 3, "ai": 4, "tool": 5, "data_api": 6};
          const devLabels = {"html": "HTML", "css": "CSS", "javascript": "JAVASCRIPT", "web_accessibility": "\uc6f9\uc811\uadfc\uc131", "ai": "AI", "tool": "TOOL", "data_api": "DATA/API"};
          if (this.activeCategory.key === "dev") {
            Object.keys(devOrder).forEach((key) => {
              subcategoryMap.set(key, {
                key,
                label: devLabels[key] || key,
                count: 0,
              });
            });
          }
          this.categoryIssues.forEach((issue) => {
            const key = issue.categoryKey || issue.category;
            if (!subcategoryMap.has(key)) {
              subcategoryMap.set(key, {
                key,
                label: issue.category,
                count: 0,
              });
            }
            subcategoryMap.get(key).count += 1;
          });
          const subcategories = Array.from(subcategoryMap.values());
          if (this.activeCategory.key === "dev") {
            return subcategories.sort((a, b) => (devOrder[a.key] ?? 99) - (devOrder[b.key] ?? 99));
          }
          return subcategories;
        },
        visibleIssues() {
          if (!this.activeCategory) return this.report.issues;
          if (!this.activeSubcategory) return this.categoryIssues;
          return this.categoryIssues.filter((issue) => (issue.categoryKey || issue.category) === this.activeSubcategory);
        },
        currentListRoute() {
          if (this.validListRoute(this.route)) return this.route;
          return "#magazine";
        },
        detailReturnRoute() {
          const routeParam = this.routeReturnParam();
          if (routeParam) return routeParam;
          if (this.activeIssue && this.activeIssue.areaKey) return this.categoryPath(this.activeIssue.areaKey);
          return "#magazine";
        },
      },
      mounted() {
        this.syncDocumentState();
        this.syncHeaderCategoryState();
        window.addEventListener("hashchange", this.updateRoute);
      },
      unmounted() {
        document.body.classList.remove("is-story-open");
        window.removeEventListener("hashchange", this.updateRoute);
      },
      methods: {
        updateRoute() {
          this.route = window.location.hash || "#magazine";
          this.syncDocumentState();
          this.syncHeaderCategoryState();
          window.scrollTo({ top: 0, left: 0, behavior: "instant" });
        },
        syncDocumentState() {
          document.body.classList.toggle("is-story-open", Boolean(this.activeIssue));
          document.querySelectorAll(".header-back-link").forEach((link) => {
            link.setAttribute("href", this.activeIssue ? this.detailReturnRoute : "#magazine");
          });
        },
        syncHeaderCategoryState() {
          document.querySelectorAll(".header-category-nav a").forEach((link) => {
            const key = link.dataset.categoryNav || "";
            const isActive = key === this.activeCategoryKey;
            link.classList.toggle("is-active", isActive);
            if (isActive) {
              link.setAttribute("aria-current", "page");
            } else {
              link.removeAttribute("aria-current");
            }
          });
        },
        categoryPath(categoryKey) {
          return `#/category/${encodeURIComponent(categoryKey)}`;
        },
        subcategoryPath(categoryKey, subcategory) {
          return `#/category/${encodeURIComponent(categoryKey)}/${encodeURIComponent(subcategory)}`;
        },
        storyRoute(issue) {
          return issue.href || `${issue.route}?from=${encodeURIComponent(this.currentListRoute)}`;
        },
        validListRoute(route) {
          return route === "#magazine" || /^#\/category\/(uiux|dev)(?:\/[^?&]+)?$/.test(route || "");
        },
        routeReturnParam() {
          const match = this.route.match(/[?&]from=([^&]+)/);
          if (!match) return "";
          const route = decodeURIComponent(match[1]);
          return this.validListRoute(route) ? route : "";
        },
        goToList() {
          const targetRoute = this.detailReturnRoute;
          if (window.location.hash !== targetRoute) {
            window.history.pushState(null, "", targetRoute);
          }
          this.updateRoute();
        },
        plainText(htmlText) {
          const node = document.createElement("span");
          node.innerHTML = htmlText || "";
          return node.textContent || node.innerText || "";
        },
        async shareIssue(issue) {
          if (!issue) return;
          this.shareStatus = "";
          const shareData = {
            title: `${issue.platform} | Magazine`,
            text: this.plainText(issue.takeawayHtml),
            url: issue.articleUrl || window.location.href,
          };

          if (navigator.share) {
            try {
              await navigator.share(shareData);
              return;
            } catch (error) {
              if (error && error.name === "AbortError") return;
            }
          }

          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(shareData.url);
            this.shareStatus = "링크 복사됨";
            window.setTimeout(() => {
              this.shareStatus = "";
            }, 1600);
          }
        },
        formatSummaryItem(item) {
          const text = String(item);
          const match = text.match(/^([^:：]{2,18})[:：]\s*(.+)$/);
          if (!match) return `<span class="summary-value summary-note">${text}</span>`;
          return `<span class="summary-key">${match[1]}</span><span class="summary-value">${match[2]}</span>`;
        },
        summaryItemClass(item) {
          const text = String(item);
          return /^([^:：]{2,18})[:：]\s*(.+)$/.test(text) ? "" : "summary-note-row";
        },
        isSummaryFact(item) {
          const text = String(item);
          const match = text.match(/^([^:：]{2,18})[:：]\s*(.+)$/);
          return !match || !["업데이트", "서비스 맥락", "기술 맥락", "변경 전", "변경 후"].includes(match[1]);
        },
        summaryCoreItems(items) {
          return items.filter((item) => !this.isSummaryFact(item));
        },
        summaryFactItems(items) {
          return items.filter((item) => this.isSummaryFact(item));
        },
      },
    }).mount("#app");
  </script>
