# Trend Report 소스 단일 출처 (2026 재설계)
# RSS 피드 + 페이지 스크래핑 + App Store 추적 통합. 정규식 룰은 명백한 노이즈만, 상세 필터는 AI가 담당.
#
# Source modes (자동 감지):
#   - rss:      `rss` 필드만 있을 때 — RSS 파서 사용
#   - scrape:   `pageUrl` 필드 — 페이지 HTML anchor 추출
#   - appstore: `appId` 필드 — iTunes Lookup API

defaults:
  fetchTimeoutMs: 15000
  maxItemsPerSource: 30
  freshnessDays: 7

categories:
  - id: design
    label: 디자인
    audience: uiux
  - id: service
    label: 서비스
    audience: uiux
  - id: dev
    label: 개발
    audience: dev

