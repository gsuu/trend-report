name: Weekly Trend Collection

on:
  schedule:
    # 일요일 UTC 21:00 = 월요일 KST 06:00
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Collect trends (Stage 1+2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/collect/index.mjs

      - name: Commit data
        id: commit
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@cttd.local"
          git add src/data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "[commit] 변경사항 없음"
          else
            git commit -m "data: $(date -u +'%Y-W%V') 주간 트렌드 갱신"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send newsletter
        if: steps.commit.outputs.changed == 'true'
        env:
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          SMTP_SECURE:    ${{ secrets.SMTP_SECURE }}
          MAIL_FROM:      ${{ secrets.MAIL_FROM }}
          MAIL_SITE_URL:  ${{ secrets.MAIL_SITE_URL }}
        run: node scripts/collect/notify.mjs
